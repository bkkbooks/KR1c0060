body:
  text: 毛詩類釋卷十七國子監祭酒顧棟髙撰釋獸麟爾雅麟音鄰麕身牛尾一角郭注角頭有肉公羊傳曰有麕而角邢疏李巡曰瑞應獸名孫炎曰靈獸也周南云麟之趾陸璣疏麟麕身牛尾馬足黃色圓蹄一角角端有肉音中鐘吕行中規矩遊必擇地不履生蟲不踐生草不羣居不侣行不入陷阱不罹羅網王者至仁則出今并州界有麟大小如鹿非瑞麟也司馬相如賦射麋腳麟即此麟是注腳謂持其腳也鄭箋麟角之末有肉示有武而不用騶虞爾雅無文毛傳騶虞義獸也白虎黑文不食生物有至信之德則應之陸璣疏騶虞即白虎也黑文尾長於軀不食生物不履生草君王有德則見通雅曰似虎而大見虎豹則殺之太平則至郭璞曰即騶虞山海經林氏國有此曰騶吾日行千里一曰騶牙明宣德四年滁州獻二騶虞夏原吉賦序一一與毛傳合則騶虞之為獸信矣臣謹案騶虞一以為義獸一以為田獵之官以為義獸者起於毛傳後世如司馬相如東方朔山海經吳薛綜晉張華陸璣陸佃諸人是也以為獵官者起於賈誼新書後世如歐陽氏嚴粲及近世何氏楷是也其所以不信毛傳者以爾雅無騶虞故耳然鳥獸之名之不見於爾雅者多矣如鴛鴦鸛鶴之類皆不見爾雅豈得謂天壤間無是物耶騶虞特以世不經見遂一力排之以諸人皆附會不足信亦已過矣朱子曰看來只可解做獸名若解做騶虞之官終無甚意思平湖陸氏曰是惟瑞獸斯足歎美豈所施於賤官其言可謂簡而明矣象埤雅象南越大獸長鼻牙望前如後三年一乳行孕肉兼十牛令在其鼻其所食物皆以鼻取之蓋獸之象以鼻致用而不以口天之象以氣致用而不以言故天之象與獸之象同字其牙生花必因雷聲故古者以為器飾詩曰元龜象齒左傳曰象有齒以焚其身賄也虎爾雅甝白虎說文作䖑音覓白虎也爾雅訛作甝虪音叔黑虎郭注漢宣帝時南郡獲白虎獻其皮骨爪牙晉永嘉四年建平秭歸縣檻得一獸狀如小虎而黑毛深者為斑山海經云幽都山多𤣥虎𤣥豹虎猛獸狀如貓大如牛黃質黑章鋸牙鈎爪有威骨如乙字長一寸在脅兩旁凡武士能扞衛者曰虎詩魯頌矯矯虎臣在泮獻馘貓爾雅虎竊毛謂之虦音棧貓郭注竊淺也詩曰有貓有虎邢疏虎之淺毛者别名虦貓陸氏佃曰鼠善害苗而貓能捕鼠去苗之害故貓之字從苗詩有貓有虎貓食田鼠虎食田彘故詩以譽韓樂而記曰迎貓為其食田鼠也迎虎為其食田豕也云云案熊羆貓虎皆山中猛獸害人之物嚴粲曰四者能為人患如陸氏說則是家畜之貓爾豈可與三者並列乎今世山中有虎能傷人畜人呼為山貓若真虎則不多見意當如白虎黑虎如甝虪之類耳若是捕鼠之貓則到處皆有何足誇美以為韓之盛大乎熊爾雅熊虎醜其子狗絶有力麙音巖邢疏醜類也陸璣曰熊能攀緣上高樹見人則顛倒自投地而下冬多入穴而蟄始春而出正字通云熊似豕竪目人足黑色當心有白脂如玉謂之熊白其膽春在首夏在腹秋在左足冬在右足好緣高木而引氣謂之熊經莊子所謂熊經鳥伸是也蟄時不食飢則自舐其掌掌特美謂之熊蹯埤雅曰詩云維熊維羆男子之祥取其強力壯毅故謂男子之祥也羆爾雅羆如熊黃白文郭注似熊而長頭高腳猛憨多力能拔樹木邢疏大雅韓奕云赤豹黃羆陸璣疏羆有黃羆有赤羆大於熊其脂如熊白而粗理不如熊白美也豹埤雅豹花如錢黑而小於虎文詩曰羔裘豹祛羔裘豹褎言大夫體柔以剛文之而已今其用暴如此非所以稱其服也虎豹之駒未成文已有食牛之氣及長退毛然後疏朗渙散蓋亦養而成之傳曰文豹隱霧十日不食欲以澤其衣毛成其文彩語曰豹死留皮豹一名程狼貪豹亷有所程度而食故其字從勺言能勺物而取也陸璣疏毛赤而文黑謂之赤豹毛白而文黑謂之白豹貔爾雅貔白狐郭注一名執夷虎豹之屬邢疏大雅云獻其貔皮陸璣疏貔似虎或曰似熊一名執夷一名白狐遼東人謂之白熊豺爾雅豺狗足郭注腳似狗邢疏說文云豺狼屬狗聲貪殘之獸左傳云戎狄豺狼詩小雅取彼譖人投畀豺虎是也狼爾雅狼牡貛牝狼邢疏狼牡者名貛牝者名狼陸璣疏其鳴能小能大善為小兒啼聲以誘人去數十步其猛健雖善用兵者不能免也其膏可煎和皮可為裘埤雅云狼大如狗青色作聲諸竅皆沸善逐獸今獵師遇狼則喜蓋狼之所嚮獸之所在也狼跋其胡載疐音至其尾美周公處變而能不失其正胡狼項下袋也老狼項下有袋求食滿腹向前行乃觸之退後又自踐踏上疐其尾進退有患以况周公所處之難兕爾雅兕似牛郭注一角青色重千斤邢疏兕如野牛青毛其皮堅厚可制鎧有一角角長三尺餘古人以兕角為觥用以為罰爵凡燕饗必用之周禮云觥其不敬者小雅云兕觥其觩㫖酒思柔是也又吉日云發彼小豝殪此大兕孔疏小者矢中必死小豝苦於不能射中大者射則易中惟不能即死小豝云發言發則中之大兕言殪則著矢即死言能中微而制大猱爾雅猱猿音袁善緣邢疏猱一名猿善攀援樹枝陸璣曰獼猴也楚人謂之沐猴老者為􅙱長臂者為猿猿駿捷於獼猴其鳴噭噭而悲所謂猿啼是也詩緝曰栁子厚憎王孫文云猿之德靜以常王孫之德躁以囂猿即王孫也杜詩覔胡孫是也讒人為惡如獼猴升木本自能之無所事教王今又信任之是教獼猴升木也鹿爾雅鹿牡麚音加牝麀其子麛音迷邢疏說文云解角獸也其牝名麀埤雅云鹿分背而食食則相呼羣居則環其角外向以防物之害已鹿愛其類發於天性小雅云鹿斯之奔維足伎伎毛傳伎伎舒貌鹿見人則奔宜速而伎伎然舒緩者顧其羣也今王兀然如傷病之木此心之所以憂也鄭樵曰凡牛羊之屬有角無齒者則其聲呦呦駝馬之屬有齒無角者則其聲蕭蕭此亦天籟也鹿之喙似牛羊故其聲如是又得蔞蒿之趣也使不識鹿則安知食蘋之趣與呦呦之聲乎麕麌爾雅麕牡麌郭注麀鹿麌麌鄭康成解即謂此也但重言耳邢疏說文云麕麞也麕其總名牡名麌詩曰者小雅吉日篇文也鄭箋云麌復麌言多也案本草麞類甚多麕其總名召南野有死麕白茅包之昏禮贄用生鴈飾以繢今取死麕非禮故序曰惡無禮也鄭樵曰麝父麕足其腳似麞食柏葉而臍甚香即今之麝香也兔爾雅兔子㛯芳萬切邢疏兔舐雄毫而孕及其生子從口而出埤雅云兔口有缺吐而生子故謂之兔兔吐也舊說免明月之精視月而孕雖舐雄毫其感孕則以月月缺也故其口缺詩召南曰肅肅免罝㭬之丁丁二章曰施于中逵三章曰施于中林言兔罝野人當幽獨無人之處而于是焉肅則好德之至也文王之化格於芻蕘如此故序以為莫不好德賢人衆多也豕特豵豝白蹢豜爾雅豕生三子曰豵一子曰特召南詩一發五豵魏風胡瞻爾庭有縣特是也牝曰豝召南一發五豝吉日詩發彼小豝是也四蹢音滴皆白曰􅘻音垓小雅有豕白蹢蹢蹄也右爾雅辨豕之種類其見於詩者有四曰豵曰特曰豝曰白蹢豳風又有言私其豵獻豜于公毛傳曰豕生一嵗曰豵三嵗曰豜大獸公之小獸私之其釋豵與爾雅特異孔疏云一嵗三嵗蓋相傳為然無正文也鄭箋從爾雅豕生三子曰豵其釋豜則無文臣案召南豳風及小雅皆說田獵所得之豕非畜豕也大雅篤公劉執豕于牢牢是牧豕之處其為畜豕明矣有豕白蹢亦宜為畜豕若田獵所得之豕則宜藏匿于山野何由于道路之間知其為白蹢乎犬獫歇驕尨盧爾雅長喙曰獫短喙曰猲獢郭注詩秦風載獫猲獢是也今詩作歇驕又齊風盧令令毛傳曰盧田犬也戰國䇿韓盧天下之駿犬也又召南詩無使尨也吠爾雅尨狗也狗四尺為獒許氏說文云多毛曰尨右爾雅辨犬之種類其見於詩者凡三曰獫曰猲獢曰尨盧則爾雅無文臣案獫猲獢係田犬尨則守犬也獒見尚書旅獒牛犉爾雅牛黑脣犉良耜頌曰殺時犉牡毛傳黃牛黑脣曰犉是也又牛七尺為犉小雅無羊篇誰謂爾無羊九十其犉羊牂羖羜達羝爾雅羊牡牂郭注詩曰牂羊墳首孔疏牝羊小羊也首必稱身小羊而責大首無是理也牝羖邢疏白羊牝者名牂黑羊牝者名羖羖羊之性牝牡皆有角賓筵詩曰由醉之言俾出童羖責以必無之物用以為戒也未成羊名羜郭注俗呼五月羔為羜小雅既有肥羜以速諸父是也牡羊名羝生民取羝以軷是也臣謹案生民詩曰誕彌厥月先生如逹鄭箋曰逹羊子也薛綜答韋昭曰羊初生名達小者名羔未成羊名羜大曰羊右爾雅别羊之種類其見於詩者凡三曰牂曰羖曰羜牂羖皆牝羊也以色之白黑分羜五月羔羊也羊以小者為貴鼠爾雅鼫音石鼠郭注形大如鼠頭似兔尾有毛青黃色好在田中食粟豆邢疏詩魏風碩鼠碩鼠無食我黍孫炎樊光引此詩為五技之鼠許慎云能飛不能上屋能遊不能渡谷能緣不能窮木能走不能先人能穴不能覆身陸璣則曰今河東有大鼠能人立交前腳於頸上號舞善鳴食人禾苗人逐則走入樹空中亦有五技或謂之雀鼠其形大故謂之大鼠魏國今河北縣言其方物宜謂此鼠非鼫鼠也嚴氏粲曰經作碩鼠訓之為大不作鼫鼠之字其義或如陸所云右爾雅别鼠之種類凡十三其見於詩者只鼫鼠耳然陸璣嚴粲又謂經作碩鼠訓之為大非鼫鼠也若鼷鼠則見於春秋豹文鼮鼠則識於終軍世不多見今世所患鼠到處有之而于爾雅無文意召南穿墉之鼠即此是狐爾雅貍狐貒貈醜其足蹯其跡􅚵音狃邢疏蹯掌也指頭著地處名􅚵埤雅狐妖淫之物故詩每以刺惡所謂雄狐綏綏是也又曰有狐綏綏在彼淇梁言狐宜山居今反在淇梁淇厲淇側失其常矣然失其常居猶不失其常匹衛之男女失時喪其妃耦則曽狐之不若也貒音端豬貛也體肥行鈍穴居足尾短褐毛尖喙能孔地食蟲爾雅貒子貗郭璞貒豚也一名貛狸埤雅狸似貙音樞而小文彩斑然伏獸也其伺物卑身而伏性善擬度故大射以貍步張三侯鄭氏曰貍善摶者也行則止而擬度焉其發必獲是以量侯道取象焉詩曰取彼狐狸為公子裘言狐善疑狸善擬不可以有為故古者以為燕居之裘齊大夫東郭書衣貍製是也貉埤雅貉似貍鋭頭尖鼻斑色毛深厚溫滑可為裘善睡其營窟與貛皆為曲穴以避雨暘且以防患貛之出穴以貉為導詩曰一之日于貉周官所謂祭表貉即此于貉是也孔疏曰周禮無貉裘惟孔子狐貉之厚以居明貉賤也詩緝曰往取貉皮以為自用之裘取狐狸之皮以為公子之裘賤者以自奉貴者以奉公也孟冬天子已裘一之日乃仲冬豫取皮乾之以為明年用耳考工記貉踰汶則死貆音喧又音完爾雅貈子貆貈與貉同函史物性志貉一名貈埤雅伐檀一章詩曰胡瞻爾庭有縣貆兮二章曰特三章曰鶉貆小而特大鶉則尤小以言在位貪殘無功而受祿其後已悉如此貈音涸特爾雅豕生一子曰特又獸三嵗曰特詩魏風胡瞻爾庭有縣特兮附捕獸具一條罝爾雅兔罝謂之罝郭注罝猶遮也邢疏詩周南云肅肅兔罝㭬之丁丁李巡云兔自作徑路張罝捕之也毛傳云丁丁㭬杙聲杙橛也謂擊橛於地而張罝其上也金仁山曰罝兔而體貌有肅敬之容武夫而步武有約束之度許氏謙曰從金子說則此詩為賦體傳肅肅主罝而言此肅肅主人而言毛詩類釋卷十七
