body:
  text: 毛詩類釋卷一國子監祭酒顧棟髙撰釋天文心宿即大火召南嘒彼小星三五在東毛云三心五噣四時更見鄭云衆無名之星隨心噣在天猶諸妾隨夫人以次序進御於君也心在東方三月時也噣在東方正月時也綢繆詩曰三星在天苕之華曰三星在罶鄭皆指為心以心為列宿之尊元命苞云心為天王公羊亦曰心為大辰故鄭言三星皆以心言之毛以綢繆之三星為參者以刺昏姻不得其時特舉正時以刺之冬日之昏在大在戶惟參為然故知非心也心亦為大火豳風七月流火鄭曰大火者寒暑之候季冬十二月平旦正中在南方大寒退季夏六月黃昏火星中大暑退故將言寒先著火所在以六月之昏加於地之南方至七月之昏則下而西流矣劉氏瑾曰此特據周初而言堯典日永星火以正仲夏則大火昏中在五月至周公攝政時凡一千二百四十餘年嵗差當退十六七度故六月而後火星中七月西流於地之未位此詩上述豳俗當夏商時而言七月流火者周公特據當時所見而言耳孔疏曰房心連體火統其名左傳火中火見詩七月流火皆指房心為言此說專主心未知孰是孔疏又曰書傳曰古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御於君雞鳴太師奏雞鳴於階下夫人鳴佩玉於房中告去由此言之夫人往來舒而有儀諸妾則肅肅然夜而疾往是其異也又須夜晚始往及早來實命不同言此不同於夫人非妾中自不同也臣謹案天子所居六寢路寢一燕寢五直北為后之六宫由宫而達於寢為永巷所謂壼也閽寺守之男不入女不出諸侯則三宫三寢凡進御天子諸侯無往就之理雖后夫人亦由永巷入御於君但早晚之時異耳周禮女御掌御叙於王之燕寢無以色升以愛選三千寵愛獨在一身之事觀此詩可槩見矣柳宿孔疏曰毛云三心五噣四時更見知五是噣者元命苞云柳五星釋天云咮謂之柳天文志曰柳謂鳥喙則喙者柳星也以其為鳥星之口故謂之喙心東方之宿柳南方之宿著明者故以比夫人也言四時更見者見連言在東恐其一時俱在東方故云四時之中更迭見之心在東方三月時噣在東方正月時是不同時見也二者同在春見但異月耳參宿第二章曰嘒彼小星維參與昴毛云參伐也昴留也鄭云此言衆無名之星亦隨伐留在天孔疏曰天文志云參白虎宿三星直下有三星鋭曰伐其外四星左右肩股也則參實三星故綢繆傳曰三星參也以伐與參連體參為列宿統名之若同一宿然但伐亦為大星與參互見皆得相統故周禮熊旗六旒以象伐注云伐屬白虎宿與參連體而六星言六旒以象伐亦得統參故此言參伐也昴宿孔疏曰元命苞云昴六星昴之為言留也言物成就繫留彼昴留為一則參伐明亦為一也臣謹案朱子不取毛鄭三星五噣之說第云三五言其稀蓋初昏或將旦時意以三五即所見之小星以釋首章猶可至次章維參與昴則說不通矣參昴是列宿之尊者朱子於此便無說上下文不相聨貫毛鄭謂小星賤妾自况三五及參昴以比夫人即下實命不猶意自朱子謂其於義無所取而詩緝及補傳遂謂夫人一而已豈可比以三五參昴雖大星亦止可喻娣媵實命不猶謂與娣媵不相若泥滯特甚逮下當首及娣媵此詩當即娣媵所作而云衆妾不敢望如娣媵殊無謂不如從古注為妥女宿大東云跂彼織女終日七襄鄭云襄駕也每辰一移駕從旦至莫為辰有七因謂之七襄疏曰織女三星鼎足望之跂然而成三角晝夜各六辰舉其終始故言七謂自卯至酉也又織女之駕有西無東不如人之織相報而成章是有空名無實用也自此至箕斗皆言其有名無實喻王之官司虛設而無所用牛宿第六章云睆彼牽牛不以服箱毛云睆明星貌河鼓謂之牽牛箱大車之箱鄭云牽牛不可以為駕車之用畢宿有救天畢載施之行毛云畢所以掩兔鄭云祭器有畢所以助載鼎實今但施於行列而已何嘗見其可用乎畢又為隂星漸漸之石曰月離于畢俾滂沱矣毛云月離隂星則雨洪範星有好雨是也箕宿斗宿末章曰維南有箕不可以簸揚維北有斗不可以挹酒漿疏曰二十八宿連四方為名者惟箕斗井壁四星而已壁在室東故稱東壁井在參東故稱東井推此則箕斗並在南方之時箕在南而斗在北故言南箕北斗也劉氏瑾曰此謂南斗夏秋之間見南方者也臣謹案箕四星二為踵二為舌其踵狹而舌廣天文箕主口舌故亦以喻讒人巷伯之詩哆兮侈兮成是南箕是也詩緝曰箕東方之宿考星者多驗於南方故曰南箕室宿鄘風曰定之方中作于楚宫晉天文志營室二星一曰𤣥宫一曰清廟又為土功事疏曰釋天云營室謂之定定正也天下作宫室者皆以營室中為正定星昏而正中謂小雪時夏正十月之中氣春秋時十二月也農事已畢可以興作劉氏瑾曰此蓋成周以後之制上考唐虞之時定星以戌月昏中歲久而差至周時定星始以亥月昏中下逮今日此星又以子月昏中矣房宿吉日云吉日維戊既伯既禱毛云伯馬祖也鄭云馬祖天駟晉天文志房四星亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天廏爾雅注龍為天馬故房謂之天駟許氏謙曰馬祖常祭在春而將用馬力則又用彼禮以禱之通典隋制仲春用少牢祭馬祖於大澤積柴於燎壇禮畢就燎以剛日臣謹案此雖隋禮其初必有所考想三代之禮大略如此氐宿節南山云尹氏太師維周之氐毛云氐本也太師為周根本之臣詩緝解頥新語曰爾雅云氐星名天根也說者謂亢下繫於氐如木之有根不必改字作柢雲漢雲漢天河也河精上為天漢似雲而非雲故曰雲漢也詩言雲漢者三而取義各别棫朴之詩曰倬彼雲漢為章于天言雲漢之在天其為文章猶天子為法度於天下喜而幸之之詞也雲漢之詩曰倬彼雲漢昭回于天天將雨其兆先見於漢今水氣精光轉運於天未有雨徵怨而訴之之詞也大東之詩曰維天有漢監亦有光言天河雖則有光不能照物是有明而無所用以下諸星皆取有名無實為義又是一種怨訴立言之妙越到怨咨越有味故曰愁苦之辭易好啓明長庚大東之六章曰東有啓明西有長庚毛云日旦出謂明星為啓明日既入謂明星為長庚庚續也鄭云二星皆有助日之名而無實光疏曰或一星或二星未能審也李氏樗曰啓明即太白也爾雅曰明星謂之啓明孫炎曰太白也出東方髙三舍長庚不知是何星毛氏云只是一星故後世亦以長庚為太白李白之母夢長庚星而生白因字太白韓氏愈詩曰太白配殘月蘇軾詩亦云長庚至曉猶陪月則是以長庚為太白也鄭氏樵乃謂啓明金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見此詩曰東有啓明西有長庚則又似是二星不得混而為一也不如待知天文者而問之蝃蝀鄘風曰蝃蝀在東莫之敢指毛云蝃蝀虹也疏曰俗呼為美人虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓臣謹案朝隮于西朱傳據周禮十輝九曰隮即虹也崇朝其雨謂其雨終朝而止蓋淫慝之氣有害於隂陽之和與上章刺譏一例詩緝乃從補傳說謂陽方之氣來交於隂得理之正故能隂陽和而雨今亦無從置辨但下二句立文不異何所據以為首章戒其淫奔次章則陳昏姻之正禮乎其誤蓋自程子以東西二字立義耳南軒謂蝃蝀見則雨止初無東西之分足正此說之謬李氏樗曰虹朝陽射之則在西夕陽射之則在東總為不正之氣以喻淫奔耳豈有得正之理乎宜一從朱傳日食月食小雅十月之交朔日辛卯日有食之亦孔之醜疏曰日食者月掩之也為隂侵陽臣侵君之象其日又是辛卯辛是金卯是木金常勝木今木反侵金亦臣侵君之象一食而有二象故為亦甚惡也朱傳曰日一歲而一周天月二十九日有竒而一周天又逐及于日而與之㑹一歲凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前凡十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂則日月之行雖或當食而月常避日合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不食或南北雖亦相近而日在內月在外則亦不食若其反是則隂盛陽微當食必食雖曰行有常度而實為非常之變矣陳氏埴曰日月交㑹日為月掩則日食日月相望月與日亢則月食自是行度分道到此交加去處本不足為變異但天文才遇此際亦為隂陽厄會於人事上必有災戾故聖人畏之歐陽修唐書厯志叙曰以戊寅麟德厯推春秋日蝕大槩皆入蝕限於厯應蝕而春秋不書者尚多則日蝕必在交限其入限者不必盡蝕也或過至未分月變行而避之或五星潛在日下禦侮而救之或涉交數淺或在陽厯陽盛隂微則不蝕或德之休明而有小眚焉則天為之隱雖交而不蝕此四者皆德教之所由生也開元十二年七月戊午朔於厯當蝕半疆候之不蝕十三年十二月庚戌朔於厯當蝕大半時東封泰山還次梁宋間日亦不蝕時羣臣與八荒君長之來助祭者皆奉壽稱慶肅然神服然後知德之動天不俟終日矣臣謹案歐陽此條論極精春秋二百四十二年不應止有三十六食則知應食而不書者尚多或疑春秋時無德以當此然則開元十二十三年亦未必有德之動天又何疑於春秋之世乎麟德厯係唐李淳風所造推算極精若因開元二蝕曲變交限而從之則差者益多風雨邶風凱風自南吹彼棘心爾雅南風謂之凱風李巡曰南風長養萬物喜樂故曰凱風凱樂也疏曰風性樂養萬物又從南方而來棘難長養者言母性寬仁似凱風七子難長養似棘也邶風習習谷風以隂以雨爾雅東風謂之谷風孫炎曰谷之為言穀榖生也谷風者生長之風也疏曰隂陽和乃谷風至此喻夫婦故主於生物小雅谷風以喻朋友故直云潤澤行恩愛成而已邶風北風其凉雨雪其雱爾雅北風謂之凉風北方寒凉之風也月令孟秋之月凉風至疏曰風雪並喻君虐箋獨言凉風者風非所以害物但北風寒凉故害萬物與常風異大雅桑柔曰大風有隧有空大谷爾雅西風謂之泰風泰同大孫炎曰西風成物物豐泰也疏曰惡有本性不可變改言大風所從來自有其道乃從彼有空大谷而來以喻賢愚所為各由其性小雅谷風維風及頽爾雅焚輪謂之頽孫炎曰回風從上下曰頽頽下也回風從下上曰猋猋上也疏曰回風從上而下力薄不能更升谷風與相遇二風迸力乃相扶而上以喻朋友二人同心乃相率而成也既與相扶而上則於爾雅為猋不復為頽矣小雅蓼莪飄風發發爾雅回風為飄郭云旋風也邶風終風且暴爾雅日出而風為暴孫炎曰隂雨不興而大風暴起則為風之暴疾又終風且霾爾雅風而雨土曰霾孫炎曰大風揚塵土從上下也又終風且曀爾雅隂而風為曀孫炎曰雲風曀日光豳風東山零雨其濛爾雅天氣下地不應曰雺雺聲近蒙郭云言蒙昧洪範言曰雺鄭注云雺者氣澤鬱鬱冥冥也詩云零雨其濛則雺是天氣下降地氣不應蒙暗之象小雅信南山益之以霡霂爾雅小雨謂之霡霂李巡云氷雪俱下按此文上有暴雨下云久雨於中間無雪事而云氷雪俱下妄矣小雅頍辨如彼雨雪先集維霰爾雅雨霰謂之霄雪霰與霰音義同氷雪雜下也因名霄雪霄即消也疏曰天將大雨雪其始必微溫雪自上下遇溫氣消釋集聚而摶謂之霰積久而雪之寒氣勝則大雪矣喻王之惡自微至甚如先霰後雪也毛詩類釋卷一
