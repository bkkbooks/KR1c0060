body:
  text: 毛詩類釋卷二十一國子監祭酒顧棟髙撰釋馬駟驖月令云孟冬乘鐵驪說文馬深黑色者為驪赤黑色者為驖詩秦風駟驖孔阜埤雅云非獨取其馬色如鐵蓋取其堅狀如鐵也四驪孔疏戎事齊力尚強而言四驪者雖以齊力為主亦不厭其同色也故曰駟騵彭彭又曰乘其四騏田獵齊足而曰四黃既駕皆是同色也無同色者乃取異毛耳騏駵是中騧驪是驂是也四騏說文馬青驪文詩秦風駕我騏馵小雅我馬維騏是也孔疏色之青黑者名曰騏六書故騏馬綦色綦蒼艾色也駟騵爾雅駵馬白腹曰騵郭注駵赤色黑鬛也大雅駟騵彭彭孔疏云三代乘馬各從正色而周不純赤毛以白腹為上周下殷也檀弓言戎事乘騵眀非戎事不然因此武王所乘後遂為一代常法四黃埤雅曰黃騂曰黃黃亦馬之上色故駉頌首章曰有驪有黃也列子曰牝而黃牡而驪天下之馬也有駜曰乘黃矣然後乃言乘牡卒言青驪之駽則黃牝驪牡剛柔之質具矣或曰天子之馬常則駕四盛則駕六詩曰四黃既駕兩驂不猗則駕六之證也臣謹案牝難於黃牡難於驪昔人言相馬謂得之牝牡驪黃之外語蓋本此馵音注爾雅後右足白曰驤左白曰馵埤雅曰詩云駕我騏馵王肅謂駕兩馬者下云騏駵是中騧驪是驂明此駕兩者也蓋古者庶人駕一士駕二大夫駕三諸侯駕四天子駕六說文曰駢駕二馬也尚書大傳曰命於其君然後得乘駢馬驂駕三馬駟駕四馬也詩曰載驂載駟驂以言大夫駟以言諸侯白顚爾雅馰音的顙曰白顚邢疏舍人云的白也顙額也額有白毛今之戴星馬也詩曰有車鄰鄰有馬白顚埤雅莊子曰齊之以月題蓋月題額上當顱如月者所以象顚之白易曰其於馬也為馰顙蓋震二隂在上故為白顙夫文入二為白白隂色也二隂數也馬政論曰顙有白毛謂之的盧馬額曰盧的白也駽爾雅青驪曰駽邢疏孫炎曰色青黑之間青毛黑毛相雜者名駽今之鐵驄也詩曰駜彼乘黃駜彼乘牡駜彼乘駽言臣有柔順之德剛健之材又被文以成之則臣之道備矣駁爾雅駵音留白曰駁邢疏孫炎曰駵赤色也謂馬有駵處有白處者曰駁埤雅徐鉉曰疑象駮文晉侯乘駁乳虎見之而伏則象駮之文理或然也駁亦馬之上色故古者國君服之皇一作騜爾雅黃白曰騜郭注詩曰皇駁其馬邢疏孫炎曰馬有黃處有白處者曰騜驒爾雅青驪驎曰驒郭注色有深淺斑駁隱粼今之連錢驄也邢疏說文云馬文如鼉詩曰有驒有駱是也駱爾雅白馬黑鬛曰駱郭注禮記曰夏后氏駱馬黑鬛邢疏鬛總也白馬黑總者名駱詩四牡曰驒嘽駱馬毛傳嘽嘽喘息之貌詩緝曰駱馬最耐勞今以勞之故猶嘽嘽喘息則人勞可知矣駓駰爾雅黃白雜毛曰駓隂白雜毛曰駰邢疏隂淺黑色毛色黃白而復有雜毛者名駓今謂之桃花馬毛淺黑而白兼雜毛者名駰今謂之泥驄駉二章云有騅有駓四章有駰有騢是也埤雅曰詩云我馬維駒我馬維騏我馬維駱我馬維駰其先後與駉之序合則駰不如駱駱不如騏矣然是詩乃卒言駰者以眀馬雖彌劣而所以御之滋善騅音追騢音遐爾雅蒼白雜毛曰騅彤白雜毛曰騢邢疏蒼淺青也毛有淺青及白兼雜毛者名騅彤赤也毛赤白兼雜毛者名騢說文云即今赭白馬也驔魚爾雅二目白曰魚郭注似魚目也豪骭音汗曰驔謂豪在骭而白骭謂脛骨膝以下脛以上為骭埤雅魚今謂之環眼馬馬之最下者也言有驪有黃於前言有驔有魚於後每章愈下則以言僖公至誠成物者有加無已騏駵埤雅馬青黑色曰騏赤身黑鬛曰駵詩秦風騏駵是中是也騧驪爾雅白馬黑喙曰騧郭注喙口也今之淺黃色者為騧馬純黑曰驪詩騧驪是驂是也驈爾雅驪馬白跨曰驈郭注驪黑色跨髀間也謂黑色髀間白者名驈詩魯頌有驈有皇是也騋牝爾雅騋牝驪牡郭注詩云騋牝三千馬七尺以上為騋見周禮埤雅騋牝驪牡以罕稱也凡馬六尺以上為馬七尺以上為騋八尺以上為龍騋牝取其大也宗廟用龍戎事用駥田事用騋騋田馬也考工記曰田馬之輈深四尺鄭注云田馬髙七尺衡髙七尺有七寸除馬之髙則餘七寸為衡頸之間也騂爾雅無文毛傳赤黃曰騂孔疏曰周人尚赤而牲用騂剛是騂為純赤色言赤黃者謂赤而微黃其色辨眀者也上云黃騂曰黃謂黃而微赤此云赤黃曰騂謂赤而微黃各隨其色之輕重淺深言雒爾雅無文毛傳黑身白鬛曰雒孔疏曰未知所出案詩魯頌有驒有駱毛傳云白馬黑鬛曰駱黑身白鬛曰雒駱出爾雅而雒於爾雅無文毛傳云云孔疏又云未知所出學者且當依毛不必強為之說也駂毛詩作鴇音保爾雅驪白雜毛曰駂郭注今之烏驄埤雅曰蓋取諸鳥今鴇鳥其色驪白詩曰叔于田乘乘鴇騅亦駂類取隼之色一曰蒼黑白毛騅一曰蒼白雜毛騅今隼鳥之色亦在青黑青白之間附馬飾俴駟鄭箋俴淺也謂以薄金為馬甲欲其輕而易於馬之旋習也臣謹案此即後世所謂鐵騎古者人之甲胄皆以犀兕之皮為之無用金者而馬則以金為甲元戎十乘為車縵輪馬被甲左傳鞍之戰齊頃公不介馬而馳之則馬之有甲舊矣鏤膺大雅韓奕詩作鉤膺毛傳膺馬帶鄭箋鏤膺有刻金飾也孔疏膺上有鏤明是以金飾帶知膺是馬胸前帶也春秋成二年仲叔于奚請繁纓繁與樊同鄭注周禮巾車五路云樊讀如鞶帶之鞶謂今馬大帶但彼謂在腹之帶與膺不同耳臣謹案此即今之馬鐵胸韓奕詩所謂鉤膺也巾車注云鉤以金為之鄭箋韓奕云鉤膺樊膺也明即小戎之鏤膺非二物鏤錫音陽毛傳鏤錫有金鏤其錫也鄭箋眉上曰錫刻金飾之今當盧也孔疏揚者人面眉上之名馬鏤錫施鏤於揚之上若今之當盧當馬之額盧在眉眼之上刻金為之飾也鞗音條革鄭箋鞗革謂轡也疏曰爾雅釋器云轡首謂之革金厄鄭箋以金為小環往往纒扼之疏曰往往者言其非一處也詩緝曰以鞗皮為轡首之革以金為小環纒扼之據此則與上鞗革只是一物鸞鑣鄭箋置鸞於鑣異於乘車孔疏鑣馬銜也謂在旁包斂其口也乘車則鸞在衡和在軾此則鸞在於鑣是異於乘車乘車謂玉路金路象路也朱幩毛傳幩飾也人君以朱纒鑣鑣馬銜外鐵也六帖云朱幩鑣也而遂以鑣鑣贊之此以實字為虛字凡古書重字大半借實字用也詩緝曰鑣鑣非一鑣也附成周邱甸不出車馬論臣謹案司馬法甸六十四井出長轂一乘戎馬四匹牛十二頭故周禮小司徒有六畜車輦旗鼓兵器帥而至之文李氏亷獨曰甸出一乘者特出一乘之人耳一切馬牛車乘决非邱甸所出卓然斯論可破千古之惑而後儒疑其與周禮相背臣謂周禮出於王莽世好為繁重碎密特竄入此等以瞽當世之愚民非真周制之本然也且即周禮一書考之亦自相矛盾詩小戎為兵車收欲淺轂欲長而考工記所載輪人輿人輈人之制行澤欲杼行山欲侔較量分刌窮極微渺此惟國工能之而乃使六十四井之民憑空授意造為此車其能攸往咸利乎且馬出於民須臨事備具而詩云比物四驪間之維則又云乘其四騏四騏翼翼意惟天間上廄雲錦成羣方能挑選出四馬皆同色豈可責之閭巷之編氓况車有游環脅驅約軧錯衡馬有鉤膺鏤錫鞗革金厄之飾均非民間所能具故知李氏之說為不可易也毛詩類釋卷二十一
