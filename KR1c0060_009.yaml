body:
  text: 毛詩類釋卷九國子監祭酒顧棟髙撰釋樂器琴陳㿩樂書琴長三尺三寸六分象期之日廣六寸象六合絃有五象五行腰廣四寸象四時前廣後狹象尊卑上圓下方象天地暉十三象十二律餘一以象閏蓋長三尺六寸六分者中琴之度長八尺一寸者大琴之度也舜彈五弦之琴文王加少宫少商瑟樂書大帝使素女鼓五十絃之瑟帝悲不能止因破為二十五絃蓋五十絃大瑟也二十五絃中瑟也邢昺曰雅瑟長八尺一寸廣一尺八寸二十五絃其帝用者十九絃頌瑟長七尺一寸廣一尺八寸二十五絃盡用段氏昌武曰古人用大琴必以大瑟配之用中琴必以小瑟配之然後大者不陵細者不抗而五聲和矣臣於雍正七年赴河南修省志有祥符朱名超善鼓瑟為臣言傳云朱絃疏越一唱三嘆瑟之背穹然最髙處一絃朱色名曰君絃不用越孔也瑟之下孔比琴稍寬故曰疏越琴一聲瑟三聲琴為一唱瑟為三嘆故夫婦之和比琴瑟之好琴瑟無專用一器之理所謂如琴瑟之專一誰能聽之也其解一唱三嘆為先儒所未曽道偶憶而謹志之鐘鏞樂書黃帝命伶倫鑄十二鐘和五音大者謂之鏞虡縣一鐘謂之特鐘一虡十二鐘謂之編鐘堂上擊黃鐘特鐘而堂上編鐘應之鼓縣鼓樂書少皞氏冒革以為鼓夏后氏加四足謂之足鼓商人貫以柱謂之楹鼓周人縣而擊之謂之縣鼓有瞽詩應田縣鼓是也鼖鼓毛詩作賁鼓鼖鼓大鼓也周禮韗人鼓長八尺鼓四尺中圍加三之一謂之鼖鼓注疏鼓四尺者謂鼓面革所蒙者廣四尺也中圍加三之一者謂將中央圍加于面之圍三之一也面四尺其圍當十二尺中圍加以三之一為四尺總十六尺徑五尺三寸三分寸之一也亦謂之田鼉鼓陸氏佃曰夏小正云剝鼉以為鼓其皮堅厚取以冒鼓非特有取于皮亦其鼓聲逄逄然象鼉之名故以名之續博物志曰鼉長一丈其聲如鼓案鼉鼓即上鼖鼓以其形制之大言之謂之鼖鼓以其材質之堅厚言之謂之鼉鼓非有二物也鼛鼓周禮考工記作臯鼓長尋有四尺鼓四尺倨句音鉤磬折注中圍與鼖鼓同以磬折為異磬折中曲之不參正也又地官鼓人云以鼛鼓鼓役事注云長丈二尺即尋有四尺也鼛同臯臯緩也役事以勿亟為義上之使下以仁常欲緩而不迫也應鼓田鼓有瞽曰應田縣鼓傳曰應小鞞田大鼓也爾雅大鼓謂之鼖小鼓謂之應則田鼓即鼖鼓也鞉鼓鞉如鼓而小有柄兩耳持其柄搖之則兩耳還自擊鞉與鼗同所以兆奏鼓也商頌曰猗與那與置我鞉鼓奏鼓簡簡衎我烈祖記曰商人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲是奏鼓之前先奏鞉鞉衆器之先商人所以求神亦如周人取蕭取脂行於未祭之先也王制曰天子賜諸侯樂則以柷將之賜伯子男樂則以鞉將之以柷鞉皆所以起樂也柷敔詩作圉孔疏曰柷敔皆以木為之柷狀如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊以起樂者敔狀如伏虎背上有二十七齟鋙刻以木長一尺櫟音厯掠也之以止樂者虡業樅崇牙羽傳曰植者為虡橫者為栒業大板樅崇牙也疏縣鐘磬者兩端有植木其上有橫木謂植立者為虡橫牽者為栒栒上加之大板為之飾謂之業刻板捷業如鋸齒也其縣鐘磬之處又以采色為大牙其狀隆然謂之崇牙樅即崇牙之貌樅樅然也有瞽云崇牙樹羽傳曰樹羽置羽也疏置羽者置之于栒虡之上角禮器制度云為龍頭及領口銜璧璧下有旄牛尾垂于栒虡角之兩旁笙簧樂書古者造笙以曲沃之匏汶陽之篠列管匏中而施簧管端有長短之制法象鳯凰其形鳯翼其聲鳯鳴其長四尺大者十九簧小者十三簧簧者笙管之中金薄鍱也吹笙則鼓動其簧而發聲磬考工記磬人為磬倨句音鉤一短有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其專同端疏句據上曲者股據下直者弦謂兩頭相望者假令句股各一尺今以一尺五寸觸兩弦其句股之形即磬之倨句折殺也股者磬之上鼓者其下所當擊者博為一假如黃鐘之磬股博四寸五分股為二則長倍之為九寸鼓為三則鼓長一尺三寸五分參分其股博去一以為股博則三寸也參分其股博以其一為之厚則一寸也薑兆錫曰倨為下鼓句為上股鼓在下狹而長股在上廣而短以長掩短則鼓長于股者半矩是倨得一矩有半也此不過假矩以約言其度耳竇氏曰已過也上下猶言清濁也摩石之厚薄以調聲之清濁也凡樂器厚則聲清薄則聲濁今聲太清是石太厚故摩石之旁而使薄薄而廣則濁也聲太濁是石太薄薄不可使厚故摩石之端而使短短則形小形小則厚厚則清也臣謹案竇氏曰黃鐘之磬律長九寸其博為一是股廣一律為九寸股為二是股長二律為一尺八寸此其上廣而短也鼓為三是鼓長三律為二尺七寸三分其股博之九寸去一以為鼓博是鼓博六寸此其下狹而長也又三分鼓博之六寸以其一為之厚則下股若上股各厚二寸矣竇氏之説與孔疏異案黃鐘以九起數股廣一律為九寸以下二三俱以律為凖其説似優而孔疏曰黃鐘之磬股廣四寸五分豈僅得黃鐘之半律乎况周尺當今五寸五分弱則四寸五分僅得今二寸三分有竒耳且厚只一寸于今僅踰五分不虞其脆薄不堪擊乎疑當從竇氏簫樂書簫編竹而成長尺有四寸其狀鳯翼其音鳳聲中吕之氣夏至之音也爾雅大簫謂之䇾音言小者謂之筊音交大者長尺四寸二十四管無底而善應故謂之䇾小者長尺二寸十二管有底而交鳴故謂之筊蓋應十二律正倍之聲也管一作管爾雅大管謂之簥音嬌李巡云聲髙大故曰簥長尺圍寸併漆之有底如篪六孔周官小師注如笛而小併兩管而吹之者也塤爾雅注塤燒土為之大者如鵝子鋭上平底形如稱錘六孔釋名云塤喧也聲濁喧喧然大篪爾雅注篪以竹為之長尺四寸圍三寸凡八孔一孔上出寸三分橫吹之鄭司農注周禮云篪七孔蓋不數其上出者也塤篪其竅盡合則為黃鐘其竅盡開則為應鐘蓋相應和也籥籥如笛而六孔主中聲而上下之陸氏德明曰籥以竹為之長三尺執之以舞郭璞云形似笛而小疏籥雖吹器舞時與羽並執故得舞名賓之初筵籥舞笙鼓是也執籥秉翟為文舞朱干玉戚為武舞萬舞其總名象武王以萬人定天下也翟樂書翟五色雉也翟羽可用為儀執之以舞所以為蔽翼者也缶爾雅盎謂之缶注盆也詩陳風坎其擊缶史記藺相如請秦王擊缶則缶是樂器易坎卦六四尊酒簋二用缶缶又是酒器比之初六有孚盈缶襄九年傳具綆缶備水器缶又是汲水之器然則缶是瓦器可以節樂又可盛水盛酒即今之瓦盆也鷺羽鷺翿翿鷺今鷺鷥好而潔白頭上有長毛十數枚以其羽為翳舞者所持以指麾也詩陳風值其鷺羽值毛氏訓持顔師古訓立其意一也孔疏鷺羽執持之物故以值為持鷺羽可以為舞者之翳故持之也翿翳也王風所云左執翿即此鷺羽也毛傳解彼云翿纛也翳也今之羽葆幢舞師所以自蔽翳也附録陳氏稽古編曰禮記下而管象成童舞象鄭注皆以為大武蓋周頌有二象維清奏象舞象文王之事武奏大武象武王之事左傳季札所見武象文王之象也禮器文王世子及內則等所云象皆武王之象也武詩則簫管以吹之故云管象武樂則干戚以舞之故曰舞象先王不制夷禮而制夷樂特設靺師鞮屨氏二職以掌之然有舞而無聲與雅樂不同止以美大王者之德無所不被耳周之王化先到南方故南樂尤重焉旄人以教國子胥鼓南謂鼓其節也而鼓鐘詩舉南樂以總四夷毛韓二家皆云示德廣之所及必有本矣宋儒不信古義遂妄解為二南臣謹案此條以南非二南之南解極新然上云鼓瑟鼓琴笙磬同音以雅以南又云胥鼓南其有聲可知矣而云有舞無聲與雅不同此不可解毛詩類釋卷九
