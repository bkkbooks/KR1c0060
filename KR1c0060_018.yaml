body:
  text: 毛詩類釋卷十八國子監祭酒顧棟髙撰釋蟲龜爾雅龜俯者靈邢疏謂龜行時頭低周禮天曰靈屬是也爾雅有十龜一曰神龜二曰靈龜四曰寶龜書寧王遺我大寶龜是也魯頌元龜象齒毛傳曰元龜尺二寸大戴禮甲蟲三百六十龜為之長貝爾雅貝居陸贆音標貝名在水者蜬音含大者魧音杭書大傳曰大貝如車渠車渠即魧屬陸璣疏云貝者水中介蟲背隆如龜腹下兩開相向類魚齒形中肉如科斗有首尾雲南土人食之古者用其甲為貨正字通云狀如龜黿殼稍長背有甲十二片黑白斑文邊缺如鋸齒無足有四鬛前後長短老者甲厚色眀取時必倒懸其身用熱醋潑之甲逐片墜下陸佃云玳瑁不再交望卵影抱謂之護卵應劭曰雄曰玳瑁雌曰觜蠵貝有五等漢書食貨志以為大貝壯貝么貝小貝不成貝為五小雅菁莪曰錫我百朋朋者謂自小貝而上各二貝為朋而不成貝者不為朋也又以飾器物魯頌貝胄朱綅謂以貝飾胄使有文采蓋古人貨具而寶龜夏后以玄貝殷人以紫石周則有泉貝至秦廢貝行錢然五品之名尚存今貝不復為貨矣蠶爾雅蟓音象桑繭郭注食繭者即今蠶也周禮禁原蠶注原蠶再蠶也蠶與馬同祖再蠶則馬受傷故禁之豳風蠶月條桑程子曰當蠶長之月計嵗氣之早晚不可指定幾月鄭樵曰原蠶傷馬今以蠶為末塗馬齒即不能食草以桑葉拭去乃還食此眀蠶馬類也物莫能兩盛螽斯爾雅蜤音斯螽蜙蝑音嵩胥郭注蜙䗥邢疏周南螽斯羽孔氏正義曰此言螽斯七月云斯螽文雖顛倒其實一也蝗類長角長股股鳴者也或云似蝗而小斑黑其股似玳瑁又五月中以兩股相切作聲聞數十步是也詩緝曰螽斯蝗也蠜也音煩即阜螽非七月所謂斯螽也考爾雅云阜螽蠜李氏陸璣許氏蔡雍之説阜螽即蝗也螣也同是一物爾雅又云蜤螽蜙壻此别是一物蝗之類也螽斯即阜螽非蜤螽也毛氏誤以為此螽斯為蜙壻孔氏因之遂以螽斯斯螽為一物非是春秋書螽即蝗也一生九十九子阜螽阜爾雅作蛗爾雅蛗螽蠜郭注詩曰躍躍阜螽毛傳躍躍躍也大夫妻獨居聞草蟲喓喓然而鳴阜螽躍躍然躍而從之感物類之相從而思其君子詩緝曰阜螽即螽斯也本草李時珍曰狀如蝗蟲有異斑者江東人呼為蚱蜢謂其瘦長善跳窄而猛也孔疏阜螽蝗子也陸璣云充州人謂之螣草蟲爾雅草螽負蠜郭注詩曰喓喓草蟲謂常羊也邢疏草蟲一名常羊陸璣云小大長短如蝗竒音青色好在茅草中故名草蟲陸佃曰蓋草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜也鄭樵曰螽之類多爾雅云阜螽蠜草螽負蠜案阜螽蝗也草螽草蟲也亦謂蚱蜢又蜙蝑一名蜙䗥即一種大青蚱蜢股長而鳴甚響斯螽爾雅蜤螽蜙蝑陸氏璣曰幽州人謂之舂箕蝗類也長而青長腳長股股鳴者也或謂似蝗而小斑黑其股如玳瑁五月中以兩股相切作聲聞數十步江東人呼為吒蛨音摘麥詩緝曰斯螽蜙蝑也蚱蜢也舊説以為即螽斯非也莎雞爾雅螒音汁天雞郭注小蟲黑身赤頭一名莎雞邢疏詩七月云六月莎雞振羽陸璣疏如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲今絡緯蟲是也陸氏佃曰莎雞一名絡緯謂其嗚如魴緯也促織一名投機謂其聲如急織也蟋蟀爾雅蟋蟀蛬音拱又音卭郭注今促織也邢疏唐風蟋蟀在堂嵗聿其莫陸璣疏蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬幽州人謂之促織秋至則鳴故俚語曰促織鳴懶婦驚是也臣謹按朱子曰斯螽莎雞蟋蟀一物隨時變化而異其名動股始躍而以股鳴振羽能飛而以翅鳴然則斯螽乃蟋蟀之未變化者耳其非螽斯之蝗亦眀矣春秋有螽為災異而三物則無嵗無之豈得為一物乎蜩螳爾雅蜩蜋蜩郭注夏小正傳曰蜋蜩者五彩具螳蜩郭注夏小正傳曰螳蜩者蝘俗呼胡蟬詩緝曰據爾雅則蜋蜩與螳蜩為二物矣故爾雅疏云首言蜩者目諸蟬也據詩疏引方言及陸璣之説則諸蟬皆一物無區别矣大雅蕩之書眀云如蜩如螳豈得以為一物乎毛氏於蕩之傳云蜩蟬也螳蝘也其説是矣於豳風四月鳴蜩傳乃云蜩螳者蓋舉其類以相眀非以蜩為螳自為異同也正字通曰蟬類非一統言之皆曰蟬析言之則五采具先諸蟬鳴者曰蜋蜩頭有花冠鳴聲清者曰螳蜩曰蝘螓爾雅蚻音札蜻蜻郭注如蟬而小有文者謂螓衛風碩人云螓首蛾眉正字通曰顙廣且方者曰螓曰蜻蜻故詩以比婦人之首曰螓首蛾正字通曰蠶化者似黃蝶而小朝生暮死蟲碩人詩曰螓首蛾眉蝤蠐爾雅蝤蠐蝎郭注在木中今雖通名為蝎所在異邢疏蟦蠐也蠐螬也蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也以在木中者白而長故詩人以比婦人之頸碩人云領如蝤蠐是也伊威爾雅蛜威委黍郭注鼠􅣁别名又蟠音煩鼠負郭注甕器底蟲邢疏詩東山云伊威在室陸璣云在壁根下甕器底土中生似白魚者是也陶注本草云多在鼠坎中鼠背負之是則蟠也鼠負也伊威也委黍也一物而四名也本草衍義曰濕生蟲也多足色如蚓背有橫文蹙起大者長三四分磚甃及下濕處多有之長樂劉氏曰伊威壁間小蟲也無人掃則出行於室蠨蛸爾雅蠨蛸長踦郭注小鼅蛛即蜘蛛長腳者俗呼為喜子邢疏詩東山云蠨蛸在户陸璣云一名長腳河內人謂之喜母此蟲來著人衣當有親客至有喜也陸佃曰蠨蛸小蜘蛛而足長喜結網當戶人觸之則伸前後足如草令人不疑其為蟲熠耀爾雅螢火即照郭注夜飛腹下有火邢疏詩東山云熠耀宵行本草螢火一名夜光一名熠耀月令季夏腐草為螢腐草此時得暑濕之氣故為螢至秋而天沉隂數雨螢火夜飛之時也蜾螺爾雅果螺蒲盧郭注即細腰蜂也俗呼為蠮螉邢疏詩小宛云螟蛉有子蜾螺負之蜾螺一名蒲盧即細腰蜂也鄭注中庸以蒲盧為土蜂説文云細腰土蜂也天地之性小腰純雄無子螟蛉爾雅螟蛉桑蟲郭注俗謂之桑蟃邢疏陸璣云桑上小青蟲也似步屈其色青而細小或在草萊上蜾螺取桑蟲負之於木空中七日而化為子蜾螺呪之曰類我類我久則肖之是也黃氏日抄曰螟蛉青蟲蜾螺蠮螉古説皆謂蜾螺負螟蛉之子為子置空桑中七日而化如揚子雲所謂類我類我者嚴華谷載解頥新語曰近世詩人取蜾螺之巢毁而視之乃自有細卵如粟寄螟蛉之身以畜之其螟蛉不生不死蠢然在中久則螟蛉盡枯其卵日益長大自為蜾螺之形穴竅而出非蜾螺以螟蛉之子為子也愚戊辰考試省闈聞同官宫教台州董華翁云蜾螺負螟蛉埋土中而寄子其身如雞抱子暖之而使生然其子即蜾螺之子非以螟蛉之子為子詩之説得之楊子雲則失之耳時有監簿永嘉戴侗聞其説亦云常親見蠮螉負螟蛉入筆管有兩蠮螉互飛而共營之初非獨陽無子而外取螟蛉之子為子也如腐草化螢亦螢宿其子於腐草既成形則自腐草而出杜詩云幸因腐草出最精於物理鄭樵曰凡蜂蟻皆不能生子只取他物呪成而陶隱居乃謂此生子如粟米大在房內仍取他蟲置其中以擬其子大為糧也以詩云螟蛉有子蜾螺負之為謬矣後來人有壞其房而看之果見有卵如粟在死蟲之上皆如陶所説此蓋不究其義也諸蟲在蟄尚不食况其形體未定猶在窠中時何得有飢飽也壞其房而見卵與死蟲者是變與未變耳臣謹案黃氏日抄所云鄭夾漈已先闢去只是黃氏未見耳夾漈發眀詩義極精但云蜂蟻皆不能生子只取他物呪成此則未確今蜂蟻何嘗不有子耶蜉蝣爾雅蜉蝣渠略郭注似蛣蜣身狹而長有角黃黑色叢生糞土中朝生暮死邢疏詩曹風云蜉蝣之羽陸璣疏似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出樊光謂之糞中蝎蟲鄭樵曰蜉蝣似蜣蜋而小有文彩螟爾雅食苗心曰螟邢疏言其姦冥冥難知也陸璣曰螟似虸蚄而頭不赤許慎曰吏冥冥犯法即生螟螣爾雅食禾葉曰蟘音特邢疏食禾葉者言假貸無厭故曰蟘也陸璣曰螣蝗也吏乞貸則生蟘蟊爾雅食禾根曰蟊邢疏言其稅取萬民財貨故云蟊也陸璣曰蟊螻蛄食苗根為人患許愼曰吏抵冒取民財則生蟊賊爾雅食苗節曰賊邢疏食禾節者言貪狼故曰賊也陸璣曰賊桃李中蠧蟲赤頭身長而細耳小雅大田云去其螟螣及其蟊賊四種蟲皆蝗屬其害禾處不同故分釋之蠋毛傳蠋桑蟲郭璞曰大蟲如指似蠶正字通云凡草木上皆有之各隨所食草木之性故廣志云藿蠋香槐蠋臭詩蜎蜎者蠋蒸在桑野偶舉桑蠋言之爾雅翼云蠋雖蠺類然蠶萬百為族而蠋則獨行故以興獨宿者蜂爾雅土蜂郭注今江東大蜂在地中作房者名土蜂木蜂郭注似土蜂而小在樹上作房邢疏飛蟲螫人者羅願曰蜂種類至多土蜂黑色最大者螫人至死周頌小毖云莫豫荓蜂自求辛螫荓使也言管蔡之事無人使蜂螫我乃我自求辛螫之苦耳自怨自艾之詞也蠅爾雅蠅醜扇郭注好搖翅邢疏青蠅之類好搖翅自扇也小雅營營青蠅長樂劉氏曰蛆蟲所變而成者青蠅也其飛之聲則營營然亂人之聽其止於物則穢敗之又從而生蛆復變為蠅其穢敗於物無有紀極也詩緝曰蠅能汙白為黑如讒人之誣衊善類驅去復還如小人之易進而難退故以取喻蛇爾雅螣音騰螣蛇郭注龍類能興雲霧而遊其中蟒王蛇郭注蟒蛇最大者故曰王蛇按小雅斯干詩維虺維蛇女子之祥朱傳曰虺蛇隂物穴處柔弱隂伏女子之祥也虺爾雅蝮虺博三寸首大如擘郭注身廣三寸頭大如人擘指邢疏擘拇指也頭如拇指有牙最毒細頸大頭色如艾綬文文間有毛似豬鬚鼻上有針大者長七八寸埤雅云虺狀似蛇而小銘云為虺弗摧為蛇奈何史記田榮曰蝮螫手則斬手螫足則斬足為其害於身也則虺之毒更甚鄭樵曰江淮以南曰蝮江淮以北曰虺蜴爾雅蜥蜴守宫也邢疏詩小雅正月哀今之人胡為虺蜴謂此也在草澤中者為蜥蜴在壁者名守宫博物志云以器養之食以硃砂體盡赤重七斤搗萬杵以點女人體終身不滅耦則落故號守宫陸璣疏青緑色大如指形狀可惡是也蜮毛傳蜮短狐孔疏洪範五行傳云蜮如鱉三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生也陸璣云一名射影江淮水中皆有之人在岸上影在水中投人影則殺人故曰射影南人將入水先以瓦石投水中令水濁然後入或曰含沙射人皮肌其瘡如疥是也詩小雅為鬼為蜮則不可得言其潛伏人不得而見也毛詩類釋卷十八
