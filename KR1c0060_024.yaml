body:
  text: 毛詩類釋續編卷中國子監祭酒顧棟髙撰釋言旬宣遍也大雅江漢云來旬來宣毛傳旬遍也鄭箋宣遍也底同耆致也周頌下武云耆定爾功毛傳耆致也王肅曰致定其大功謂誅紂定天下也遹述也謂述行之也大雅文王有聲遹駿有聲是也敖傲也周頌絲衣云不吳不敖敖謂傲慢也征邁行也詩曰王于出征又曰周王于邁皆謂出行饙音分詩作餴稔也大雅泂酌云可以餴饎饙餴音義同說文云饙一蒸米也蒸米謂饙稔熟也今人呼嵗熟為稔媵將送也左傳以媵秦穆姬詩曰逺于將之皆謂送也鞠究窮也大雅雲漢云鞠哉庶正小雅節南山云以究王訩皆謂窮也丁應當也大雅雲漢云寧丁我躬又下武云媚茲一人應侯順德鄭箋可愛乎武王能當此順德謂能成其祖考之功嚴氏曰天下媚愛于武王而應之以順德則以應為感應之應義較順茹度也邶柏舟云不可以茹鄭箋鑒之察形但知方圓黑白不能度其真僞我心非如是於人之善惡外內俱度知之嚴氏曰柔則茹之為吞納之意言鑒不擇妍醜皆納其影我心則不能兼容善惡毛以茹為度今不從案嚴蓋宗歐陽及朱子之意似較勝廣韻茹食也菜之入口名為茹若茹草茹毛皆吞啖之名榖履祿也書曰既富方穀詩曰福履綏之榖又作善字解小雅蓼莪民莫不榖是也憯曾也小雅節南山云憯莫懲嗟猶言曾莫懲創嗟閔曽是發語辭錢氏曰憯痛也終缺妥僾唈也大雅桑柔云如彼遡風亦孔之僾僾謂嗚唈短氣遡嚮也疏云風唈人氣令人不能喘息紕飾也詩干旄云素絲紕之紕謂緣飾也烘燎也煁烓也注今之三隅竈小雅白華云樵彼桑薪卬烘于煁煁是無釜之竈其上然火謂之烘本為此竈止以然火照物若今之火爐也舫詩作方泭也泭音孚詩云不可方思論語乘桴浮於海注桴編竹木為之大曰筏小曰桴舫方泭桴音義並同懠怒也大雅板云天之方懠舍人云懠怒聲也葵揆也小雅采菽云天子葵之襄除也詩曰牆有茨不可襄也又曰玁狁于襄俱謂除去之意爾雅又作駕字解者鄭風云兩服上襄又有作助字解者書曰贊贊襄哉是也苞稹也詩曰集于苞栩毛傳苞稹也鄭箋稹者根相逼迮梱綴訛化也詩曰四國是訛孺屬也常棣云和樂且孺屬謂親屬鄭箋屬者昭穆相次序虹潰也大雅抑篇云實虹小子召旻云蟊賊內虹闍臺也鄭風云出其闉闍毛傳闉曲城也闍城門臺訩訟也小雅節南山云降此鞠訩言多爭訟諗念也四牡云將毋來諗言相思念啓跪也四牡云不遑啓處郭云小跽說文云跽長跪也嚴氏曰跽者雙膝著地而直身坐者雙膝著地而坐也翿纛也纛翳也王風云左執翿毛傳翿纛也翳也今之羽葆幢以旄牛尾為之大如斗舞者執之所以自蔽翳芼搴也周南云左右芼之芼謂拔取菜拔菜而擇之也芾小也召南云蔽芾甘棠芾是木幹及葉之小者也皇華也四牡云皇皇者華草木之華一名皇孫炎云皇皇猶煌煌毛詩類釋續編卷中
