  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0060_WYG_007-1a, image: WYG0088/WYG0088-0069c.png}
body:
  text: 毛詩類釋卷七國子監祭酒顧棟髙撰釋官職卿士疏鄭以卿士為六卿之外更為都官兼總六官之事朱傳或曰卿士蓋太宰之屬公羊所謂宰士以宰屬而兼總六官位卑而權重也許氏謙曰王命卿士南仲太祖太師皇父是以卿士而兼太師太師三公之首則非太宰之屬明矣常武之皇父是賢者蓋非十月之皇父然足以證或説之未然臣謹案卿士之説不見于周官詩書及左傳俱有之此士字當作事字看蓋以正卿而兼總六官之事古字通也隱九年鄭伯為王左卿士桓五年王奪鄭伯政則卿士得專國政豈宰士之所可比乎宰士即宰夫有上中下士在小宰之下小宰在太宰之下僖三十年王使宰周公閲來聘杜注周公卿士天子三公兼冡宰是以卿士而兼太師三公之官至商頌阿衡亦曰賚于卿士卿士不屬於太宰明矣周自鄭虢爭政以後匡定簡靈四朝世有爭政之禍者皆卿士也朱傳特考之不審耳箋禮畿內諸侯二卿皇父封於畿內而立三有事是增一卿以比列國也許氏謙曰選朝臣以為其國之臣又不能選賢唯取貨賄至使朝廷一空司徒箋司徒之職掌天下土地之圖人民之數周禮地官大司徒卿一人冡宰箋冡宰掌建邦之六典周禮天官太宰卿一人膳夫箋膳夫掌王之食飲膳羞周禮天官膳夫上士二人葉氏曰膳夫之職其辨物也以時其取物也不妄足以移氣移體耳目聰明又掌于天官西漢太官令猶𨽻于少府而掌于丞相御史東漢始以奄主之晉屬之光祿渡江已後又𨽻之侍中唐則𨽻之內侍省而大臣皆無政令于其間矣王氏曰論者謂王莽之椒酒梁冀之煮餅皆因飲食以肆大惡使周公之法行安得有此乎內史箋內史掌爵祿廢置殺生豫奪周禮春官內史中大夫一人案宣王時尹吉甫蓋為內史掌䇿命卿大夫趣馬箋趣馬掌王馬之政周禮夏官趣馬下士一人師氏箋師氏掌司朝得失之事周禮地官師氏中大夫一人季氏本曰七人之中卿士最為要職其餘六人皆皇父所引用也崇卑不一當以寵任為先後司空箋司空卿官也掌營國邑疏司空之職有匠人其職有營國廣狹之度廟社朝市之位太王以殷之大國當立三卿其一蓋司馬而不召者以于營國之士無所掌故也祈父傳祈父司馬也職掌封圻之兵甲故書又曰圻父圻即祈古字通也常武之詩曰王謂尹氏命程伯休父左右成行戒我師旅蓋命為司馬之官疏程國之伯字休父世為重黎氏掌敘天地當宣王時失其官守而為司馬氏太師傳太師周之三公也臣謹案稱尹氏太師又云太師皇父尚書周官三公之職論道經邦燮理隂陽其尊居六卿之上故曰維周之氐四方是維天子是毗其職任綦重矣而周禮無公孤之官苐于大司徒職云鄉老二鄉則公一人至鄉老之職又闕所以世儒多疑其偽阿衡箋阿衡伊尹官名阿倚衡平也言湯所依倚而取平者蓋周太宰之官言降于卿士者蓋以三公兼卿士也寺人箋寺人王之正內五人注寺之言侍也正內路寢也掌侍于王之路寢故名雜説曰幽王時寺人傷于讒作巷伯之詩後世寺人多賊忠良招權勢今反惡讒如此古之內臣能守法者雖當亂世猶惡無禮况成周時乎候人傳候人道路送迎賓客者疏周禮夏官候人上士六人下士十有二人彼天子之候人是上士下士則諸候之候人亦應是士也倌人傳倌人主駕者疏諸侯之禮亡未聞倌人為何田畯傳田畯田大夫爾雅釋言云畯農夫也郭璞注今之嗇夫是也在田司主稼穡漢及東晉猶有此官周時選俊人主田事謂之田畯以王者尤重農事故知其爵為大夫鄭注周禮載師云六遂餘地自二百里以外天子使大夫治之以周禮無田畯正職故直云田畯田大夫也詩詁云六遂中鄰里酇鄙縣遂之長髙者為大夫卑者為長通稱田畯蓋農田之俊也保介箋保介車右也周禮夏官司右上士二人謂居車右為驂乘如戎右道右之類也也月令孟春天子親載耒耜措之于參保介之御間謂措耒耜于參乘車右及御者二人中間保衣也介甲也車右勇士衣甲以備非常庶正傳庶正庶官之長疏周禮三百六十每官各有其長鞠哉庶正是總言羣臣冡宰以下乃歷數其人也公路箋公路主君之軞車庶子為之晉趙盾為軞車之族是也疏宣二年晉成公宦卿之適以為公族又宦其庶子為公行趙盾請以括為公族注盾自以為庶子讓公族而為公行言為軞車之族者軞車戎車之倅杜預云公行之官是也公行箋公行主君兵車之行列疏云公路與公行一也以其主君路車則謂之公路以其主兵車之行列則謂之公行變文以韻耳公族箋公族主君同姓昭穆疏成十八年傳晉荀會欒黶韓無忌為公族大夫使訓卿之子弟是公族主君之同姓也此公族公行諸侯之官故魏晉有之若天子則巾車掌王之五路車僕掌戎車之倅周禮六官皆無公族公行之官是天子諸侯異禮也大人疏大人占夢之官牧人為此夢以告占夢之官占夢之官又獻之於王周禮春官占夢中士二人史二人正月云召彼故老訊之占夢譏王不尚道德専信徴祥侮慢故老故刺之非謂夢不當占也諸宰疏周禮膳夫親徹阼俎以阼俎最尊也其餘則其屬徹之言諸宰者以膳夫是宰之屬官宰膳皆食官之名膳夫上士二人中士四人下士八人故言諸也牧人周禮地官牧人下士二人鄒肇敏曰牧人掌牧六牲而阜蕃其物以供祭祀之牲牷凡陽祀用騂牲隂祀用􅉳牲望祀各以其方之色凡時祀之牲必用牷物外祭毁事用尨蓋至爾牲則具而牧人之職克舉矣僕夫傳僕夫御夫也御亦作馭疏周禮戎僕中大夫二人掌御革路以即戎馭夫中士二十人下士四十人掌御二車從車傳言僕夫為馭夫者以下云謂之載矣是裝載物為從車之事故為御夫其實此僕夫戎僕亦在內以戎車及副各自有御或官之長者為戎僕小者為御夫也臣謹案周禮校人之職三乘為皂皂一趣馬三皂為繫繫一御夫六繫為廄馬凡二百一十六匹廄一僕夫注僕夫即大馭至田僕掌駕王之五路者是周禮本有僕夫之官而出車係戎事其為戎僕可知載亦不必定是裝載物也玩文義當云載乘而出于上下文語氣較合第二章言僕夫况瘁憂其馬之不正明是將帥所乘其為戎僕益明矣他書俱言敢告僕夫僕夫自是要職顯載周禮傳解似誤矇瞍有瞽箋凡聲使瞽矇為之周禮春官太師之屬瞽矇三百人上瞽四十人中瞽百人下瞽百冇六十人以才知為之次疏有眸子而無見曰矇無眸子曰瞍傅御箋傳御者二王治事謂冡宰也朱傳曰傅御申伯家臣之長漢明帝送侯印與東平王蒼諸子而以手詔賜其國中傅蓋古制如此臣謹案傅御朱傳解極當王之冡宰極尊而以遷申伯之私人不應褻體乃爾毛詩類釋卷七
