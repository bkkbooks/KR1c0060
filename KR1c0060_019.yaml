body:
  text: 毛詩類釋卷十九國子監祭酒顧棟髙撰釋魚龍爾雅有鈴曰旂郭註縣鈴於竿頭畫交龍於旒邢疏畫二龍於旂上一升一降相交詩周頌龍旂陽陽是也鱗蟲三百六十龍為之長鼉毛傳鼉魚屬陸璣疏鼉形似蜥蜴四足長丈餘甲如鎧甲皮堅宜冒鼓詩大雅鼉鼓逢逢是也鄭樵曰鼉狀如鯪鯉長一二丈者能吐氣成霧致雨善攻碕岸性嗜睡常閉目極難死聲甚可畏其皮可冒鼓鼈爾雅鼈三足能音台郭註山海經曰從山多三足鼈吳興郡陽羡縣君山上有池池中出三足鼈食之無蠱埤雅云鼈純雌無雄與黿為匹故黿鳴而鼈應李時珍曰鼈行蹩躠故謂之鼈一名神守陸佃曰魚滿三千六百則蛟龍引之而飛納鼈守之則免詩六月云炰鼈膾鯉臣謹按本草三足鼈食之殺人太倉民家得三足鼈命婦烹食之入卧少頃形化為血水惟髪存耳鄰人疑其婦謀害訟之官時知縣黄廷宣鞠問不决乃别取三足鼈令婦如前烹治取死囚食之入獄亦化如前人遂辨其獄而山海經云從山多三足鼈食之無蠱其説相反豈古今之性異耶鯉爾雅鯉郭註今赤鯉魚邢疏詩陳風云豈其食魚必河之鯉是也本草鯉無大小皆三十六鱗鱗有小黑㸃為諸魚之長能神變化飛江湖所以仙人琴髙乗之鱣爾雅鱣郭註鱣大魚似鱏音尋而短鼻口在頷下體有邪行甲無鱗肉黄大者長二三丈今江東呼為黄魚邢疏陸璣云鱣出江海三月中從河下頭來上形似龍鋭頭口在頷下背上腹下皆有甲縱廣四五尺今於盟津東石磧上釣取之大者千餘斤可蒸為臛又可為鮓魚子可為醬陸佃曰詩云施罛濊濊鱣鮪發發鱣鮪健魚故其跳躍發發然不麗於罛而碩人以刺莊公詩於鱣鮪言發發於魴鱮言唯唯則魚之健弱可知也鮪爾雅鮥音洛鮇音叔鮪郭註鱣屬大者名王鮪小者名鮇鮪今宜都郡自京門以上江中通出鱣鱏之魚有一魚狀如鱣而小建平人呼鮥子即此魚也邢疏陸璣云鮪形似鱣而青黑頭小而尖似鐡兠鍪口亦在頷下其甲可以摩薑大者不過七八尺鮇鮪一名鮥肉色白味不如鱣也月令季春薦鮪於寢廟天官漁人春薦王鮪是也鱒爾雅鮅音必鱒郭註似鯶子赤眼邢疏鮅一名鱒詩云九罭之魚鱒魴陸璣云鱒似鯶魚而鱗細於鯶赤眼是也正字通云似鯶細鱗青質赤章目中一道赤横貫瞳俗呼赤眼魚一説蹲好獨行故從鱒見網輙逝埤雅云鱒魚圓魴魚方魴爾雅魴魾音毗郭註江東呼魴魚為鯿一名魮邢疏詩云其魚魴鰥陸云魴魚廣而薄肥恬而少力細鱗魚之美者遼東梁水魴特肥而尤美於中國語曰居就糧梁水魴是也正字通云魴魚小頭縮項闊腹穹脊細鱗色青白腹内肪甚腴詩周南魴魚頳尾註魚勞則尾赤魴尾本白而今赤則勞甚也又陳風豈其食魚必河之魴魴之美可知鰥爾雅鯤魚子郭註凡魚之子總名鯤邢疏詩云其魚魴鰥鄭云鰥魚子鯤鰥字異葢古字通用也臣謹按毛以鰥為大魚鄭意以鰥若大魚則強笱亦不能制不當以敝笱為喻故易傳以為魚之小者喻文姜本易制但魯桓微弱不能防閑耳據此則鄭説為長鱮鄭箋鱮似魴而弱鱗廣韻云鰱也陸璣曰鱮似魴厚而頭大魚之不美者故里語曰網魚得鱮不如啖茹詩云其魚魴鱮陸佃曰性旅行故其制字從與亦或謂之鰱失水即死魚之至弱者也下文唯唯則魚無不順從随行亦以比文姜本無能為但魯桓微弱曽敝笱之不如耳鱨陸璣云鱨一名黄頰魚似燕頭魚身形厚而長大頰骨正黄魚之大而有力解飛者徐州人謂之揚黄頰鱨揚也以其輕揚善飛故曰揚大者長尺七八寸鯊爾雅鯊鮀音陁郭註今吹沙小魚體圓而有㸃文邢疏詩小雅云魚麗于罶鱨鯊陸璣云魚狹而小常張口吹沙故曰吹沙葢沙性善沉常沙中行亦於沙中乳陸佃曰詩備陳鱨鯊魴鱧鰋鯉葢鱨也魴也鯉也其性浮鯊也鱧也鰋也其性沉而罶則嫠婦之笱其用功寡又以待魚之自至今魚麗于罶鱨鯊魴鱧鰋鯉沉浮大小羙惡與其形色之異具有則餘物盛多可知也鱧爾雅鱧鯇音混郭註今鯶魚似鱒而大邢疏詩小雅魚麗于罶魴鱧舍人云鱧一名鯇郭所不取正字通曰鯇音混形長身圓肉一名鯶有青鯇白鯇白者味勝本草曰鯇似鯉生江湖間膽至苦止喉閉又音莞俗以鯇性食草謂為草魚即鯶魚也詩緝曰毛氏以鱧為鮦本草云今黑鯉魚道家以為厭者也郭璞曰鱧鮦山隂陸氏云鱧今𤣥鯉與蛇通氣是郭璞陸佃皆同毛説以鱧為今之烏鯉魚也舍人云鱧一名鯇陸璣曰鱧鯇也似鱧頰狹而厚江東人通呼鯶子魚是舍人與陸璣皆以鱧為鯇魚也今從之顧夢麟曰鱧鮦本郭璞解吾吳中呼為黑魚非佳味曰鱧鯇則舍人釋也鯇今呼為鯶魚鰋爾雅鰋鮎音拈邢疏詩小雅魚麗于罶鰋鯉孫炎曰鰋一名鮎是以鰋鮎為一物郭氏則别為二云鰋者今鰋額白魚鮎則名鯷音題江東通呼鮎為鮧是郭氏所以異也許氏謙曰詩緝毛氏及前儒皆以鮎釋鰋惟郭璞以鰋鮎各為一魚按本草云鮧一名鮎一名鯷不言是鰋是郭璞與本草合毛傳質畧當言似鮎耳爾雅翼云鮧鮎别名鰋額兩目上陳口方頭大尾小身滑無鱗謂之鮎魚言其黏滑也諺謂鮎魚上竹竿葢謂竹之與魚皆滑必無上之理故反言之顧夢麟曰朱子以鰋釋鮎亦本毛傳然爾雅自作一魚鮎在吳中亦下味不貴也華谷云只當言鰋似鮎是鰷爾雅鮂音囚黑鰦郭註即白鯈邢疏詩頌曰鰷鱨鰋鯉此即所謂鰷也説文鰷白鰷也其形纎長而白故曰白鰷又曰白鯈此魚好逰水上故莊子觀於濠梁稱鯈魚出逰從容以為魚樂陸佃埤雅云鰷形狹而長若條性浮似鱨而白嘉魚埤雅嘉魚鯉質鱒鱗肌肉甚美食乳泉出於丙穴二口向丙故曰丙也左太冲蜀都賦云嘉魚出於丙穴注云丙穴在漢中沔陽縣北有乳穴二所常以三月取之丙地名也杜甫詩云魚如丙穴由來美則嘉魚固厯代所貴矣附捕魚具罛爾雅魚罟為之罛郭註最大罟也邢疏捕魚之具最大者名罛詩衛風云施罟濊濊是也九罭爾雅緵罟謂之九罭魚網也郭註今之百囊罟邢疏孫炎曰九罭謂魚之所入有九囊詩豳風云九罭之魚鱒魴是也罶爾雅嫠婦之笱謂之罶郭註毛詩傳曰曲梁也謂以薄為魚笱邢疏小雅曰魚麗于罶孫炎曰罶曲梁以薄為魚笱其功易就故謂之寡婦之笱非寡婦所作也罩爾雅籗音霍謂之罩郭註捕魚籠也邢疏籗編細竹以為罩孫炎云今楚籗也然則罩以竹為之無竹則以荆故謂之楚籗皆謂捕魚具詩小雅南有嘉魚烝然罩罩是也汕爾雅罺音朝謂之汕郭註今之撩罟邢疏汕謂以薄汕魚也詩小雅南有嘉魚烝然汕汕傳云樔也箋云樔今之撩罟是也陸佃云上籠之如罩下撩之汕汕至誠之道也淮南子曰罩者抑之罾者舉之為之雖異得魚一也觀此則知詩人先言罩後言汕者以見其求賢之無方也笱毛傳笱竹器承梁之空以取魚者爾雅嫠婦之笱謂之罶詩詁曰古者川澤之利以時取之非其時有禁惟嫠婦上所矜閔使為笱得取魚若遺秉滯穂之意正字通曰詩敝笱在梁魚麗于罶皆所以取魚非嫠婦獨有之弼風無逝我梁無發我笱雖棄婦託言以戒新昏足證未棄以前有笱非夫亡而後有笱也爾雅笱耑屬嫠婦泥甚詩詁亦屬附會潛爾雅槮音孫謂之涔郭註今之作槮者聚積柴木於水中魚得寒入其裏藏隠因以薄圍捕取之邢疏詩周頌云潛有多魚小爾雅曰魚之所息謂之潛潛槮也積柴水中魚舎也毛詩類釋卷十九
