  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0060_WYG_023-1a, image: WYG0088/WYG0088-0198c.png}
body:
  text: 毛詩類釋續編卷上國子監祭酒顧棟髙撰釋詁俶落權輿始也小雅大田曰俶載南畝周頌曰訪豫落止秦風曰于嗟乎不承權輿疏俶者動作之始落者木葉隕墜之始權輿者天地之始也陳氏曰造衡自權始造車自輿始林蒸君也小雅賓筵曰有壬有林文王有聲曰文王蒸哉疏説文云平地有叢木曰林蒸者左傳云天生蒸民之以君司牧之故以林蒸為君也餤音談蒸進也小雅巧言云亂是用餤毛傳餤進也周頌豐年云蒸畀祖妣魯頌閟宫云蒸徒增增鄭箋俱云蒸進也又有作衆字解者大雅天生蒸民是也介純夏幠墳奕戎駿假濯訏壬淫甫景廢冡昄席大也大雅韓奕云以其介圭入覲于王介圭大圭也魯頌閟宫云天錫公純嘏鄭箋純大也秦風云於我乎夏屋渠渠小雅巧言云亂如此幠毛傳俱云大也鄭箋幠敖也大雅韓奕云奕奕梁山又云纘戎祖考江漢云肇敏戎公毛傳俱云大也鄭云戎猶汝也與爾雅異商頌長發云為下國駿厖那篇云湯孫奏假大雅文王有聲篇王功伊濯抑篇云訏謨定命小雅賓筵篇有壬有林駿假濯訏壬毛傳俱云大也鄭云壬任也謂君所任卿大夫也與爾雅異周頌有客云既有淫威齊風云無田甫田淫甫毛傳俱云大也周頌潛篇云以介景福鄭箋景大也小雅廢為殘賊莫知其尤一本作廢大也此是王肅義本釋詁毛傳云廢􅏸也説文􅏸習也言在位之人慣習為此殘賊之行莫有自知其過惡與爾雅異似此説較優詩緝曰山有栗梅之嘉卉今其山廢為殘賊之地民不自知其何辜詩記略同鄒肇敏曰猶離騷所謂蘭芷變而不芳荃蕙化而為茅何昔日之芳草兮今直為此蕭艾也講廢字更眀白正當周頌綿篇曰乃立冡土毛傳冡大也冡土大社也大雅卷阿云爾土宇昄章鄭風云緇衣之席昄席毛傳俱云大也弔摧詹至也小雅天保云神之弔矣毛傳弔至也案書盤庚弔由靈弔字亦作至字解大雅雲漢云先祖于摧毛傳摧至也言民將餓死先祖之神於何所歸而至乎鄭轉摧為嗺嗺者咨嗟告困之辭詩緝則曰民無遺類若此何不畏先祖之業摧落乎不煩改字文較明順小雅采緑曰六日不詹毛傳詹至也鄭云五月之日六月之日也婦人過時則怨曠鮮類攻榖介善也弼風新臺云籧除不鮮鄭箋鮮善也大雅既醉云永錫爾類毛傳類善也小雅車攻云我車既攻攻者堅緻之善蓼莪云民莫不榖榖者養生之善也大雅板篇云介人維藩介作價音義同毛傳介善也鄭箋介甲也被甲之人謂卿士掌軍事者與爾雅異毛説為妥朱傳云介大也亦本釋詁遹自也又遹循也大雅綿篇云聿來胥宇遹聿音義同康誥云祗遹乃文考孔傳今治民將在敬循文考之事是遹又為循也靖漠謀也小雅小眀云靖共爾位毛傳靖謀也巧言云聖人莫之漠莫音義同謂心之謀也王氏曰莫定也于曰也小雅六月云王于出征鄭箋于曰也秦風王于興師鄭又曰于於也與爾雅異又有作往字解者豳風三之日于耜一之日于貉晝爾于茅是也貊靜也大雅皇矣篇貊其德音鄭箋云德政應和曰貊言靜也摽蘦落也召南云摽有梅鄘風定之方中云靈雨既零蘦零音義同尸職主也召南采蘋云誰其尸之毛傳尸主也小雅巧言云職為亂階鄭箋職主也績緒貫公事也商頌云設都于禹之績魯頌閟宫云纘太王之緒魏風碩鼠云三嵗貫女周頌酌篇云實維爾公允師績緒貫公俱謂事也卬我也邶風匏有苦葉云人涉卬否毛傳卬我也熲光也小雅無將大車云不出于熲熲火光也寁駿速也周頌清廟云駿奔走鄭注疾奔走言勸事也鄭風遵大路曰不寁故也毛傳寁速也詩緝曰速猶言倉卒也曰子無惡我而不留不可倉卒於故舊謂棄去之速也得此才眀白那多也小雅桑扈云受福不那流差擇也釋言又云流求也周南關雎云左右流之小雅吉日云既差我馬皆謂選擇也愈㾖癢癙底閔疚痗瘥痱􅓠瘵瘼病也小雅角弓云交相為愈正月云癙憂以癢又曰亦孔之痗白華云俾我疷兮鴟梟云鬻子之閔斯節南山云天方薦瘥采薇云憂心孔疚四月云百卉具腓腓痱音義同大雅板篇云下民卒􅓠瞻仰云士民其瘵桑柔云瘼此下民皆謂病也長樂劉氏曰鼠病而憂在於穴內人所不知也解鼠字更親切十月云悠悠我里㾖同里悝盱憂也小雅十月云悠悠我悝周南卷耳云云何盱矣皆謂憂愁也勩卭疸勞也小雅雨無正云正大夫離居莫知我勩巧言云維王之卭大東云哀我憚人毛傳憚勞也憚疸音義同履戩祓福也周南樛木云福履綏之小雅天保云俾爾戩榖大雅卷阿云茀祿爾康祓茀音義同與履戩皆謂福祜也鄭箋茀福也毛傳茀小也與爾雅異鄭義較妥熯敬也小雅楚茨云我孔熯矣謂謹敬也詩緝曰説文熯乾貌中谷有蓷暵其乾矣熯暵同左傳外強中乾馬勞如是人亦如之久勞而乾竭解更勝肆故今也大雅綿云肆不殄厥愠毛傳肆故今也案爾雅本以二字解一肆字郭將二字拆開以故為新故之故失其旨矣朱子改為肆猶遂也則與尚書肆豫小子發肆豫以爾衆士講不通不如原詁為順亶肶埤竺音篤腹厚也亶者誠之厚也小雅棠棣云亶其然乎大雅桑柔云逢天僤怒小雅天保云俾爾單厚周頌云單厥心皆訓厚也亶疸單音義同肶輔也埤益也壯門云政事一埤益我節南山云天子是毗采菽云福祿膍之肶毗膍音義同竺與篤同腹者蓼莪云出入腹我月令云氷澤腹堅孔魄延間也小雅角弓云如酌孔取孔穴也月無光之處名魄延者今墓道是皆有間隙也庭直也小雅大田云既庭且碩劉暴樂也暴音剝樂音洛謂木枝葉缺落稀踈不均桑柔云捋采其劉毛傳爆爍而稀人息其下無所庇蔭也串貫習也大雅皇矣云串夷載路齊風猗嗟云射則貫兮皆是習也震戁妯騷蹶動也大雅生民云載震載夙商頌長發云不戁不竦戁者恐動也小雅鼓鐘云憂心且妯大雅常武云徐方繹騷又綿篇云文王蹶厥生戁騷蹶皆搖動貌馘穧獲也魯頌泮水云在泮獻馘鄭云馘所格殺者之左耳小雅大田云此有不斂穧穧是禾之鋪而未束者剡羊冉切㗉音略利也小雅大田云以我覃耜剡覃音義同周頌載芟云有略其耜㗉略音義同拼使也大雅桑柔云荓云不逮拼荓音義同周頌小毖云莫豫荓蜂王氏曰荓使也毛詩類釋續編卷上
