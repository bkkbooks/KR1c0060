body:
  text: 毛詩類釋卷十六國子監祭酒顧棟髙撰釋鳥鳳凰爾雅鶠鳳其雌凰郭注瑞應鳥雞頭蛇頸燕頷龜背魚尾五彩色髙六尺許許慎説文云神鳥也出於東方君子之國翺翔四海之內過崑崙飲砥柱濯羽弱水暮宿丹穴見則天下大安寧鳳飛則羣鳥從以萬數鄭樵曰其雛曰鸑鷟晨鳴曰發鳴朝鳴曰上翔晝鳴曰滿昌昏鳴曰固常夜鳴曰保長脊令爾雅鶺令雍渠郭注雀屬也飛則鳴行則搖邢疏鶺令一名雍渠水鳥小雅云脊令在原陸璣疏大如燕雀長腳長尾尖喙背上青灰色腹下白頸下黑如連錢陸佃曰俗呼雪姑其色蒼白如雪程子曰言脊令首尾相應兄弟急難之時其相應如是也鷺白鳥爾雅鷺春鉏郭注白鷺也頭翅背上皆有長翰毛邢疏鷺一名春鉏陳風云值其鷺羽陸璣疏鷺水鳥也好而潔白故謂之白鷺青腳高尺七八寸尾如鷹尾喙長三寸頭上有長毛十數枚毿毿然與衆毛異好入水取魚楚威王時有朱鷺合沓飛翔而來舞樂府有朱鷺曲但赤者絶少埤雅鷺白鳥也大雅麀鹿濯濯白鳥翯翯即此黃鳥倉庚爾雅皇黃鳥郭注俗呼黃離留亦名摶黍邢疏皇名黃鳥周南云黃鳥於飛陸璣疏黃鳥黃鸝留也常以椹熟時來故里語曰黃栗留看我麥黃椹熟否故又名黃栗留一名倉庚七月詩倉庚于飛熠熠其羽蓋正當仲春嫁娶之時爾雅又名黧黃又名楚雀蓋一物而有六名燕玄鳥爾雅燕燕鳦音乙郭注詩云燕燕于飛一名玄鳥齊人呼鳦邢疏燕燕即今之燕古人重言之漢書童謡云燕燕尾涏涏是也其色黑故又名玄鳥商頌天命玄鳥降而生商本紀簡狄吞燕卵而生契而諸緯候皆言吞鳦卵是玄鳥又名鳦也鄭樵曰陸璣云燕有二種爾雅又曰燕白脰烏則知此為紫燕矣鴛鴦毛傳鴛鴦匹鳥陸氏佃曰鳬類雄雌未嘗相離人得其一則一思而死故先王慎於取之鴛鴦之詩一章曰鴛鴦于飛畢之羅之言于其飛然後畢之羅之也則不毁卵不射宿故也二章曰鴛鴦在梁戢其左翼言以我交於萬物有道故彼于止得其所止也雎鳩爾雅雎鳩王雎七徐反郭注雕類今江東呼之為鶚好在江渚食魚毛詩傳曰鳥摯而有别邢疏王雎一名雎鳩周南云關關雎鳩陸璣疏雎鳩大小如鴟深目目上骨露幽州謂之鷙鷙而有别此即關雎傳文鷙至也謂鳥中雌雄情意至厚而猶能有别故以興后妃毛傳雎鳩鶚也即郯子所謂雎鳩司馬氏也杜預注摯而有别故為司馬法制陸佃曰語云雎鳩不再匹徐鉉草木蟲魚圖書云雎鳩常在河洲之上為儔偶更不移處蓋鶚性好跱每立更不移處所謂鶚立義取諸此俗云雎鳩交則雙翔别則立而異處是謂鷙而有别蘇氏曰鳥之鷙者不淫歐陽氏曰此詩不取其鷙取其别也鄭樵曰凡鴈鶩之類其喙扁者則其聲關關雞雉之類其喙鋭者則其聲鷕鷕此天籟也雎鳩之喙似鳬鴈故其聲如是又得水邉之趣也使不識雎鳩則安知河洲之趣與關關之聲乎鳲鳩爾雅鳲鳩鴶鵴音吉掬郭注今之布榖也邢疏曹風鳲鳩在桑其子七兮召南維鵲有巢維鳩居之皆謂此埤蒼云鴶鵴方言曰戴勝陸璣疏按梁宋之間謂布榖為鴶鵴戴勝自生穴中不巢生而方言云戴勝非也歐陽氏曰今所謂布榖戴勝者與鳩絶異今人直謂之鳩者拙鳥也不能作巢多在屋瓦間或於木上架結木枝初不成窠便以生子往往墜雛鵲作巢甚堅既生雛散飛則棄而去容有鳩來處彼空巢孔詩疏鳲鳩之養七子旦從上而下莫從下而上平均如一詩緝曰即郯子所謂鳲鳩氏司空也鳲鳩平均故為司空平水土鳴鳩爾雅鶌鳩鶻鵃音骨嘲鶌居物切郭注似山鵲而小短尾青黑色多聲今江東亦呼為鶻鵃邢疏即郯子所謂鶻鵃氏司事也春來秋去故為司事小雅宛彼鳴鳩翰飛戻天月令鳴鳩拂其羽即此詩緝曰鳴鳩即氓詩食椹之鳩郯子所謂鶻鳩氏司事莊子所謂鷽鳩也舊説及廣雅皆云斑鳩非是陸氏佃曰莊子所謂鷽鳩笑之者是也多聲故名鳴鳩鳴鳩小物決起而飛搶榆枋時則不至控於地而已矣今飛戻天勉強故也性食桑椹陸璣云一名斑鳩似鵓鳩而大項有繡文斑然與此鶻鳩全異璣之言非是此鳥喜朝鳴故曰鶻嘲也此鳥朝鳴曰嘲夜鳴曰㖡隼音追爾雅隹其鳺音夫紏郭注今䳕鳩邢疏隼一名夫郯子所謂祝鳩氏司徒也小雅曰翩翩者隼毛傳云隼夫不也一宿之鳥鄭箋一宿者一意於所宿之木鳥之謹慤者人皆愛之此是謹慤孝順之鳥左傳注曰祝鳥孝故主教民詩緝曰隼鵓鳥也一鳥而十四名隼也隹其也鵓鳩也祝鳩也鳺䲹也䳕鳩也鵾鳩也楚鳩也鳻鳩也荆鳩也乳鳩也鵴鳩也􅝣鳩也𪆴鳩也鳺䲹音孚浮亦作夫不陸氏佃曰雀聲慘毒鳩聲慈孝鳲鳩性一而慈祝鳩性一而孝隼鳥之短尾總名也鷹爾雅鷹鶆鳩郭注鶆當為鷞字之誤左傳作鷞鳩是也邢疏郯子曰鷞鳩氏司冦也杜注鷞鳩鷹也鷙故為司冦主盜賊大雅維師尚父時維鷹揚埤雅曰言其武之奮揚如此樂記所謂發揚蹈厲太公之志也隼音筍爾雅鷹隼醜其飛也翬郭注鼓翅翬翬然疾邢疏翬翬其飛疾羽聲也小雅采芑云鴥彼飛隼陸氏佃曰隼鷂屬今鷹之摶噬不能無失獨隼為有凖即今之所呼為鶻者鵲爾雅鵲鵙醜其飛也翪音宗郭注竦翅上下邢疏鵙伯勞也醜類也鵲鵙之類不能翺翔逺飛但竦翅上下而已下文烏鵲醜其掌縮疏云烏鵲之類飛時縮足於其腹下上言其翅下言其足也召南維鵲有巢鄭箋鵲之作巢冬至架之至春乃成疏曰月令十二月鵲始巢陸氏佃曰鵲作巢取在木杪枝不取墮地者故一名乾鵲淮南子云鵲巢向太乙背太嵗先儒以為鵲巢居而知風每嵗多風則去喬木巢旁枝故能高而不危鳶爾雅鳶烏醜其飛也翔邢疏鳶鴟也烏之類其飛也布翅翺翔陸氏佃曰高飛曰翺布翼不動曰翔曲禮云前有塵埃則載鳴鳶鳶鳴則將風故也鳶鈍者也以風作之則高飛昔墨子作木鳶今人乘風放紙鳶大雅旱麓曰鳶飛戻天李氏樗曰抱朴子云鳶飛在下無力及至乎天聳身直翅而上蓋鳶飛更不用力亦如魚躍恬然自得不知其所以然而然也鳬爾雅鳬鴈醜其足蹼音卜郭注腳指間有幕蹼屬相著其踵企注飛即伸其腳跟企直也邢疏鳬水鳥鴈陽鳥蹼相著之謂也踵腳跟也鳬鴈之類其指間有幕飛則伸其腳跟使直鄭風弋鳬與鴈鵙爾雅鵙伯勞也郭注似鶷􅗾音轄葛而大左傳曰伯趙氏邢疏伯勞一名鵙即郯子所謂伯趙氏司至者也以夏至來冬至去故曰司至陳思王惡鳥論伯勞以五月鳴應隂氣之動隂為殘賊蓋害之鳥也其聲鵙鵙故以其音名補傳曰豳風七月鳴鵙鵙仲夏始鳴至七月則鳴之極而將去矣陸氏佃曰倉庚知分鳴鵙知至故陽氣分而倉庚鳴可蠶之候也隂氣至而鵙鳴可績之候也晨風爾雅晨風鸇郭注鷂屬詩曰鴥彼晨風邢疏晨風一名鸇鷙鳥也陸璣云鸇似鷂黃色燕頷勾喙嚮風搖翮乃因風飛急疾擊鳩鴿燕雀食之鳬鷖爾雅鸍沈鳬郭注似鴨而小長尾背上有文今江東亦呼為鸍音施邢疏大雅鳬鷖在涇陸璣云大小如鴨青色卑腳短喙水鳥之謹願者廣韻野鴨也臣謹案毛傳云鳬水鳥也鷖鳬屬陸氏佃亦云鳬好沒鷖好浮鷖蒼黑色鳬青色列為二種今爾雅只説一物俟考鶴埤雅鶴形狀如鵝青腳素翼常夜半鳴高亮聞八九里小雅曰鶴鳴于九臯聲聞于天禽經曰鶴愛隂而惡陽鴈愛陽而惡隂故易曰鳴鶴在隂其子和之鸛埤雅鸛水鳥形狀略如鶴天將雨則長鳴而喜蓋知雨者也詩曰鸛鳴于垤婦歎于室垤蟻冡也鸛知天將雨有見于上蟻知地將雨有見于下將雨則征夫之至不必如期故婦歎于室也陸璣疏鸛長頸赤喙白身黑尾翅樹上作巢大如車輪卵如三升柸泥其巢一傍為池含水滿之取魚置池中稍稍以食其雛若殺其子則一村致旱災鵜爾雅鵜鴮鸅音烏澤郭注今之鵜鶘也好羣飛沈水食魚故名汙澤俗呼之為淘河邢疏曹風維鵜在梁陸璣疏鵜水鳥形如鶴而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便羣共杼水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河詩緝曰鵜鶘當入水中食魚今乃在魚梁之上竊人之魚以食未嘗濡濕其翼如小人居高位竊祿不稱其服也鶖毛傳鶖秃鶖也陸氏佃曰性貪欲狀如鶴而大長頸赤目其毛辟水毒頭高八尺善與人鬭好啖蛇小雅有鶖在梁有鶴在林詩緝曰鶖鶴皆以魚為食然鶖似鶴而貪濁實非鶴比今鶖據魚梁而飽鶴在林而飢喻褒姒進而申后黜王清濁無辨也鶉音純説文鶉䳺鶉也陸氏佃曰鶉無常居而有常匹衛風鶉之奔奔補傳曰鶉所以奔奔然喜鬭者惡亂其匹而鬭也詩緝曰鶉奔奔然而鬭不亂其匹鵲疆疆然剛不淫其匹以興宣薑與頑曽鶉鵲之不如也鶉音團字或作毛傳鶉雕也小雅匪鶉匪鳶翰飛戾天李氏曰若以為鶉鵲之鶉無飛戻天之理孔疏雕之大者又名鶚陸氏佃曰雕能食鳥似鷹而大黑色俗呼為皂雕其飛上薄雲漢詩緝曰我非如鶉鳶能羽飛至天我非如鱣鮪能潛逃於淵不能高飛逺逝必不免於世患矣此解與全詩神氣最合陸氏佃謂人民飛揚竄伏不安如此序所謂亂不如嚴氏説為長雉翬爾雅伊洛而南素質五彩皆備成章曰翬江淮而南青質五彩皆備成章曰鷂鷂與䄖同音搖邢疏周禮內司服掌王后之六服一曰禕衣鄭注褘衣畫翬者是也一曰褕狄鄭注䄖狄畫搖是也搖與鷂音義同翬與鷂皆雉屬陸氏佃曰大雅如翬斯飛以言其文之奐散翬鼓翅翬翬然疾也鷮音驕爾雅鷮雉長尾走且鳴邢疏小雅有集維鷮陸璣疏鷮微小于鸐走而且鳴鷮鷮然其色如雌雉尾如雉尾而長頭上有肉冠冠上藂毛長數寸如雄雉尾角其肉甚美語云四足之美有麃兩足之美有鷮詩緝曰言依然茂盛之平林有集止者維鷮以興王宫之貴宜有賢女居之也烏説文烏孝鳥也象形林罕以為全象鳥形但不注其目睛萬類目睛皆黑烏體全黑逺而不分别其睛詩莫赤匪狐莫黑匪烏蓋狐羣者也烏合者也故詩以况衛之君臣並為暴虐其惡如一管子曰烏集之交初雖相歡後必相咄詩人每引以刺者非特譏其為惡如一亦以刺其初皆利合不以道也雞爾雅雞大者蜀郭注今蜀雞也陸氏佃曰雞有蜀魯荆越諸種越雞小蜀雞大詩曰風雨凄凄雞鳴喈喈言雞之信度如此亂世君子不改其度之譬也桑扈爾雅桑扈竊脂郭注俗謂之青雀嘴曲食肉好盜脂膏因名小雅交交桑扈率場啄粟鄭箋桑扈食肉之鳥今無肉而循場啄粟失其天性將不能以自活也詩緝曰桑扈有二種此桑扈則青雀也性之竊脂者也爾雅九扈章桑扈竊脂邢疏竊即古之淺字釋獸云虎竊毛謂之虦音棧貓脂為白色九扈有竊玄竊藍竊黃竊丹四種皆訓淺則此竊脂為淺白色也詩緝曰此色之竊脂者也陸氏佃曰桑扈蓋一名而二種釋鳥云桑扈竊脂鷯音刁聊剖葦此桑扈之一種以性言之也桑扈竊脂棘扈竊丹此桑扈之又有一種以色言之也蓋對剖葦言之則竊脂者所謂青質嘴曲食肉好盜脂膏者是也對竊丹者言之則竊脂者所謂素質其翅與領皆鶯然而有文章是也左傳有九扈為九農正賈逵樊光皆以為棘扈為果驅鳥桑扈為蠶驅雀而或者非之以為就果樹入蠶室為民驅鳥雀溥天之下何以可周亦太泥矣蓋九扈農桑候鳥扈民無淫者也先王名官特取其意非必使之動作然則所謂交交桑扈率場啄粟者正以性之竊脂者言之故以啄粟為失其性交交桑扈有鶯其羽者正以其色之竊脂者言之故其序曰君臣上下動無禮文焉蓋爾雅主詩言之而小雅桑扈所取者有兩竊脂故爾雅亦兩解猶之無羊云九十其犉音純良耜云殺時犉牡爾雅有黑脣犉又有牛七尺為犉是也補傳云或指其色或指其性其實一物耳臣謹案食肉之竊脂係青質九扈之竊脂係素質明係二物判然難混鄭樵曰左傳九扈皆雀屬扈一名鳸爾雅云老鳸鷃春鳸頒鶞音汾真夏鳸竊玄秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖四時之鳸皆以時見農家須其鳴以候時故名桑鳸郭云俗謂青雀今名臘觜性慧可教桑棘之鳸多在是木故名鴻鴈毛傳大曰鴻小曰鴈小雅鴻鴈于飛集于中野毛云鴻鴈知隂陽寒暑識所避就言民能去無道就有道豳風鴻飛遵渚言鴻大物宜高飛戻天今乃下循洲渚喻周公大聖宜在朝廷不宜久留東都也鸒斯爾雅鸒斯鵯鶋郭注鴉烏也小而多羣腹下白江東亦呼為鵯烏邢疏詩小雅云辨彼鸒斯斯者語辭猶蓼彼蕭斯之類小爾雅云小而腹下白不反哺者謂之鴉烏詩緝曰鴉烏不能反哺猶已之不能致養是為不孝自罪之詞也鴉烏雖不能反哺然出食在野飽則提提然羣飛而歸是其父子相隨為可樂今我不容於父曽鴉烏之不如也烏有三種廣雅云純黑而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而羣飛者謂之燕烏爾雅所謂白脰烏也脰音豆項也雀埤雅雀物之淫者鼠物之貪者故詩言雀角鼠牙以譬強暴崔豹古今注曰九月雀入水不則多淫佚酒善使人淫佚故一升曰爵爵所以戒也鴇埤雅郭璞曰鴇似鳩無後趾毛有豹文遇鷙鳥能激糞禦之著其毛悉脫連啼性不樹止詩曰肅肅鴇羽集于苞栩言鴇乃集于苞栩之上極為危苦喻君子當居平安之處今乃下從征役不得安其所也桃蟲爾雅桃蟲鷦其雌鴱音艾郭注鷦隲桃雀也俗呼為巧婦邢疏桃蟲一名鷦詩周頌云肇允彼桃蟲拚飛維鳥毛傳桃蟲鷦也鳥之始小終大者陸璣疏鷦鷯微小於黃雀其雛化而為雕故俗語鷦鷯生雕陸氏佃曰鷦鷯喙尖利如錐取茅莠為巢巢至精密以麻紩之如刺襪然故一名襪雀詩緝曰我今始信小物之能成大不敢不毖也梟鴟爾雅梟鴟郭注土梟邢疏説文云梟食母不孝之鳥也故冬至捕梟磔之字從鳥首在木上詩陳風云墓門有棘有梟萃止毛傳云惡聲之鳥一名鵩一名梟一名鴟大雅瞻卬云為梟為鴟陸璣云梟大如班鳩緑色入人家凶賈誼所賦鵩鳥是也其肉美甚可為羹臛又可為炙鴟梟爾雅鴟梟鸋鳺邢疏鴟梟一名鸋鳺陸璣云鴟梟似黃雀而小其喙尖如錐取茅莠為窠以麻紩之如刺襪然懸著樹枝或謂之襪雀臣謹案陸璣疏大雅為梟為鴟云梟大如班鳩緑色然則鴟梟也鸋鳺也梟鴟也土梟也鶹鷅也流離也實一物也爾雅載成三項未審何故襪雀陸佃以釋桃蟲陸璣又引以釋鴟梟未知孰是流離爾雅鳥少美長醜為鶹鷅音留栗郭注鶹鷅猶流離詩所謂流離之子是也邢疏鳥之少為子者美長食母而醜其名為鶹鷅詩邶風云瑣兮尾兮流離之子陸璣疏自關而西謂梟為流離其子適長大還食其母流與鶹同附捕鳥具羅爾雅鳥罟謂之羅郭注謂羅絡之邢疏李巡云鳥飛張網以羅之詩王風云雉離于羅是也畢毛傳畢所以掩詩小雅鴛鴦于飛畢之羅之疏云網小而柄長謂之畢則執以掩物鳥罟謂之羅則張以待鳥罿音衝罦音浮爾雅繴謂之罿罿罬也罬謂之罦罦覆車也郭注今之翻車也有兩轅中施罥以捕鳥邢疏孫炎曰覆車網以掩兔一物五名方言異也詩王風云雉離于罦又曰雉離于罿則是捕鳥之具孫氏謂掩兔非也臣謹案爾雅罿罦只是一物弋爾雅弋與杙同樴謂之弋注杙所以格獸又繳射曰弋詩鄭風弋鳬與鴈莊子鳥高飛以避矰弋之患列子弱弓纎繳乘風振之朱注弋謂以生絲繫矢而射鳥也毛詩類釋卷十六
