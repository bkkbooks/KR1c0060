body:
  text: 毛詩類釋目錄詩類卷一釋天文巻二釋地理巻三釋山卷四釋水卷五釋時令卷六釋祭祀卷七釋官制卷八釋禮器卷九釋樂器卷十釋兵器卷十一釋農器卷十二釋宫室卷十三釋衣服卷十四釋草卷十五釋木卷十六釋鳥附捕鳥具卷十七釋獸附捕獸具卷十八釋蟲卷十九釋魚附捕魚具卷二十釋車附車飾卷二十一釋馬附馬飾續編卷上釋詁卷中釋言卷下釋訓臣等謹案毛詩類釋二十一卷續編三卷國朝顧棟髙撰棟髙字震滄無錫人康熙庚子舉人官内閣中書舎人乾隆辛未薦舉經學授國子監司業後特恩加祭酒銜終於家是編成於乾隆壬申序文案語皆稱臣葢經進之本凡分二十一類其序中抒所自得者如於釋地理知邶鄘衛乃三地名非三國名於釋山知崧髙維嶽乃吳岳非中岳於釋水知吉日之漆沮非緜詩潛頌之漆沮於釋時令知公劉已先以建子為正於釋祭祀知禘與大饗明堂俱周公創舉於釋官職知司徒司空司馬皆在周官以前於釋兵器知古甲皆用革於釋宫室知君子陽陽乃伶官之詩非婦人所作於釋草知麻有二種於釋鳥知桑扈亦有二種於釋馬知衞風騋牝魯頌牧馬俱以備兵事司馬法所云馬牛車乗俱出於民者乃王莽偽託之文今考其書禘及大享明堂一條司徒司馬一條皆與序文不相應未喻何故其邶鄘衛一條為顧炎武説崧髙一條為閻若璩説漆沮一條為許謙説公劉用子正一條為毛萇説古甲用革一條為陳祥道説麻有二種一條為蔡卞説桑扈有二種一條為陸佃説邱甸不出馬牛一條為李濂説惟君子陽陽一條以楚茨之文證小序為自出新意耳然諸家説詩名物多泛濫以炫博此書則採録舊説頗為謹嚴又往往因以發明經義與但徵故實體同類書者有殊於説詩亦不為無禆也其續編三卷則成於乾隆癸酉取爾雅釋詁釋言釋訓之文有闗於詩者摘而録之亦畧為疏解葢訓詁名物相輔而行之義以爾雅核之尚缺知匹也言戒也二條或繕稿時偶誤脱歟乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
