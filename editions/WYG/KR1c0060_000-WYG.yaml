front:
  text: 毛詩類釋原序臣幼讀論語孔子語學詩之益曰多識於鳥獸草木之名若是乎博物之學亦聖人所不廢也臣每病夫説詩者大義未明輙舉名物注疏填塞行間使前後意義亘斷學者心志眩惑後復遇一名一物輙云已見某卷繙閱為難又不免重複脱漏因於所著訂詁一舉而空之後復輯類釋一項曰天文曰地理曰山曰水曰時令曰祭祀曰官制曰禮器曰樂器曰兵器曰農器曰宫室曰衣服曰草曰木曰鳥曰獸曰蟲曰魚曰車曰馬凡二十一類上遡爾雅考工記旁及宋元諸儒所撰草木蟲魚疏埤雅下逮本草靡不搜輯備載此無味之味先儒所謂雞肋也然於地理知衛地即紂舊都武王當日誥戒康叔未行而留任司冦康叔未嘗就封於衛如周公留相王室亦終身未嘗之魯也􅆁鄘衛是三地名而非三國詩分為三者乃漢儒以此詩之簡獨多故分三名以各冠之而非夫子之舊於釋山知崧髙維嶽是雍州之嶽山見爾雅及周官職方與中嶽嵩髙無涉於釋水知漆沮一名洛水此從同州府朝邑入渭非伊洛之洛從鞏縣入河者而緜詩潛頌之漆沮又出鳯翔府扶風縣至西安府臨潼入渭北去同州府朝邑又二百五十里於時令知公劉在夏時已自以子月紀數古時三正原自通行於祭祀知禘禮及大饗明堂俱周公神明其德創舉斯典古今不同禮因時起於官制知唐虞時已有司徒司空之官故太王迺召司徒迺召司空至武王伐商更立司馬制度實先周官而有於兵器知古之甲胄皆犀兕為之朱子亦云革甲胄之屬不知何時始用金於宫室知君子陽陽為伶官不得志之作楚茨樂具入奏而前堂之房與後寢相值由房入寢正伶官所有事與簡兮在前上處相似朱子謂婦人所作殊無意義於釋草知禾麻之麻實為八穀之一而東門之池可以漚麻則為績紉所用二者較别於釋鳥知桑扈原有兩種有以性言者小雅交交桑扈率場啄粟是也有以色言者小雅交交桑扈有鶯其羽是也兩者同名而異實於釋馬知衞風騋牝三千及魯頌驈皇騂騏之盛俱以備兵事故爾雅有戎事齊力尚強之文邱甸止出乗車之人數耳司馬法言馬牛車乗俱從民間出者此係王莽之偽造凡此皆前人所未嘗致疑者尋繹得之輒自有味且闗係亦自不小不止博物而已臣愚昧無似生千百年後抱遺經守故䇿譬如以管窺天而捫籥輒有創獲不禁野人得芹而喜謹藉此為右文之獻乾隆壬申八月朔日臣顧棟髙謹序欽定四庫全書經部三
