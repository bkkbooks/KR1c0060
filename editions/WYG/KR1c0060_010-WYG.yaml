body:
  text: 毛詩類釋卷十國子監祭酒顧棟髙撰釋兵器鼓鉦鼓以進衆為三軍之號令孔疏鐲鐃俱得名鉦鐲似小鐘鐃似鈴有大小之異耳凡軍進退皆鼔動而金止甲考工記犀甲壽百年兕甲壽二百年合甲合猶重也重犀兕為之壽三百年禮書曰古者之甲以革為之後世乃用金耳案襄三年傳鄧廖帥組甲三百被練三千以侵吳組練俱用絲杜預則云組甲漆甲成組文宣十二年傳犀兕尚多國語吳王衣水犀之甲者億有三千無用鐵之理胄説文曰首鎧謂之兠鍪亦曰胄魯頌貝胄朱綅以貝飾胄以朱綫綴貝而飾之朱子釋中庸曰革甲胄之屬則胄亦以革為之矣説文長箋云軍士以首鎧為炊具故曰兠兠為胄名鍪則釡名意亦是後世之事耳戈考工記戈柲長六尺六寸禮書曰勾兵也五兵之便于用者戈而已可以樁可以斬可以擊可以鈎殳考工記殳長尋有四尺八尺曰尋是殳長丈二尺也禮書曰有稜鄭氏謂八觚是也許慎謂積竹為之可擊打人㦸考工記車㦸常注八尺曰尋倍尋曰常是㦸長丈六尺也劉熈曰㦸格也旁有枝格也禮書曰周官司兵軍旅㑹同建車之五兵戈殳㦸酋矛夷矛也步之五兵無夷矛而有弓矢陳氏曰戈㦸皆刺兵也戈二刃㦸三刃殳擊兵也如杖而無刃矛鈎兵也上鋭而旁鈎用以以鈎宜長于㦸故酋矛長二丈夷矛長二丈四尺也矛英喬清人二矛重英箋曰二矛酋矛夷矛也考工記酋矛常有四尺夷矛三尋注八尺曰尋倍尋曰常則酋矛長二丈夷矛長二丈四尺英以朱羽為矛飾二矛並建于車上則其英重累而見矛之上句音鈎曰喬所以懸英也英弊而盡所存者喬而已黄氏曰矛上鋭而旁句盖可刺可句之器􅤌矛錞疏􅤌矛刃有三角鋈錞謂以白金沃矛之下端平底者也曲禮進戈者前其鐏後其刃進矛㦸者前其鐓同錞注鋭底曰鐏平底曰錞戚揚疏戚揚皆斧鉞之别名鉞大而斧小六韜云大柯斧重八斤一名大鉞劉熈曰斧以斬斷見者皆慼懼斧斨錡銶疏隋銎音穹曰斧方銎曰斨斨即斧也唯銎孔異耳隋音妥狹而長也銎斧斨受柄處也錡鑿屬銶木屬干盾伐揚雄曰盾或謂之干疏盾以木為之禮書曰盾以革為之其背曰瓦其瓦設錫朱質而繪以龍龍之外又繪以雜羽詩曰龍盾之合盾狹而車廣一盾不足為衞故以二盾比而合之中干曰伐詩蒙伐有苑蒙雜也即所謂雜羽也苑文貌盖畫龍與雜羽之文于盾伐之上而龍盾苐舉其龍蒙伐苐舉其雜羽文互見耳其大干則謂之櫓弓韔一作鬯閉禮書曰弓以木為身以角為面筋所以為深絲所以為固弓室曰韔弓檠曰閉虎韔以虎皮為弓室交韔交二弓于韔中謂顛倒安置之必二弓以備壞也竹閉以竹為柲狀如弓然而以繩約之于弛弓之裏檠弓體使正然後納之韔中足以定往來之體袪翩反之病盖用竹則不屈撓用繩則久纒綿也韔同鬯鄭風云抑鬯弓忌象弭疏爾雅云弓有縁者謂無弓無縁者謂之弭孫炎曰縁謂繳束而漆之弭則不以繳束骨飾兩頭者也然則弭者弓弰之名以象骨為之是弓之末弭也詩緝曰左傳云左執鞭弭曲禮云右手執簫簫弭頭即受弦處以象齒飾之使上下不至齟齬也彤弓疏為弓者皆漆之以禦霜露色以赤者周之所尚故賜弓赤一而黒十以赤為重耳矢魚服掤左傳作冰劉熈曰矢指也有所指向迅疾也矢房曰服矢筩盖曰掤魚獸名似猪東海有之其皮背上斑文腹下純青可為弓鞬矢服掤是箭筩盖用矢則舉掤以開筩既用則納矢筩中釋下掤以覆筩詩抑釋掤忌是也昭二十五年傳公徒釋甲執冰而踞冰即掤鍭爾雅金鏃翦羽謂之鍭疏鏃箭頭翦齊也以金為鏃齊羽者名鍭孫炎曰金鏃斷羽使前重也鍭矢參亭三分之一在前二在後輕重均亭也决拾疏决以象骨為之著於右手大指所以鈎弦開體拾一名遂以韋為之著于左臂以遂弦詩緝曰决即衞芄蘭所謂佩韘是也韘音攝侯周禮司裘王大射則共虎侯熊侯豹侯設其鵠註以虎熊豹之皮飾侯又方制之著于侯中謂之鵠所謂皮侯也禮書侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺四寸大半寸侯中一丈者鵠方三尺三寸少半寸旂旟旐周禮司常交龍為旂鳥凖為旟龜蛇四斿考工記龍旂九斿以象大火也鳥旟七斿以象鶉火也龜蛇四斿以象營室也斿音由旂常之末垂者鄭氏曰正幅為縿旈則屬焉干旄干旌疏干旄者以旄牛尾注于旗干之首析羽為旌孫炎曰析五采羽注上則干之首首有旄有羽也旄是旄牛尾羽是鳥羽蘇氏轍曰注旄而不設旒縿曰旌許氏謙曰旄旟旌嘗案周禮爾雅禮書參比而得其説凡旗有杠有縿有旒杠者旂竿也以旄牛尾注于其首謂之旄又以翟五色之羽析之注于旄之上謂之旌則旄旌皆是杠之飾也其杠以素錦韜之然後以縿繫于杠縿以纁帛為之旒以赤絳帛為之而屬于縿之上以俗言之則縿是旂身旒是旂脚又以組飾旒之邊又用朱縷縫紕旒縿或以維持之不欲令曳地干旄詩中言紕者縫之也組者飾之也祝者維之也孔疏謂以素絲為線縷所以縫紕旌旂之旒縿也縿謂繫于旌旂之體旒謂縿末之垂者須以縷縫之使相連鳥章白斾六月詩曰織文鳥章白斾央央疏鳥章即所謂鳥隼曰旟也白帛也以絳帛續旐末為燕尾戰則斾之九旂之物皆用綘此旟而言旐者散則通名据此則鳥章與白斾本是一物鳥章以旂之體言白斾以旂之下垂者言故以央央二字總之非有二也圖作二物恐非鈎援臨衝毛傳曰鈎鈎梯也所以鈎引上城者臨臨車衝衝車也朱傳曰鈎援即今所謂雲梯臨在上臨下者衝從旁衝突者皆攻城之具也孔疏兵書有作臨車衝車之法枚孔疏大司馬大閲云銜枚而進注枚如箸銜之有結項中軍法止止語為相疑惑鞞瞻彼洛矣詩曰鞞琫有珌朱傳云鞞容刀之鞞今刀鞘也琫上飾珌下飾亦戎器也附録陳氏稽古編曰司常九旂曰常也旂也旜也亦作㫋物也旂也旟也旐也旞也旌也常旂旟旐旌五者皆見詩而於旂尤屢及天子建常諸侯建旂故詩所咏大抵皆諸侯事出車采芑之旂以出師庭燎采菽載見之旂以朝于王黒鳥之旂以助祭閟宫之旂以承祭韓奕之旂天子所賜皆咏侯也爾雅旂制大約竿首設旄旄首注旌九旂所同而旂竿則綢以素錦下以纁帛為縿音衫而衆旒著焉旒有九詩所云央央淠淠等皆旒縿之貌狀也畫素龍於縿故曰龍旂見閟宫元鳥詩縣鈴於竿首故又言和鈴央央也見載見詩至於綦組之飾與諸侯旂等諸侯旒不曳地馮氏名物疏引昭十三年傳晉治兵邾南辛未建而不斾壬申復斾之以斾為大將所建之旂未是此傳之斾係虚字與小雅胡不斾斾一例至白斾央央悠悠斾旌方是實指旂職之名案斾不例九旂之數爾雅長尋曰旐繼旐曰斾注云帛續旐為燕尾意無燕尾為旐有燕尾為斾此其異也又案巾車革路建大白以即戎注以大白為殷旂又釋名云白斾殷旌也帛繼旐者也然則白者斾之色繼旐者斾之形也詩之白斾左傳之大斾皆戰伐時所建則斾即大白無疑臣謹案此以白為斾之色白斾即殷之大白疑未是白與帛同白斾乃用纁帛為縿畫龍於上以為九旒也乃纁色非白色也吉甫以上公出師親臨督戰自應建本朝之正色如何反用殷家之大白乎巾車革路建大白以即戎鄭答趙商以為王不親將故建先代之正色意惟不親將則然耳疑未可引以為據毛詩類釋卷十
