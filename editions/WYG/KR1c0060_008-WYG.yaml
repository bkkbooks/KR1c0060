body:
  text: 毛詩類釋卷八國子監祭酒顧棟髙撰釋禮器鼎鼐鼒爾雅鼎絶大謂之鼐圜弇上謂之鼒疏云鼎絶大者名鼐體圓歛上而小口者名鼒詩周頌鼐鼎及鼒是也又欵足者謂之鬲疏云欵潤也鼎足相去疎濶者名鬲俎七簋楚茨為俎孔碩注云俎祭享之器儀禮特牲少牢凡牲體魚腊皆自鑊而升于鼎自鼎而載于俎七所以載鼎實謂出之于鼎升之于俎也古之祭祀必體解其肉之胖既大故須以七載之又黍稷亦用七詩有饛簋飱有捄棘七疏云簠盛稻粱簋盛黍稷七長三尺吉禮用棘喪禮用桑捄長貎大房魯頌籩豆大房毛云大房半體之俎鄭云玉飾俎也其制足間有横下有跗似乎堂後有房然孔疏知是半體者周語云禘郊之事則有全烝王公立飫則有房烝親戚燕饗則有殽烝全烝謂全載牲體殽烝謂體解骨折則房烝是半體可知據此則殽烝用折俎房烝用房俎房俎即大房半體之俎也鬷音宗説文釡屬正字通云商頌鬷假無言中庸引詩譌鬷作奏與湯孫奏假同不知烈祖章所謂鬷即雍人陳鼎事凡祭雍人必先陳鼎以為烹牲體之用自鼎初至時即能秉其肅敬靡有譁爭見主者者專於假廟故能使助祭者人人顧化若此與那詩奏假之奏不同奏即上奏鼓之奏謂奏樂以通于烈祖也何得與鬷假相混臣謹案中庸奏假作奏進也毛鄭皆云鬷總也歐陽氏曰執事者總無諠譁也陸徳明釋文吳才老韻補皆讀鬷作奏無有以為釡屬者此並駁去謂其音義錯互何其堅自信若此然其説亦似有理今姑存之錡釡召南于以湘之維錡及釡傳云錡釡屬有足曰錡無足曰釡湘烹也鬵爾雅䰝謂之鬵詩曰溉之釡鬵是也方言云甑自闗而東或謂之甗或謂之鬵又許氏説文云大釡也一云鼎大上小下若甑曰鬵毛氏曰釡屬六書故曰詩烹魚不應用甑毛許説近之爾雅鬴謂之鬵俗本譌鬴作䰝方言鬵闗東或謂之鬴俗本譌鬴作甗鬴與釡同豆籩登爾雅木豆謂之豆疏豆以木為之髙一尺口足徑一尺其足名鐙中央直䜿者名校校徑二寸總而言之名豆其實四升用薦俎醢竹豆謂之籩疏籩以竹為之口有籐縁形制如豆亦受四升盛棗栗桃梅蓤芡脯修膴鮑糗餌之屬小雅賓之初筵籩豆有楚亦饗燕祭祀通用瓦豆謂之登疏大雅生民于豆于登毛云登薦太羮公食大夫禮大羮湆不和實于登湆肉汁太古之羮也不調以鹽菜玉瓚秬鬯旱麓詩曰瑟彼玉瓚黄流在中疏瓚盛鬯酒之器以圭為柄黄金為勺朱中央有鼻寸為龍口鬯酒從中流出即所謂黄流黄流秬鬯也秬黑黍釀秬為酒以鬱金之草和之則黄如金色酒在器流動故謂之黄流以其芬香條鬯故謂之秬鬯又江漢詩云釐爾圭瓚秬鬯一卣疏云春官鬱人掌和鬱鬯以實彛而陳之則鬯當在彛而此及尚書左傳皆云秬鬯一卣者當祭之時乃在彛未祭則在卣卣受五升賜時未祭故卣盛之臣謹案盛卣之器有三彛也卣也瓚也祭時在彛賜時則在卣玉瓚即圭瓚當在中間以卣中秬鬯之酒注于瓚從瓚流出以實于彛然則爾雅云卣為中尊者當以品之貴賤言彛陳祖考之前為最上罍平日飲燕所用為下卣未祭之前盛秬鬯者故得為中也天子之瓚其柄之圭長尺有二寸賜諸侯盖九寸以下璋瓚半圭曰璋以為瓚柄王祼以圭瓚諸臣助之以鬱鬯之酒灌地以降神亞祼以璋瓚左右奉之詩曰濟濟辟王左右奉璋是也許氏樗曰周禮大璋中璋邊璋皆是璋瓚祭之用瓚惟祼為然圭廣二寸半圭曰璋言其廣之度止一寸五分彛卣罍爾雅註皆盛酒器孫炎云尊彛為上罍為下卣居彛罍之間是不大不小者爾雅曰卣為中尊是也詩秬鬯一卣又我姑酌彼金罍則罍是飲燕之器人君以黄金飾尊大一石疏又云罍是尊之大者然則孫炎所云上中下以品之貴賤言不以量之多少言也疏云刻為雲雷之象以金飾之爵斚爵飲器受一升口上立兩柱取飲不盡之義戒其過也夏曰醆殷曰斚周曰爵晝禾稼行葦詩曰曰洗爵奠斚箋云用殷爵者尊兄弟也大斗疏曰大斗長三尺謂其柄也漢禮器制度注勺五升徑六寸長三尺是也此盖從大器挹之以樽用此勺耳犧尊阮諶禮圖云犧尊於尊腹之上畫為牛形王肅曰太和中魯郡于地中得齊大夫子尾送女器有犧尊以犧牛為尊也宋祭絛曰徽宗崇尚古器政和間尚方所貯盡三代冡墓中物今博古圖所載是也其犧尊正如王肅所言全作牛形開其背以受酒阮諶之言殆臆度耳兕觥孔疏云以兕觥為觥古者燕饗之禮必有兕觥亦為罰爵周禮有觥罰之事又云觥其不敬者桑扈詩兕觥其觩罰爵徒觩然陳設而無所用言上下俱無失禮也絲衣詩兕觥其觩㫖酒思柔不吳不敖言至祭末旅酬之節不用罰爵飲美酒者皆柔和不讙譁不倨慢其始終皆得禮也壺韓奕詩曰清酒百壺壺圜器禮器注壺大一石鸞刀傳曰刀有鸞者言割中節也疏曰鸞鈴也刀環有鈴者也楅衡楅衡施于牛角所以止觸周禮云凡祭飾其牛牲設其楅衡㸑楚茨詩云執㸑踖踖傳云饔㸑廩㸑也疏饔㸑以煑肉在門東南北上廩㸑以炊米在饔㸑之北介圭介圭諸侯之封圭執之為贄以合瑞于王也周官典瑞五等諸侯各執其圭璧以朝覲宗遇㑹同于王崧髙詩云錫爾介圭以作爾寳是天子初賜時事毛以為桓圭九寸是也鄭以為介圭尺二寸是天子之圭非諸侯所執故以為寳韓侯之介圭是貢其國之所有非所執之瑞圭俱謬誤不可從孔疏曰毛於崧髙以介圭為所執之瑞則此處介圭亦為瑞不從鄭而從毛其説得之圭為公侯伯所執侯國土産安得有此詳見訂詁圭璧雲漢詩曰圭璧既卒疏周禮大宗伯以蒼璧禮天黄琮禮地青圭禮東方赤璋禮南方白琥禮西方黒璜禮北方皆祭神所用而圭璧為其總稱筐筥召南于以盛之維筐及筥毛傳方曰筐圓曰筥附録陳氏稽古編曰禮簠方而簋圓簠盛稻粱簋盛黍稷然古書言簋多不及簠凡言二簋者稻粱也諸侯日食以之若用享則薄矣故易曰應有時也四簋者加以黍稷諸侯朔月食之而養賢者以為平常燕食則禮待之隆也六簋者加以麥苽天子朔月食之若盛舉則稻粱各二合黍稷麥苽是為八簋伐木篇陳饋八簋是也又有十二簋王者以待諸侯圓曰筥方曰筐筐五斛筥五升筥小而筐大然筐之為制又不同大筐五斛小筐五升深者為懿筐淺者為頃筐桑欲其多容故取其深卷耳易盈標梅將盡則取其淺而已鹿鳴之筐以受幣帛楚茨之筐以受黍稷牢肉鄭義采蘋之筐以受蘋藻采菽之筐以受豆藿良耜之筐以受饁餉之黍而與筥偕者三焉其小筐乎若大筐則盛米以饋聘賓用之射有正有鵠有質而的其總名也大射射皮侯的以鵠製皮為之賓射射采侯的以正采畫為之燕射射獸侯的以質畫熊麋虎豹鹿豕之形為之猗嗟不出正此賓射也賓之初筵箋云舉鵠而棲之於侯此大射也經云發彼有的傳云的質此燕射也毛以首章為燕射矣鄭衆馬融王肅謂鵠大於正正大於質共在一侯皆誤惟康成據周禮分為三射之侯獨得之質亦采畫但正畫五色質畫各獸之形為異耳王應麟言康成釋禮其經傳無明文者輙引漢禮證之盖漢去古未逺用此證彼或可得其彷彿今以見於詩者言之抱禂漢抱帳也副漢步揺也六珈步揺上飾也卿士之館緇衣諸廬也重喬所以縣毛羽也疏云猶今之鵞毛槊則又證以唐制汕撩罟也邪偪行縢也醻今之勸酒也簫賣餳者所吹也春酒中山冬釀也戈今之句孑㦸也以至有瞽樂器則大予樂漢明帝樂見東漢書可據也挈壺之刻漏玉瓚大斗之尺寸則漢之禮器猶存也然猶不敢質言之僅曰某若今之某云爾後世去古彌逺乃欲執近事以測古經如據韓愈畫記以釋載獫歇驕據大隄曲以釋漢有游女據姚崇焚蝗之令以釋秉畀炎火據漉魚义網以釋月離于畢據俗諺籬頭吹篳篥以釋一之日觱發皆非吾所敢信毛詩類釋卷八
