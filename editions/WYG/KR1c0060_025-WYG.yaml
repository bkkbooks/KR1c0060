  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0060_WYG_025-1a, image: WYG0088/WYG0088-0206c.png}
body:
  text: 毛詩類釋續編卷下國子監祭酒顧棟髙撰釋訓斤斤察也周頌執競云斤斤其眀毛傳斤斤明察也孫炎曰重慎之察也便便辨也詩作平平小雅采菽曰平平左右亦是率從毛傳平平辨治也便平古今字晏晏温温柔也衛風氓云言笑晏晏大雅抑云温温恭人此皆寛緩和柔也翹翹危也鴟鴞云予室翹翹言懸危恐懼也憢憢懼也詩作嘵嘵鴟鴞云予維音嘵嘵番番矯矯勇也大雅崧髙云申伯番番魯頌泮水云矯矯虎臣皆武夫壯勇之貎洸洸武也大雅江漢云武夫洸洸蹶蹶踖踖敏也唐風蟋蟀云良士蹶蹶小雅楚茨云執㸑踖踖皆便速敏㨗於事也増增衆也魯頌閟宫云烝徒増增人物衆夥之貎烝烝作也魯頌泮水云烝烝皇皇毛傳烝烝也孔疏釋訓云作也衆作正是厚重之意故為厚懕懕詩作厭厭媞媞安也秦風小戎云厭厭良人毛傳厭厭安静也魏風葛屨云好人提提毛傳云提提安諦謂行歩安舒而審諦也簡簡大也周頌執競云降福簡簡慅慅詩作草草勞也巷伯云勞人草草毛傳草草勞心也又陳風月出云勞心慅兮慅草音義同爰爰緩也王風爰云有爰爰毛傳爰爰緩意旭旭郭氏讀為好好蹻蹻音劇憍也小雅巷伯云驕人好好大雅板篇云小子蹻蹻驕貎皆小人得志憍蹇之貎也版版詩作板板盪盪詩作蕩蕩僻也大雅板云上帝板板毛傳板板反也上帝指王鄭云王反先王與天之道又蕩篇云蕩蕩上帝鄭云蕩蕩法度廢壞之貎李廵曰版版失道之僻也盪盪弗思之僻也詩及爾雅字異而音義並同爞爞詩作蟲蟲薫也大雅雲漢云藴隆蟲蟲毛傳藴藴而暑隆隆而雷蟲蟲而熱謂旱熱薰炙人也居居究究惡也唐風羔裘豹祛自我人居居又曰自我人究究毛傳懷惡不相親比之貎李廵曰居居不狎習之惡究究窮極人之惡仇仇敖敖詩作囂囂傲也小雅正月云執我仇仇毛傳仇仇猶謷謷也鄭云王既得我執留我其禮待我謷謷然亦不問我在位之功力言其有貪賢之名無用賢之實大雅板云我即爾謀聽我囂囂毛云猶謷謷也鄭云我就汝而謀欲告以善道汝反聽我言謷謷然不肯受是皆傲慢賢者痯痯瘐瘐詩作愈愈病也小雅枤杜云四牡痯痯毛傳痯痯罷貎又正月云憂心愈愈毛傳愈愈憂懼也此皆賢人失志懐憂病也佻佻契契愈遐急也大東云糾糾葛屨可以履霜佻佻公子行彼周行毛傳佻佻獨行貎鄭箋言時財貨盡雖公子衣屨不能順時乃夏之葛屨今以履霜送轉餫又云契契寤歎毛傳契契憂苦也言小國困弊賢人憂歎逺者愈益急切儵儵詩作踧踧並音狄嘒嘒罹禍毒也小弁云踧踧周道鞠為茂草毛傳踧踧平易鞫窮也又菀彼栁斯鳴蜩嘒嘒栁盛則多蟬悼王道之蕪穢羡蟬鳴之自得傷己之失所而罹禍也臯臯琄琄詩作鞙鞙刺素食也大雅召旻云臯臯訿訿曾不知其玷毛傳臯臯頑不知其道也小雅大東云鞙鞙佩璲不以其長毛傳鞙鞙玉貎璲瑞也徒美其佩而無其徳譏尸位而素餐也懽懽詩作灌灌愮愮詩作摇摇憂無告也大雅板篇云老夫灌灌毛傳灌灌猶欵欵王風云中心摇摇毛傳搖搖憂無所愬音義並同謔謔謞謞詩作熇熇崇䜛慝也板篇云天之方虐無然謔謔毛傳謔謔然喜樂又多將熇熇不可救藥毛傳熇熇然熾盛也鄭箋多行熇熇惨毒之惡誰能止其禍言樂禍助虐増譖惡也翕翕訿訿莫供職也小雅小旻云潝潝訿訿亦孔之哀言姦黨熾盛背公䘏私曠職事也不蹟不遹也小雅沔彼云念彼不蹟毛傳不蹟不循道也遹循也不徹不道也小雅十月云天命不徹毛傳徹道也鄭箋言王不循天之政教也饎酒食也小雅天保云吉蠲為饎毛傳吉善蠲潔也骭音莧瘍為微腫足為尰音塜小雅巧言云既微且尰孫炎曰皆水濕之疾也骭脚脛瘍創也膝之下有瘡腫是渉水所為人居下濕之地故生是疾籧篨口柔也戚施面柔也凡口柔者必仰面觀人顔色似籧篨不能俯之人面柔者必低首下人媚以容色似戚施不能仰之人籧篨戚施俱見衛風新臺夸毗體柔也大雅板篇云無為夸毗夸毗者便辟其足前却為恭以形體順從於人故曰體柔朱傳曰夸大也毗附也小人之於人不以大言夸之則以諛言毗之義較勝殿屎音玷熈呻也板又云民之方殿屎孫炎曰殿屎愁苦呻吟之聲毛詩類釋續編卷下
