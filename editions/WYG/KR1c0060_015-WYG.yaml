body:
  text: 毛詩類釋卷十五國子監祭酒顧棟髙撰釋木榛陸氏璣曰榛栗屬有兩種其一種皮葉皆如栗子小形如杼子味亦如栗所謂樹之榛栗者也其一種葉如木蓼生髙丈餘作胡桃味山有榛之榛是也遼東上黨皆饒有之子似橡子枝莖可以為燭范氏祖禹曰榛栗為女贄蔡氏卞曰榛小木也以為禮實則貴矣植之榛栗先禮實也葢衛居處於漕無城市宫室君臣上下冠㛰䘮祭無以為禮實則於是不可不先也栗陸氏璣曰五方皆有栗惟漁陽范陽栗甜美味長他方悉不及也倭韓國諸島上栗大如雞子亦短味不美桂陽有莘栗藂生大如杼子形色與栗無異但差小耳又有奥栗子圎而細或云即莘今惟江湖間有之又有茅栗佳要其實更小而木栗不殊但春生夏花秋實冬枯為異耳周禮饋食之籩其實栗梅陸氏璣曰梅杏類樹及葉皆如杏而黒耳曝乾為腊置羮臛韲中又可含以香口朱子詩傳梅木名華白實似杏而酢桃朱子詩𫝊桃木名華紅實可食夭夭少好貌灼灼華之盛也木少則華盛孔疏桃或少而未華或華而不少此詩夭夭灼灼並言之則是少而有華者以喻女少而色盛言及時也徐氏常吉曰桃之為木多華然五年則老老則華减故以木少華盛為言蔡氏卞曰桃先百果而花故從兆其時則春而陽中也故以紀昏姻之時正朱氏道行曰凡華艶者鮮實桃夭不然春開夏結其實多而味美故曰有蕡其實于歸者之有子似之李爾雅休無實李郭註一名趙李邢疏李之無實者名休接慮李郭註今之麥李邢疏與麥同熟因名駁赤李邢疏李之子赤者名駁李時珍曰李緑葉白花其種近百色味不同遲早亦異麥李四月熟又有十月十一月熟者又有季春李冬花春實者東都嘉慶坊有美李人呼為嘉慶子中紅意爾雅所謂駁赤李者即此是也王風咏丘中有李繼麻麥之後謂賢者自有丘園之樂無意仕進故國人望其來而思之朱子解非是鬱劉稹毛詩義問云鬱五六尺其實大如李正赤食之甜本草云鬱一名雀李一名車下李一名棣生髙山川谷或平田中五月時實薁毛傳薁蘡薁也孔疏薁亦是鬱類而小别晉宫閣銘云華林園中有車下李三百一十四株薁李一株車下李即鬱薁李即薁二者相類而同時熟又云鬱薁生可食故以食言之葵菽須烹煑乃食棗當就樹剝撃取之故立文小異其實皆是食也嚴氏詩緝疏云鬱是車下李薁是薁李則薁李非車下李矣陸璣既以唐棣為薁李又云薁李一名車下李葢由二者相類故稱名相亂唐棣爾雅唐棣栘郭璞註似白楊江東呼夫栘舍人曰詩召南云唐棣之華陸璣疏唐棣薁李也一名雀梅其花或白或赤六月中熟大如李子可食詩緝唐棣即七月之薁也陸氏佃曰其華先反而後合詩曰偏其反而凡木之華先合而後開唯此華先開而後合秦晨風云隰有苞棣常棣爾雅常棣棣郭璞註今闗西有棣樹子如櫻桃可食舍人曰詩小雅云常棣之華陸璣疏云白棣樹也如李而小如櫻桃正白今官園種之又有赤棣樹亦似白棣葉如刺榆葉而微圓子正赤如郁李而小五月始熟孔疏曰與唐棣異木故爾雅别釋臣謹案召南之唐棣即薁大如李小雅之常棣小如櫻桃埤雅亦云唐棣之華反而後合此非常道故詩以譬權則此華之上承下覆甚相親邇者常而已矣故曰常棣也明係二物今人多混并坊間誤刻常棣為棠棣今正棗􅁄爾雅壺棗郭註棗大而鋭上者為壺壺猶􅉚也邊要棗郭註細腰今謂之鹿盧棗櫅白棗子白乃熟樲酸棗樹小實酢孟子曰養其樲棘案此即今之酸棗邶風吹彼棘心魏風園有棘即此是也遵羊棗實小而圓紫黒俗呼之為羊矢棗孟子曰曽晳嗜羊棗洗大棗出河東猗氏縣大如雞卵蹶洩苦棗子味苦晢無實棗不著子者還味稔棗還味短味右爾雅别棗類凡九種樲即所謂棘陸佃埤雅云大曰棗小曰棘棘酸棗也棗性髙故重朿棘性低故並朿朿音次棗棘皆有刺鍼嵩陽子曰余家於滑臺酸棗縣即滑之屬邑其樹髙數丈徑圍一二尺棗圓小而味酸今市人賣者皆棘子也冦宗奭曰小則為棘大則為酸棗更非二物詩緝曰經有二棘吹彼棘心園有棘酸棗也楚茨以棘配茨青蠅以棘為樊舊不知為何物今按爾雅釋草云茦刺郭璞云草刺鍼也方言凡草木刺人北燕朝鮮之間謂之茦自闗而西謂之刺江湘之間謂之棘則此棘屬草部非木部判然二物矣檖爾雅檖蘿郭註今楊檖也實似棃而小酢可食邢疏詩秦風云隰有樹檖陸璣疏云檖一名赤蘿一名山棃實如棃但小耳一名鹿棃一名䑕棃今人亦種之極有脆美者陸氏佃曰其文細宻如羅故曰羅赤羅文棘白羅文緩雖皆文木赤白為異甘棠杜爾雅杜赤棠白甘棠郭璞曰甘棠今之杜棃邢疏樊光云赤者為杜白者為棠陸璣云赤棠與白棠同但子有赤白美惡異耳白色為白棠甘棠也少酢滑美赤棠子澀而酢無味俗語云澀如杜是也臣謹案詩曰蔽芾甘棠曹氏曰蔽芾隂翳茂盛也詩言杜者凡三俱言有杕之杜杕特生也與蔽芾相反意赤棠與白棠其性本異赤棠木理韌亦可作弓幹今謂之棠棃用以鋟雕文字亦以其堅韌故耳樞爾雅藲荎郭註今之刺榆邢疏詩唐風云山有樞陸璣疏其針刺如柘其葉如榆瀹為茹美滑荎大結反鄭樵曰有一種刺榆有鍼刺如枳其葉如榆瀹為茹則滑美勝於白榆爾雅云樞荎唐風云山有樞即刺榆也木瓜爾雅楙音茂木瓜郭註實如小瓜酢可食邢疏詩衛風投我以木瓜是也已上花果之木梧桐爾雅櫬桐郭註今梧桐又謂之榮桐木以其華而不實故名邢疏櫬一名梧詩大雅云梧桐生矣于彼朝陽是也陸璣曰白桐材中琴瑟今雲南牂牁人績其皮為布甚好詩緝曰桐有青桐有白桐梧桐生矣之桐為青桐椅桐梓漆之桐為白桐椅梓爾雅椅梓郭註即楸邢疏詩鄘風云椅桐梓漆陸璣疏楸之疏理白色而生子者為梓梓實桐皮曰椅大類桐而小别也陸氏佃曰今呼牡丹為花王梓為木王蓋木莫良於梓故書以梓材名篇禮以梓人名匠蕭炳云梓樹如桐而葉小花紫鄭樵曰梓與楸相似爾雅以為一物誤矣人家多種於園亭令子孫孝順漆許氏慎曰桼木汁可以音休物象形桼如水滴而下蘇氏頌曰漆木髙二三丈皮白葉似椿花似槐子若牛李六七月以竹筒針入木中取之檉爾雅檉河栁郭註今河旁赤莖小楊邢疏陸璣云生水旁皮正赤一名雨師枝葉如松鄭樵曰檉本草謂之赤檉木以其材赤故也大概杉松之類而意態似栁故謂之檉栁爾雅其材可卷為盤合又曰檴落郭云可以為柸器素臣謹案據此則檉與大東無浸穫薪之穫同一物姑存之椐爾雅椐樻郭註腫節可以為杖邢疏大雅皇矣云其檉其椐陸璣疏節中腫似扶老今人以為馬鞭及杖灌毛傳灌叢生也爾雅灌木叢木邢疏詩周南云黄鳥于飛集于灌木是也栵爾雅栵栭音而郭註栭樹似槲􅈪而庳小子如細栗可食今江東亦呼為栭栗邢疏大雅皇矣云其灌其栵陸璣云葉如榆木理堅韌而赤可為車轅椔翳爾雅立死不弊頓者名椔枝葉蔽隂覆地者名翳邢疏大雅皇矣曰其菑其翳毛傳木立死曰菑自斃為翳以立死之木妨他木生長為木之害故曰菑自斃者生木自倒枝葉覆地為䕃翳故曰翳其文與此不同者所見本異也檿柘爾雅檿山桑郭註檿桑柘屬材中作弓及車轅大雅皇矣云其檿其柘冬官考工記云弓人取幹柘為上檿桑次之是也冦宗奭曰柘木裏有文亦可旋為器李時珍曰處處山中有之喜叢生幹疎而直葉厚而豐團而有光其葉飼蠶取絲作琴瑟清響勝常爾雅所謂棘繭即此蠶也其實狀如桑子粒如椒其木染黄赤色謂之柘黄天子所服杻爾雅杻檍郭註似棣細葉葉新生可飼牛材中車輞邢疏詩唐風云隰有杻陸璣疏云葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉疎華如練而細蘂正白今官園種之正名曰萬嵗梅爾雅梅柟郭註似杏實酢邢疏荆州曰梅揚州曰柟秦風終南云有條有梅陸璣云梅樹皮葉似豫樟葉大如牛耳一頭尖赤心華赤黄子青不可食柟葉大可三四葉一叢木理細緻于豫樟子赤者材堅子白者材脆是也楰爾雅楰䑕梓郭註楸屬也今江東有虎梓邢疏詩小雅云北山有楰陸璣云其樹葉木理如楸山楸之異者鄭樵曰即烏巢子也桋爾雅桋赤栜白者栜音棘郭註赤栜樹葉細而岐鋭皮理錯戾好叢生山中可為車輞白栜葉圓而岐為大木邢疏詩小雅云隰有杞桋陸璣疏棘葉如柞皮薄而白其木理赤者為赤栜一名桋白者為栜其木皆堅韌今人以為車轂枌爾雅榆白枌郭註枌榆先生葉却著荚皮色白邢疏榆之皮色白者名枌陳風東門之枌是也柞棫爾雅棫白桵郭註桵小木叢生有刺實如璫邢疏大雅云柞棫拔矣陸璣疏云三蒼説棫即柞也其材理全白無赤心者為白桵直理易破可為犢車輻又可為矛㦸矜鄭箋柞櫟也陸璣疏周秦人謂柞為櫟櫟爾雅櫟其實捄郭註有捄彚自裹邢疏櫟似樗之木捄盛實之房也秦風山有苞櫟陸璣疏秦人謂柞櫟為櫟此秦詩宜從方言鄭樵曰南土多槲北土多櫟爾雅櫟其實捄秦風山有苞櫟並此也其釋木云栩杼與唐風集于苞栩並是柞木而陸璣誤謂是此耳棫樸苞櫟爾雅樸枹者郭註樸屬叢生者為枹詩所謂棫樸苞櫟邢疏枹櫟皆木叢生之名樸屬叢生者為枹大雅云芃芃棫樸薪之槱之是也枹櫟者秦風云山有苞櫟隰有六駁是也臣謹案詩言柞棫又言櫟又言棫樸又言苞櫟陸璣謂棫即柞柞即櫟看來只是一物臣以大雅言柞棫者三緜皇矣二詩俱與下松栢相對松栢係二物則柞棫亦言二物可知但相類耳棫而言樸櫟而言苞更舉其形狀言之苞言其叢生樸屬言其根株盤結依附迫迮而生皆不才之木止可供薪槱耳龎元英文昌雜録今闗中有白蕤棫樸也芃芃叢生民家多採作薪且言烟與他木異嘗取試之其烟上直如線髙五七丈不絶詩所謂薪之槱之物雖㣲可以升燎於上帝亦蘋蘩蕰藻之謂邪樗鄭箋樗惡木陸璣疏采荼薪樗之樗樹及皮皆似漆青色耳其葉臭止可為薪小雅蔽芾其樗之樗此山樗也與田樗畧無異葉似差狹耳吳人以其葉為茗椒爾雅檓大椒郭註今椒樹叢生實大者名為檓邢疏唐風云椒聊之實陸璣疏椒樹如茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香可著飲食中又用蒸雞豚最佳檀六駁詩坎坎伐檀又小雅檀車幝幝陸璣草木疏檀木皮正青滑澤色似駁馬駁馬梓榆其樹皮青白駁犖遥視似馬故謂之駁馬亦曰六駁詩秦風云山有苞櫟隰有六駁或以六駁為獸觀下章云山有苞棣隰有樹檖皆山澤木相配不宜謂獸女桑爾雅女桑桋桑郭註今俗呼桑樹小而條長者為女桑樹邢疏豳風七月云猗彼女桑是也穫薪爾雅穫音鑊落郭註可以為杯器素邢疏檴一名落可作柸棬皮韌繞物不解小雅大東云無浸穫薪鄭箋曰檴落木名陸璣疏今椰榆也其葉如榆其皮堅韌剥之長數尺可為絙索又可為甑帶其材可為杯器是也臣謹案小雅無浸穫薪之穫字從禾毛傳曰穫刈也正義謂讀如穫稻之穫是穫為虚字乃是穫稻之薪耳而爾雅檴落之檴從木是木名音鑊一名落字既不同音義亦異康成殊屬强解故朱傳及嚴氏詩緝俱從毛松栢爾雅柏椈邢疏柏一名椈陸佃曰雜記所謂暢臼以椈者是也柏性堅緻有脂而香故古人破為暢臼用以擣鬱詩曰汎彼柏舟在彼中河言柏非不可以為舟特非柏之所宜故共姜守義引以自况王安石字説云松柏為百木之長松猶公也柏猶伯也故松從公柏從白六書精藴曰萬木皆向陽而柏獨西指葢隂木而有貞徳者故字從白白者西方也檜爾雅檜柏葉松身郭註詩檜楫松舟王安石曰柏視松猶伯視公伯用詘所執躬圭者以此公用直所執桓圭者以此檜相葉松身則葉與身俱曲樅松葉柏身則葉與身皆直樅以直而從之檜以曲而㑹之世云柏之指西猶鍼之指南也臣謹案古人作室造舟惟用松柏及楊商頌松柏丸丸魯頌徂來之松新甫之柏邶風柏舟衛風檜楫松舟小雅又云汎汎楊舟罕有用杉者杉爾雅作煔與杉同音郭註煔似松生江南可以為船及棺材作柱埋之不朽葢三代俱建都北土不生此木又地氣髙燥松柏俱植髙岡上性堅耐乆今人用作樑柱多患蟲蛀中空則古今地土不同故也楊爾雅楊蒲栁郭註可以為箭左傳所謂董澤之蒲是也埤雅云楊有黄白青赤四種惟黄楊貴堅緻難長俗語黄楊厄閏楊之孚甲早於衆木昏姻失時則曽木之不如也故詩曰東門之楊其葉牂牂牂牂盛也東門之楊其葉肺肺肺肺衰也以言嫁娶之暮如此鄭樵楊之類多白楊多種於墟墓間所謂白楊多悲風蕭蕭愁殺人是也水楊曰楊栁詩云楊栁依依是也又云蒲栁可為箭簳左傳董澤之蒲是也栁埤雅栁柔脆易生之木與楊同類雖縱横顛倒植之皆生松柏醜茂桑栁醜菀詩曰菀彼栁斯又曰有菀者栁不尚息焉言栁之菀非若松柏之茂然人尚庶㡬息焉以言幽王之不可朝事曽菀栁之不如也樸􅈪爾雅􅈪樸心邢疏樸􅈪一名心某氏曰樸􅈪有心能音耐濕江河間以作柱是樸􅈪為本名也詩召南云林有樸􅈪此云􅈪樸是傳冩之誤苞栩爾雅栩杼郭註柞樹邢疏栩一名杼唐風云集于苞栩陸璣疏今柞櫟也徐州人謂櫟為杼或謂之為栩其子為皁斗煑其殻為汁可以染皁穀陸璣疏幽州人謂穀桑中州人謂之楮殷中宗時桑穀並生是也今江南人績其皮以為布又擣以為紙謂之穀皮紙長數丈潔白光輝其葉初生可以為茹陸佃埤雅榖惡木也而謂之榖猶甘草謂大苦之類小雅樂彼之園爰有樹檀其下維籜又曰其下維榖葢檀堅厚籜脆薄其别之易也榖則惡木而疑於美散木而疑於才其别之則難矣故一章言尚其樹檀而下其籜二章言尚其樹檀而下其榖以誨宣王分别善惡有隆於後栲爾雅栲山樗郭註似樗色小白生山中因名亦類漆樹邢疏唐風云山有栲陸璣謂山樗與下田樗畧無異葉似差狹耳吳人以其葉為茗方俗無名此為栲者葉如櫟木皮厚數寸可為車輻或謂之栲櫟詩緝曰姑兩存之楛陸璣疏楛其形似荆而赤莖似蓍上黨人織以為斗筥箱器又揉以為釵大雅旱麓云榛楛濟濟即此楛也枸陸璣疏枸樹山木其狀如櫨一名枸骨髙大如白楊所在山中皆有理白可為函板枝柯不直子着枝端大如指長數寸甘美如飴八九月熟江南特美今官園種之謂之木蜜古語云枳枸來巢言其味甘故飛鳥慕而巢之本從南方來能令酒味薄若以為屋柱則一屋之酒皆薄按小雅南山有枸即此是也蒲陸璣疏蒲栁有兩種皮正青者曰小楊其一種皮紅正白者曰大楊其葉皆長廣似栁葉皆可以為箭幹故春秋傳曰董澤之蒲可勝既乎今人又以為箕鑵之楊按王風揚之水不流束蒲即此是也條爾雅槄音叨山榎音賈郭註今之山楸邢疏秦風云終南何有有條有梅陸璣疏條槄也今山楸也皮葉白色亦白材理好宜為車板能濕又可為棺木苦荼爾雅檟苦荼郭註樹小如梔子冬生葉可煮為羮飲今呼早采者為荼晚取者為茗一名荈音舛蜀人謂之苦荼陸羽茶經云其名有五一曰茶二曰檟三曰蔎音設四曰茗五曰荈楊慎丹鉛録云茶即古荼字音途詩云誰謂荼苦其甘如薺是也顔師古云漢時荼陵始轉途為宅加切或言六經無茶字未深考耳魏了翁卭州先茶記曰茶之始其字為荼如春秋書齊荼漢志書荼陵之類陸顔諸人雖已轉入茶音未嘗輒改字若爾雅若本草猶從草從余徐鼎臣訓荼猶曰即今之茶也惟陸羽盧仝以後則遂以荼為茶矣顧炎武曰古時未分麻韻荼荈字亦只讀為徒漢魏以下乃音宅加反而加字音居何反則猶在歌戈韻梁以下始有今音又妄减一畫為茶字愚㳺泰山岱嶽遍覽唐碑題名見大厯十四年刻荼藥字貞元十四年刻荼宴字皆作荼又李邕娑羅樹碑徐浩不空和尚碑吳通㣲楚金禪師碑荼毗字崔琪靈運禪師碑荼椀字亦作荼其時字體尚未變至㑹昌元年栁公權書𤣥秘塔碑銘大中九年裴休書圭峰禪師碑荼毗字俱减此一畫則此字變於中唐以下也漢書王子侯表荼陵節侯訢師古曰荼音塗地理志荼陵則曰荼音丈加反一人注書前後不同如此今湖廣長沙府荼陵州字竟作茶不復知有塗音矣路史引衡圖經曰荼陵者山谷中生茶茗也茶茗之茶本應作􅖗唐權徳輿陸宣公翰苑集序領新􅖗一串而已作此字今茶字乃俗字也臣謹案爾雅釋草云荼苦菜郭註詩曰誰謂荼苦苦菜可食邢昺疏本草云一名茶生於寒秋經冬厯春乃成月令孟夏苦菜秀是也於釋木又云檟苦荼陸羽及顔師古俱謂荼即古之茶字而魏了翁及近世顧炎武復申其辨甚力然則今日之茶爾雅於草木葢兩收之未知其究屬何部也茶之為字上從草下從木則兼收理當有之至陸璣草木疏則専收入草部而云得霜甜脆而美詩所謂堇荼如飴内則云濡豚包苦音而謂亨之以汁和也用苦菜是也又似與茶少别茶味苦與豚殊不相宜陸佃埤雅又引陳風出其闉闍有女如荼則竟以英荼之荼混入又堇荼如飴引驪姬置堇於肉以為證則是大毒殺人之物詩人何所取以為周原之美乎其説雜亂不倫得嚴氏粲辨之較然明矣詳見前釋草中桑爾雅有女桑桋桑檿桑山桑郭註俗呼桑之小而條長者為女桑其山桑似桑材中弓弩檿桑絲中琴瑟皆材之美者桑實曰葚毛傳鳩食葚過多則醉而傷其性樛木爾雅下句曰枓音求與樛同郭註樹枝下垂而曲名枓詩周南南有樛木是也喬木爾雅上句曰喬郭註樹枝上竦而曲巻者名喬周南南有喬木鄭風山有喬松是也瘣木瘣同壊爾雅瘣木苻婁郭註謂木病尫僂癭腫無枝條邢疏小弁云譬彼瘣木疾用無枝謂木病尫傴内疾故無枝條詩作壊木毛傳壊瘣也孔疏太子以見放之故棄其妃匹不得俱去譬彼内病之木不生枝條猶太子無匹不得生子也毛詩類釋卷十五
