body:
  text: 毛詩類釋卷十二國子監祭酒顧棟髙撰釋宫室房背疏房室所居之地總謂之堂房半以北為北堂背北堂也房半以南為南堂此盖專指東房而言是由北階入内寢處朱子曰房只是人出入處古人之房前有壁後無壁所以通内所謂焉得諼草言樹之背盖房之北也臣謹案王風所謂左執簧右招我由房曰由房則過乎房矣過乎房則入于寢也北堂下另有北階與寢之阼階相接由房入寢盖在此處楚茨詩樂具入奏盖于廟祭畢燕諸父兄弟于内寢樂隨以入此詩似咏其事詩大概與簡兮相類賢者不得志而仕于伶官相與勤其事若自喜而實自嘲玩其樂只且語氣可見序説未必不有據朱子以為婦人所作恐非附王風君子陽陽論君子陽陽朱子以為亦前篇婦人所作此只因君子于役首二字偶相同遂為此語耳不知行役之大夫其室家喜其初至何為有執簧執翿之語况由者是由此適彼之辭婦人舍其房室更欲何之讀楚茨之詩至樂具入奏恍然曰此伶官不得志之作與簡兮詩人相類朱子所謂若自譽而實自嘲也考古者室屋之制前堂之房與後寢相值正祭之時設樂于堂上下所謂鐘鼓既戒鼓鐘送尸伶官既有事矣至後寢以燕同姓乃復移樂入奏勢必由房以入寢此招我由房所由來也次章云由敖敖為舞位上章説聲此説容易更顯然古之賢人君子多隱于樂工如春秋太師摯諸人猶知逾河蹈海以去亂東遷之時政行不修砥行立名之士動輒罹咎伶官世所賤其職易給相與竊升斗之禄托微業以逃世所謂大隱隱朝市者非耶詩人于此于鬰伊無賴之中而為喜幸不勝之語孔子謂可以怨者于此見之其志婉而其辭悲矣序説謂君子遭亂相招為禄仕全身逺害意極得之而其㫖未明臣因推明其意而取證于楚茨樂具入奏之語極有考據儀禮諸篇詳房室之制而尚書顧命亦有東房西房惟毛詩于此僅見朱子不深考猥以為婦人所作已失之矣或又謂何不遂謂淫奔之詩豈不謬哉著庭堂爾雅釋宫門屏之間謂之宁詩作著李巡曰謂正門内兩塾間堂下至門謂之庭升阼階西階而後至堂堂以北為室與東西房陳爾雅當塗謂之陳詩胡逝我陳謂于東西階下用㼾甎築起髙于平地令易洩水便人行走其廟中路則謂之唐俱是堂下至門之逕特以廟庭異其名耳禮賓主入門有當陳揖當碑揖及階揖所謂三揖三讓也碑在庭之中央廟以麗牲寢以識日景宇户牖向屋漏宇簷下户室户兩扇為門單扇為户豳風八月在宇九月在户盖天氣漸寒自逺而至近也牖穿壁以木為交忩所以見日牖下為奥尊者所處古人祭必于奥奥為室西南隅近南日光為壁所掩故隱奥室西北隅為屋漏牖中日光穿漏于北故曰屋漏向北出牖也亦曰北牖禮病者居北牖下君視之則遷南牖下使君得南面視已孔子自牖執其手是也李氏如圭曰堂屋五架中脊之架曰棟次棟之架曰楣後楣之下以南為堂以北為室與房大夫士東房西室天子諸侯有東西房室又户東而牖西户不當中而近東則西南隅最為深隱故謂之奥而祭祀及尊者常處焉庭楹正冥朱傳庭宫寢之前庭楹柱也正向明之處冥奥窔之間也上章言堂之美此章言室之美臣謹案朱子因從前諸儒之説而以此章為專言室之美臣謂此章是兼堂室在内盖室與堂同一至門之庭室别無庭也若説向北有庭則為北堂而非室制矣楹即前堂之兩楹古人于此授玉行禮是向明之處所謂正也室西南隅為奥東南隅為窔奥窔之間在户之西而牖之下是幽暗處故曰冥惟此一句是專言室若室之楹則傍列東西房楹藏在壁間安得謂有覺其楹牖户之外即為前堂安得有殖殖其庭正是兩楹之間是對前庭當陽受日之處故得快快若室則東户而西牖受光處無多安得言此乎臣二十二嵗時撰儀禮宫室指掌圖極精細謹詳其説于左古人宫室之制兩下五架其正樑為棟以下二架為楣又下二架為􅍥後楣以北為室與東西房室一户一牖户東而牖西東西房惟一户俱在東東房無北壁房半以北為北堂詩所謂焉得諼草言樹之背也東楣􅍥之外四隅有四斜棟架屋為東西南北走廊其屋簷外出為宇所謂上棟下宇也宇四面各有階南面有阼階西階東西有兩側階北堂有北階宇飛垂而外出故曰如翬斯飛棟特起而髙峻故曰如鳥斯革則前章亦兼堂室言之盖同是兩下五架所成不容區别而庭與楹之不得屬于室更較然矣臯門應門疏王宫之外郭門曰臯門正門曰應門諸侯有庫雉無臯應朱子曰厯觀春秋禮記家語所載無云諸侯有臯應者則皋應為天子之門明矣意太王之時未有制度特作二門其名如此後遂尊為天子之門而諸侯不得立耳王氏樵尚書日記曰周禮天子之門五一臯門二庫門三雉門四應門五路門亦曰畢門外朝一治朝一内朝一亦曰燕朝外朝在庫門之外以朝萬民治朝在路門之外王日視治之朝以朝羣臣燕朝在路門之内路寢之庭以燕同姓玉藻云君日出而視朝退適路寢聴政視朝即治朝聴政即燕朝康王之誥王出在應内之内即路門外之治朝也廟寢一名路寢祊堂基唐爾雅室有東西廂曰廟無東西廂有室曰寢前廟以奉神後寢以藏衣冠祭畢燕諸父兄弟于此楚茨詩所謂樂具入奏以綏後禄是也亦曰路寢商頌單名寢曰寢成孔安魯頌路寢孔碩是廟亦有路寢矣凡廟中室屋之制與生人所居畧同特其名一二異耳廟門曰祊廟中路曰唐西夾之堂曰塾詩祝祭于祊孝子不知神之所在故使祝博求之于門内待賓客之處絲衣詩云自堂徂基此堂非廟堂乃門側西夾之堂所謂塾也冬官匠人云門堂三之二劉氏瑾曰門之内外夾其東西皆有塾一門凡四塾外兩塾南向内兩塾北向謂之塾則宜有基詩所指則内塾之基也箋曰使士升門堂視壺濯及籩豆降往于基告濯具爾雅疏曰祊有二種一是正祭之日使祝求神于廟門内二是祭之明日繹祭設饌于廟門外西室亦名祊是廟門内外皆有祊二者行禮俱不在廟故知此堂非廟堂也乃鄭注郊特牲以祊與繹為一時之事又云祊祭明日之繹祭也是舉其一而忘其一矣唐與陳俱是堂塗特以廟異其名耳詩中唐有甓是也宗湛露詩曰厭厭夜飲在宗載考傳曰夜飲必于宗室考成也燕畢而更留諸侯夜飲于同姓諸侯則成其禮若異姓有讓則止朱子曰宗室盖路寢之屬詩緝曰燕禮具官饌于寢東注云寢路寢也是在路寢之旁室壼詩室家之壼爾雅宫中衖謂之壼王肅曰今後宫稱永巷是宫内道名也臣謹案天子有六寢路寢一在前小寢五在後路寢以聴政小寢以燕息六寢之北有六宫后夫人與嬪御居之從宫逹寢有永巷宫中之長巷也后夫人由此以進御于君質明告去衆妾則見星而往見星而還寺人守之男不入女不出女御掌御叙于王之燕寢嬪妃來就雖天子不得至宫詩所稱巷伯是寺人之長伯長也周禮天官寺人之官凡五人宗室采蘋詩曰于以奠之宗室牖下傳曰宗室大宗之廟也劉氏瑾曰諸侯之庶子為别子别子之適子為大宗即大夫之始祖也百世子孫皆往祭于其廟館箋卿士之館在天子之宫如今之諸廬也疏考工記外有九室九卿朝焉注云九室如今朝堂諸曹治事之處謂天子宫内卿士各立曹司有廬舍以治事也退適治事之處為私對在天子之庭為公此私朝在天子宫内詩緝曰天子皮弁以日視朝凡朝服君與卿大夫同今天子之卿而服緇衣者盖既朝于天子而退治事則釋皮弁而服緇布衣以聴其所治之政其服以緇布為冠以黑羊皮為裘以緇布為衣而裼之其上加朝服十五升緇布為之其裳皆素詩記曰諸侯入為卿士皆受館于王室附録陳氏稽古編曰天子有五門最外曰臯門次庫門次雉門次應門最内曰路門外朝在臯門内治朝在應門内燕朝亦名路寢在路門内所謂三朝也路門亦名畢門亦名虎門亦名寢門以其内有路寢也路寢之内有小寢五是為王之六寢六寢之内則為后之六寢亦謂之六宫康成曰婦人稱寢曰宫正寢一燕寢五與王同諸侯有庫路雉而無臯應附梁名詩所咏為梁有四而棟梁不與無逝我梁在彼淇梁維鵜在梁鴛鴦在梁有鶖在梁皆漁梁也石絶水為堰而笱承其空天官人為梁王制漁人入澤梁指此如茨如梁橋梁也以木為之月令謹闗梁周語十月成梁指此爾雅釋宫隄謂之梁郭氏解之兼上二梁矣造舟為梁浮梁也雖用以渡水而異於橋惟天子得乗之五楘梁輈車上之梁也輈稍曲而上至衡從衡上而下句之則衡横於輈下如屋之梁也毛詩類釋卷十二
