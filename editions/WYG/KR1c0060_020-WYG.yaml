body:
  text: 毛詩類釋卷二十國子監祭酒顧棟髙撰釋車收毛傳收軫也孔疏軫車之前後兩端横木也所以收歛所載故名收焉兵車言淺收者對大車平地任載之車言之兵車當輿之内從前軫至後軫其深四尺四寸大車則其深八尺是兵車之軫比之為淺也人從後登車入於車内故以深淺言之顧夢麟曰小戎主行不主載故收用淺此句車軫之制也梁輈毛傳輈轅也梁輈上句衡也孔疏衡軛也轅從軫以前稍曲而上至衡則向下句之衡則横居輈下如屋之有梁故曰梁輈又以皮革五處束之其文章厯録然也顧夢麟曰輈不梁則無以便服馬之進退輈梁矣其木易於不堅故以革量其輈為五停而束之木與革相間其文厯録然此句是鉤衡之制也衡考工記衡長參如一鄭註衡長容兩服疏云參如一者謂俱六尺六寸也兩服謂服馬也以驂馬别有軥鬲引之衡謂車端横木游環脅驅孔疏游環在服馬之背上驂馬欲出則此環牽之脅驅以一條皮上繫於衡之兩端後繫於軫之兩端驂馬欲入則此皮約之詩緝曰游環者以環貫驂馬之靷游移無定處所以止驂馬之外出脅驅者以皮繫衡軫之兩端當服馬之脅所以止驂馬之内入王金儒曰游環靳環也左傳云吾從子如驂之靳毛傳朱子皆以為靷環非也靷靳二字有辨靳乃游環之名謂皮為圈引兩驂之外轡并取之内外轡所謂六轡也俱貫於圈内而執之所以制驂馬使不出外故謂之靳游者以環在轡上游移不定也隂靷毛傳隂揜􅓶音犯也鄭箋揜􅓶在軾前孔疏􅓶車軾前也由輈以上為􅓶詩緝曰以板横側置車之前及左右三面以隂暎車􅓶故謂之隂曰隂靷者隂板之上繫驂馬之靷也靷以皮為之車衡之長唯六尺六寸止容二服馬驂馬頸不當衡别為二靷以引車前繫驂馬之頸後繫於車前隂板之上故曰隂靷箱毛傳箱大車之箱也孔疏大東言晥彼牽牛不以服箱毛云服牝服以連箱言之為牛所用故知牝服也車人言大車牝服二柯又三分柯之二註大車謂平地任載之車牝服長八尺謂較也兩較之内謂之箱為車内容物之處輪説文有輻曰輪無輻曰輇輪車之所任以轉着地者也考工記曰凡察車之道必自載於地者始也是故察車以輪始凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敝不甐一本作鄰音吝於鑿註抒謂削其輪之外踐地處如劍脊也侔謂上下相等也澤多濕如以刀割泥而泥不附著是行澤欲抒之故搏圓也甐動也山多石如以圓滑之物行於石上雖為石所敝不動於鑿中是行山欲侔之故輻説文輻車輪旁所繫之直木用以輔輪而行者六書故輪之中為轂空其中以為軸所貫三十輻凑其外詩曰坎坎伐輻兮言伐檀木為輻也轂軧説文轂輻所凑也朱傳轂者車輪之中外持輻内受軸者也考工記轂也者以為利轉也註轂中空虚故輪轉便利大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂又左傳有笠轂宣四年伯棼射王汰輈以貫笠轂註兵車無葢尊者則旁人執笠依轂而立謂之笠轂汰過也謂箭過車轅及王之葢也又轂謂之軧説文云軧長轂也小雅約軧錯衡是也臣謹案兵車收用淺轂用長皆對大車言之大車軫深八尺兵車則四尺四寸比之為淺欲其輕㨗利走趨也大車之轂止一尺有半兵車則三尺二寸比之為長慮馳驅險阻轂短或至脱輻故也葢一物而短長盡制如此舝説文鍵也通名轄轄害也車之禁害也詩􅆁風載脂載舝許氏謙曰舝車軸頭鍵也其物以金為之無事則脱行則設之葢軸穿於轂而舝則貫於軸之兩端而鍵夫輪者也脂則脂其轂與軸使滑澤舝則加其鍵間闗軸與轂相切作聲也臣謹案漢陳遵傳每飯取客車轄投井中雖有急終不得去葢轄係小物可投井中者無之則車軸與輪為二不可載以行故古人有投轄記輔孔疏輔兩旁夾車木也詩小雅其車既載乃棄爾輔輔是可解脱物若今人縛杖於輻以防輔車也左傳輔車相依􅓶孔疏􅓶車軾前也由輈以上為􅓶詩緝曰舊音宄非也音宄者車旁從九謂車轍轍無不濡之理今當車旁從已音范少儀云祭左右范是也許氏謙曰按周禮輈人疏轍廣謂之軌轂末亦為軌黄公紹古今韻㑹引説文軌車轍也又音軸謂轊音衛頭也轊即車軸之端貫轂者車輪有髙下有廣狹皆定於軌輪中之軌既同則轍迹亦同後人因謂車轍亦曰軌曲禮塵不出軌以髙下言也中庸車同軌以廣狹言也葢兵車乗車之輪其崇六尺六寸軌居輪之中若濡軌則水深三尺三寸以是言之則此章軌字正不必改作􅓶但不作轍説可耳臣謹案嚴氏之説極當而許氏謙之説亦可通今並存之重較音角孔疏周禮輿人註云較兩輢上出軾者以角之兩頭皆置於輢上二木相附故據兩輢出軾而言也吕和叔曰古者車箱長四尺四寸三分前一後二横一木下去車牀三尺三寸謂之式又於式上二尺二寸横一木謂之較較軾通髙五尺五寸古人立乗非如今人之坐故平常則憑較若因為敬則落手憑下式而頭得俯正字通曰較在軾上若兩較然故曰重較輢是兩邊植木較横輢上輢兩而較一也説文曰較車輢上曲銅也較在軾上恐其墜故以曲銅闗之古謂較為車耳詩補傳曰較髙五尺五寸式髙三尺三寸較既出於式上故曰重較路車毛傳路車人君之車秦風何以贈之路車乗黄許氏謙曰周禮巾車金路以封同姓象路以封異姓革車以封四衛木路以封藩國皆諸侯也故人君之車曰路車又王風大車檻檻毛傳大車大夫之車疏曰此大車葢革車也大夫乗墨車天子之大夫出封如子男之服則車亦得乗諸侯之車故知此大車是革車也臣謹案毛孔以大車為革車以下毳衣而知之春官司服云子男之服自毳冕而下卿大夫服𤣥冕而天子大夫四命其出封則加一等如子男故得服毳衣衣得服毳則知車亦得乗子男之革路也錢氏曰尊之故言大車與平地任載之大車有别大車詩小雅無將大車祇自塵兮孔疏此大車是平地載任之車冬官車人為車有大車鄭云大車平地載任之車即此是也其車駕牛酒誥曰肇牽車牛遠服賈則是小人之所將也將猶扶進也詩緝曰君子推挽小人小人既進則譖害君子如人推挽大車大車既進則塵汙於人故君子悔之也臣謹案此大車謂平地載任之車其車駕牛凡車駕馬者則用人御車謂人在車上御六轡以左右之射御為六藝之一士大夫之所習也車駕牛者則用人將車謂人在車旁歩行扶進之罪𨽻之所職也詩小雅云我任我輦我車我牛孔疏引秋官罪𨽻職云凡封國若家牛助為牽傍鄭云牛助謂國以牛轉移也我車謂將牛車也别云我牛者此牛在轅之外不在轅中故别有人牽傍之在前曰牽在傍曰傍地官牛人云凡軍旅行役共其兵車之牛與其牽傍是也輦六書故車用人輓者也詩小雅我任我輦司馬法曰夏二十人而輦殷十八人周十五人周禮鄉師注曰輦車人輓行所以載任器者止以為藩營輦一斧一斤一鑿一梩一鋤周加二版二築以十五人而輦田車詩車攻云田車既好四牡孔阜疏曰田車田獵之車輶車毛傳輶輕也鄭箋輕車驅逆之車置鸞於鑣異於乗車也疏曰夏官田僕掌設驅逆之車驅謂驅禽使前趨獲逆謂御還之使不出圍是田獵之官所用若君所秉君所乗則謂之田車不宜以輶輕為名也朱傳曰鑣馬銜也驅逐之車置鸞於馬銜之兩旁乗車則鸞在衡和在軾也役車詩唐風云蟋蟀在堂役車其休孔疏春官巾車職庻人乗役車注云役車方箱可載任器以供役者然則收納禾稼亦用此車故知後車休息是農功畢之時也棧車詩小雅云有棧之車行彼周道毛傳棧車役車也鄭箋棧車輦者孔疏引周禮地官鄉師注云輦是人輓行所以載任器者止以為藩營是行止常依於道似狐之依於草也周禮巾車云士乗棧車庻人乗役車知此非士之棧車者以士之所乗非軍旅徒役所當有故知非巾車之棧車也此與庻人役車同又知非彼役車者彼不以人輓此乃從軍供役之輦故知不同也有棧是車之狀非士所乗之棧車也小戎毛傳小戎兵車也制度已悉見前元戎韓嬰章句曰元戎大戎謂兵車也車有大戎十乗謂車縵輪馬被甲衡軛之上盡有劍戟名曰陷陣之車所以冒突先破敵家之行伍也王氏曰軍行前曰啟後曰殿元戎十乗以先軍行之前者所謂選鋒也解頤曰十乗則為馬四十匹甲士三十人其為歩卒七百二十人附車飾鋈續孔疏謂銷此白金以鋈灌靷環非訓鋈為白金也金銀銅鐵總名為金此兵車之飾或是白銅未必是白銀也詩緝曰續者靷端續引之環也鋈續者以白金灌沃續引之環以為飾也王金儒曰鋈續隂板之上繫靷有環曰續冶白金沃灌其環以為飾觼軜毛傳軜驂内轡也鄭箋鋈以觼軜軜之觼以白金為飾也軜繫於軾前孔疏軜納也謂白金飾皮為觼以納物也觼是環之有舌者四馬八轡而經傳唯言六轡眀有二轡當繫之也馬之有轡者所以制馬之左右令之随逐人意驂馬欲入則偪於脅驅内轡不須牽輓故知軜者是納驂馬之内轡繫於軾前其繫之處以白金為觼也顧夢麟曰軜是驂内轡不可當隂靷之靷葢彼是引車之靷此是控驂之轡也王金儒曰計車前轡與革凡十二條在手者六轡游環則總收六轡之皮圈也繫之車者四革即脅驅隂靷各皮二條其二為驂内轡即軜也脅驅則繫之衡與軫靷則繫之隂板而軜則繫之軾也翟茀毛傳茀蔽也疏曰婦人乗車不露見車之前後設障以自隠蔽謂之茀因以翟羽為餙葢厭翟也次以羽使相厭簟茀朱鞹毛傳簟方文蓆也車之蔽曰茀諸侯之路車有朱革之質而羽餙孔疏曰用竹為蓆其文必方故云方文蓆也車之蔽曰茀謂車之後户案爾雅器云云輿革前謂之艱後謂之茀郭璞曰艱以韋靶車軾也茀以韋靶後户也如爾雅之文車前後之飾皆有革有簟故此説車飾云簟茀朱鞹也鞹是皮之去毛者諸侯之路車皆以朱革為本質其上又以翟羽為之餙也臣謹案采芑言簟茀魚服孔疏謂以方文竹簟之蓆為之蔽韓奕言簟茀錯衡孔疏謂漆簟以為車蔽若今之藩藩即齊侯以藩載欒盈及其士納諸曲沃之藩葢婦人之車也與此文簟茀朱鞹為三毛傳又謂是諸侯之路車則茀是國君所用不獨婦人有矣錯衡毛傳錯衡文衡也疏曰錯置文采為車之衡鞹鞃毛傳鞹革也鞃軾中也疏曰鞹毛之皮也鞃者兩較之之間有横木可憑者鞹鞃者以去毛之皮施於軾之中央持車使牢固也文茵毛傳文茵虎皮也疏曰茵者車上之褥用皮為之言文茵則皮有文采故知虎皮也淺幭毛傳淺虎皮淺毛也幭覆軾也疏曰獸之淺毛者唯虎耳謂以淺毛之皮為幭也臣謹案文茵與淺幭皆以虎皮為之茵施於車箱之内坐以為安幭覆於車軾之上行以為憑文言其采淺言其形狀耳鞃所以持車使牢固者非以為飾也約軧説文軧長轂也考工記設兵車乗車其轂長於田車故小戎云暢轂言朱而約之謂以朱色纒束車轂以為飾輪人云客轂必直陳篆必正篆轂約也葢以皮纒之而上加以朱漆知約以朱者以上言鈎膺是陳金路之事金路以金為飾轂色宜與金同又路車有奭奭是赤貎故知約必用朱也淑旂毛傳淑善也交龍為旂鄭云旂之善色者也綏章鄭箋綏所引以登車有采章也天官夏采注云徐州貢夏翟之羽有虞氏以為綏後世或無夏翟染鳥羽象而用之或以旄牛尾為之綴於幢上所謂注毛於竿首者然則孔疏綏者即交龍旂竿所建與旂共一竿為貴賤之表章故云綏章幃裳毛作帷裳婦人之車鄭作幃孔疏幃裳一名童容巾車云重翟厭翟安車皆有容葢容謂襜車以幃障車之傍如裳以為容飾故或謂之帷裳或謂童容其上有葢四旁垂而下此惟婦人之車飾為然丈夫之車立乗有葢無帷裳和鸞干寶周禮注曰和鸞皆以金為鈴鸞在衡和在軾衡是車前横木駕馬者軾是車上横木可憑者馬動則鸞鳴鸞鳴則和應舒則不鳴疾則失音故蓼蕭詩云和鸞雝雝言得其和也京山程氏云和金口木舌鸞金口金舌鸞在衡近於馬衡是車前駕馬者即軏也附録陳氏稽古編曰人駕車曰輦司馬法曰夏后氏二十人而輦殷十八人而輦周十五人而輦葢夏之末代所造見宋書及通典井丹亦云桀駕人車行則載任器止則為蕃營不以乗也詩車攻傳以徒為輦者為田獵也黍苗篇我輦為城謝也何草不黄篇有棧之車箋云輦者為用兵不息也皆以載任器惟巾車掌王后五路有輦車左傳晉范宣子使二婦人輦而如公齊子尾疾於公宫輦而歸衛公叔文子輦而歸然王后止乗於宫中三子或遇變或疾或老皆非其常也桀無故而駕之則世以為譏矣黄公紹謂王朝歩自周歩為歩輦恐不可從臣謹案此條極足砭世驕逸之習近世顧氏炎武亦云眀祖欲令諸子習於勤勞勅近處止許乗馬不得用肩輿亦此意然召誥王朝歩自周則至於豐周為鎬金去豐二十五里王豈能徒行而至乎黄氏之説或不盡誣也毛詩類釋卷二十
