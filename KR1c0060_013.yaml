body:
  text: 毛詩類釋卷十三國子監祭酒顧棟髙撰釋衣服衮衣繡裳箋衮衣裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彛虎雄也皆繢於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳舜有十二章周以日月星辰畫于旂而登龍於山登火於宗彛天子之龍一升一降諸侯但有降龍以龍首卷音衮然故謂之衮王之三公八命冕服七章與侯伯等及出封則加一等而服衮時周公以三公出封於魯故得九章也𤣥衮及黼箋𤣥衮𤣥衣而畫以卷龍也黼如斧形則繡之於裳詩記曰上公之服九章衮畫於衣九章之第一章黼繡於裳九章之第八章也侯伯鷩冕七章則自華蟲以下衣三章裳四章子男毳冕五章衣自宗彛以下而裳黼黻謂以毳衣畫虎蜼衣三章裳二章孤卿絺冕三章則衣粉米而裳黼黻絺刺粉米無畫衣一章裳二章大夫𤣥冕則𤣥衣黻裳而已衣無文裳刺黻凡冕服皆𤣥衣纁裳六服同冕者首飾尊也黻衣繡裳疏黻皆在裳言黻衣者衣大名與繡裳異其文耳𫝊黒與青謂之黻五色備謂之繡臣謹案黻為冕服第九章乃大夫元冕之服襄公既始命為諸侯秦伯爵當服鷩冕七章而云黻衣者鄭云王之賜服惟用有文章故也凡賜法上得兼下下不得兼上詩美襄公之受顯服云黻衣繡裳是得元冕也又曰錦衣狐裘是得皮弁服也諸侯之得王賜惟以有文章者為榮不在命服之貴賤常服黼冔傳白與黒謂之黼冔殷冠也夏曰收周曰冕疏周冕無繢繡之飾則殷冔亦不以黼為飾黼自衣服之所有也殷之諸侯祭服亦九章舉一章以表之耳案黼冔是二事黼是衣冔是冠素衣朱襮疏黼領謂之襮孫炎曰繡刺黼文以褗領是襮為領也郊特牲云繡黼丹朱中衣大夫之僭禮知諸侯當服之中衣者朝服祭服之裏衣也大夫中衣亦用素不必以繡黼為領繡黼惟諸侯乃得服之耳錦衣狐裘疏諸侯在國服麑裘不服狐白狐裘為諸侯在天子之朝所服諸侯受天子之賜歸則服之以告廟于後不復服之馮氏曰古人之裘最重狐白故天子以為朝服諸侯以為賜服凡在朝君臣同服而唯卿大夫得衣之又别其裼衣天子諸侯以錦大夫以以素禮服之重者也臣謹案檜風云羔裘逍遥狐裘以朝蘇氏轍曰緇衣羔裘諸侯之朝服錦衣狐裘諸侯朝天子之服今檜君以朝服燕而以其朝天子之服朝則其耽細娛而無逺慮可知矣狐裘黄黄箋黄黄然取温裕而已不求奢淫也疏狐色不一等狐白非君不服狐青乃小而美者則可以供公子詩取彼狐狸為公子裘是也若黄狐非貴服息人臘祭服之季秋草木黄落象其時物之色郊特牲云野夫黄冠黄衣黄衣盖狐裘也是通庶人皆得服之臣謹案第二章云臺笠緇撮以此例之則黄狐非貴服可知矣錦衣狐裘言其美也狐裘黄黄言其儉也同狐裘而以色殊貴賤如此非注疏孰能發此義羔裘豹袪豹褎豹飾疏君純羔大夫以豹飾袂是袖之大名袪是袖頭鄭風云羔裘豹飾亦謂以豹皮飾袂袖其實一也袪詩緝曰緇衣羔裘諸侯日視朝之服卿大夫朝服亦服之所異者君則純色臣則以他物飾其袖所謂豹袪豹褎是也素絲五紽五緎五總疏織素絲為組紃以英飾裘之縫中若線則凡衣皆用非可美故素絲以英裘非線也縫合羔羊皮為裘縫即裘之界域因名為緎五緎既為縫則五紽五總亦為縫也補傳曰合五羊之皮為一裘循其合處以素絲為英飾也百里奚衣五羊之皮盖倣古制錢氏曰兩皮之縫不易合故織白絲為紃施之縫中連屬兩皮因以為飾三英粲兮傳三英三徳也箋剛克柔克正直也程子曰三英若素絲五紽之類盖衣服制度之節臣謹案程子之説朱傳詩記及許氏謙俱從之而嚴氏粲以毎章第二句皆言徳美非裘飾而反有取於毛鄭謂立政有三俊英即俊也甚覺費辭詩只是平易若依嚴説讀去自覺不順粲字如何着落况其人之徳美自有末句在第二句原是屬裘講如朱傳所謂毛順而美豹甚武而有力未嘗不明順下句方説到之子立言自有次第也斷宜從朱傳毳衣箋毳衣之屬衣繢而裳繡其青者如菼菼蘆之始生也劉氏濟曰毳衣以宗彛為首盖畫虎蜼虎蜼淺毛故謂之毳毳衣所畫者三章宗彛也藻也粉米也裳所繡者二章黼也黻也盖天子大夫之服緇衣疏緇衣即士冠禮所云元冠朝服緇帶素􅔖是也卿士旦朝于王服皮弁退適治事之館釋皮弁而服緇衣以聴其所朝之政是卿大夫居私朝之服絲衣疏爵弁之服元衣纁裳皆以絲為之故云絲衣曹氏曰餘衣皆用布惟冕與爵弁服用絲大夫以上祭服謂之冕士祭服謂之弁其首服弁則其衣用絲故知絲衣為士助祭于王之服㑹弁如星綦曹風今本作騏箋弁皮弁也㑹謂弁之縫中飾之以玉皪皪而處若星明也疏周禮弁師王之皮弁㑹五采玉璂注㑹縫中也皮弁之縫中毎貫結五采玉十二以為飾謂之璂璂讀如綦綦結也詩㑹弁如星又曰其弁伊綦是也諸侯及孤卿大夫之皮弁各以其等為之侯伯璂飾七子男璂飾五玉亦三采武公本畿外諸侯入相于周自以本爵為等則玉三采而􅋒飾七也臣謹案周禮六冕王大裘而冕十有二疏上公衮冕九旒即詩所謂衮衣也侯伯鷩冕七旒子男毳冕五旒即詩所謂毳衣也絺冕三旒大夫元冕一旒士無冕用爵弁弁冕之次其色赤而微黒黒如爵頭然其制與冕同而其前不俛六冕之外有三弁從事韋弁服田獵冠弁服二者俱不常用唯視朝皮弁服則君臣同服之其制以白鹿皮為冠其形員其縫數如旒數毎貫之玉亦如之天子前後十二旒則弁前後亦十二縫毎縫貫十二玉上公九旒則弁前後九縫毎縫九玉玉有五采三采之别弁冕之制大畧如此載弁俅俅疏載戴也弁謂爵弁士祭于王之服禮有冠弁韋弁皮弁皆不以絲為衣且非祭服記云士弁而祭于公冠而祭于已士冠禮有爵弁服絿衣與此絲衣相當故知此弁是爵弁也有頍者弁傳弁皮弁也王者日視朝之服燕同姓亦服之疏賓之初筵三章箋云此祭末王與族人燕而經云側弁之俄是燕同姓用皮弁之事也言此皮弁之冠欲何為乎宜當服之以燕而幽王何以久不為責之之辭也許氏曰頍即古規字規為員者是弁之貌臺笠疏以臺皮為笠以禦暑雨是野人之服也前裘是冬所衣此笠是夏所用各舉其一而言言其不用美物其儉可知緇撮傳緇撮緇布冠也疏以緇布為冠僅撮持其髻而已古者始冠服緇布冠冠而敝之今都人士以為常服見其節儉素冠素衣素􅔖李氏樗曰毛以素冠為練冠謂練布使熟其色益白是以謂之素三年之䘮十有三月而練冠既練則衣亦練故曰素衣素韠也鄭以素冠為既詳素紕之冠謂經傳之言素者皆為白絹未有以布為者則知素冠非練也黒經白緯曰縞其冠用縞以素為紕縁邉也故謂之素冠至于素衣則素裳也毛氏謂思見練服練是十三月之練服未足以見其不能三年不如鄭氏之説為有據臣謹案素冠為祥冠王鄭説並同朱傳亦從之而吕氏詩記方駁王鄭之非而取毛傳練冠之説其詳甚辯詳見訂詁赤芾朱芾疏芾是配冕之服形制與鞸同别言之則祭服謂之芾他服謂之鞸班氏固曰芾者蔽也行以蔽前天子朱芾斯干詩朱芾斯皇是也諸侯赤芾以韋為之上廣一尺下廣二尺詩緝曰芾當作韍古字通也蔽膝之韍從韋黼黻之黻從黹音指采菽疏云士服爵弁以韎韐配之則服冕者以芾配之芾韠韐俱是蔽膝之象臣謹案采芑服其命服朱芾斯皇疏朱深于赤對文則朱赤深淺散則皆謂之朱芾是朱芾不獨天子也曹風三百赤芾疏周禮再命赤芾􅉳珩公侯伯之卿三命下大夫再命曹為伯爵大夫再命是大夫以上皆得服赤芾赤芾不獨諸侯也韎韐疏韎韐是蔽膝之衣合韋為之以茅蒐草染之赤色大夫以上祭服謂之黻士無韍名謂為韎韐士冠禮爵弁服韎韐是也語類問韎韐毛鄭以為祭服王氏以為戎服朱子曰戎服較是周禮凡兵事韋弁服注以韎韋為弁又以為衣裳左傳有韎韋之跗注是也詩韎韐有奭以作六師足知其為兵事所用邪幅箋邪幅如今行縢也幅束其脛自足至膝故曰在下疏縢緘也謂行而緘束之金舄赤舄疏金舄即禮之赤舄加金為飾故謂之金舄諸侯之服也複下曰舄禪下曰履王舄有三等赤舄為上冕服之舄也詩王錫韓侯𤣥衮赤舄則諸侯與王同服此二舄矣充耳瑱琇瑩瓊瑩瓊華瓊英傳充耳謂之瑱天子以玉諸侯以石箋所以懸瑱者紞也君五色臣則三色禮書曰瑱以充耳紞以懸瑱詩于衞夫人言玉之瑱也則瑱不獨施于男子婦人亦有之齊之著有素青黄三者即謂此三色之紞也用雜綵線織之以為懸瑱之繩琇與瓊皆言美石瑩鮮潔貎瓊華瓊瑛特異其文耳雜佩傳雜佩者珩璜琚瑀衝牙之類朱子曰左右佩玉也上横曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半璧而内向曰璜又以兩組貫珠上繫珩兩端下交貫于瑀而下繫于兩璜行則衝牙觸璜而有聲也補傳曰一説謂觽璲箴管凡可佩者皆是案佩玉非民間所常有後説為長子衿子佩疏衿與襟同交領也佩謂青組綬所以貫佩玉相承受者毛傳士佩瓀珉而青組綬珮璲箋佩璲者以瑞玉為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其徳則素餐臣謹案朱傳言東人或饋之以酒而西人曽不以為漿或與之以鞙然之佩而西人曽不以為長長即長短之長鞙鞙長貎言西人驕溢將物作賤如此此為得詩之本意鄭謂刺素餐似屬添出嚴氏解亦未當佩觽佩韘傳觽所以解結箋貎如錐以象骨為之韘之言沓所以彄沓手指以韋為之禮書曰食指中指無名指着沓所以放弦佩觽佩韘皆成人之飾也兩髦内則注云髦象幼時鬌音朶小兒剪髪也兒生三月剪髪為鬌男角謂兩髻女羇謂三髻長大猶為飾謂之髦所以順父母幼小之心父母殁則去之時僖侯尚存故云項氏曰髦者以髪作為髻垂兩眉之上如今小兒用一帶連雙髻横繫額上是也臣謹案諸侯小斂即脱髦此明云兩髦安得有襲攻共伯于墓上入僖侯羨自殺之事乎史遷之誣妄不辨自明矣葛屨要襋傳夏葛屨冬皮屨糾糾猶繚繚也詩緝曰疏以糾糾為稀疎之貎非也繚繞纒也糾三合繩亦繞纒之義葛屨既弊而以繩糾纒之糾而復糾行于霜雪寒沍之地言其苦也要之謂治裳之䙅襋之謂治衣之領未嫁之女子而為好人治䙅襋而利其傭資皆急于趨利也葛屨冠緌詩緝曰葛屨賤而在下五兩毎兩二隻言屨之有匹也冠之纓緌貴而在上雙止言緌之有匹也喻貴賤各有匹偶也箋以五兩以文姜與姪娣傅姆為五人襄公往從而雙之迂曲可發一笑垂帶古人上曰衣下曰裳不相連以大帶束衣裳之縫其垂者謂之紳詩曰垂帶而厲疏紳是帶之名厲是垂之貎也大帶之外有革帶所以佩觽礪之屬婦人不殊衣裳深衣則裳連于衣純之以采服以燕居玉藻云朝𤣥端夕深衣夕時著之明非禮衣也庶人則用以為吉服以其被體深邃故謂之深衣副笄珈髢周禮追師為副編次追衡笄副之言覆所以覆首為之飾若今之步揺服之以從王祭祀編編列髪為之若今之假紒服之以告桑次次第髪長短為之所謂髲髢即不屑髢也之髢服之以見王笄以卷髪衡以懸紞唯祭服有衡垂于副之兩旁其下以紞懸瑱編次則無珈者以玉加于笄為飾首服之最尊者唯后夫人有之其飾之有六今不可考矣詩緝曰毛以笄即衡笄是一物也鄭注追師云王后之衡笄皆以玉為之是鄭以衡與笄為二物其下文云唯祭服有衡釋衡為一物又云笄卷髪者釋笄為一物故鄭于此箋言笄而不言衡笄也疏混毛鄭為一説又引追師注云唯祭服有衡笄彼文無笄字疏盖誤象服箋象服謂䄖翟闕翟也詩緝曰翟皆刻繒以象鳥羽故謂之象服被疏被者首服之名儀禮少牢云主婦髲鬄與此被一也古者或剔取賤者刑者之髪以被婦人之紒為飾因名髲鬄即周禮所謂次也詩緝曰凡祭夫人首當服副不當服次或以為此在商時故與周禮異翟疏侯伯夫人之服自䄖翟而下疏翟雉名也三翟皆刻繒為雉形而彩畫之不用真羽祭統云夫人副褘謂公之夫人衞侯爵夫人當服揄翟褘同翬伊雒而南素質五色皆備曰翬江淮而南青質五色皆備曰䄖褘衣畫翬䄖翟畫揄闕翟謂刻而不畫展縐絺箋后妃六服有展衣縐絺是絺之蹙蹙者謂極精細疏夏服展衣以縐絺為裏是當暑袢延之服紲袢者去熱之名袢延熱氣也褧衣箋國君夫人當翟衣而嫁錦衣在塗所服詩緝曰褧禪衣也以縠為之加于錦衣之上中庸所謂惡其文之著也揥疏以象骨搔首因以為飾名之曰揥詩緝曰毛傳云揥所以摘髪盖摘音剔為摘取之義則今之鑷子矣非也搔首之揥因以為飾者若今之箆兒也縭爾雅婦人之褘謂之縭孫氏炎曰褘帨巾也郭注即今之香纓也褘邪交落帶繫于體因名為褘此女子既嫁之所著取繫屬于人之義曲禮云女子許嫁纓内則云衿纓是也詩云親結其縭謂母送女重結其所繫著以申戒之孫炎以褘為帨巾失之矣帨内則子事父母婦事舅姑左佩紛帨鄭注紛帨拭物之佩巾也詩無感我帨兮附録陳氏稽古編曰王之吉服九其六冕服其三弁服冕服六者大裘而冕及衮鷩毳絺𤣥是也弁服三者爵弁皮弁冠弁是也王服大裘其下衮冕至𤣥冕則公侯以至卿大夫上得兼下下不得僭上士則爵弁冕服皆𤣥衣纁裳爵弁服純衣纁裳緇帶韎韐皮弁服素衣素積緇帶素韠冠弁亦謂之𤣥冠亦謂之委貎其服謂之朝服緇衣素裳九服惟大裘不見詩九罭之衮衣采菽之𤣥衮衮冕服也唐風之七衣鷩冕服也大車之毳衣毳冕服也采菽之黼絺冕服也終南之黻衣繡裳𤣥冕服也瞻彼洛矣之韎韐周頌之絲衣載弁爵弁服也淇奥之㑹弁終南之錦衣狐裘皮弁服也召南鄭唐檜之羔裘鄭之緇衣冠弁服也外又有服弁服凶服也弁絰服弔服也韋弁服戎服也在九服之外矣而韋弁服亦見詩東山之裳衣六月之常服我服采芑之命服皆是又有𤣥端服亦𤣥冠𤣥衣與朝服同而裳不用素為異天子視朝以皮弁諸侯視朝以朝服大夫士在私朝以𤣥端冕服爵弁服絲衣也中衣用素皮弁服朝服麻衣也中衣用布即十五升布唐風之素衣朱襮諸侯冕服之中衣也謂之繡黼丹朱惟君得服之大夫士中衣得用素衣不得用朱襮矣若夫檜風之狐裘則息民之祭服也曹風之麻衣則深衣也檜風之素冠毛以為練冠鄭以為祥冠也鳲鳩之騏弁雜色之弁也顧命特設此服非禮之常服故鄭以騏為璂理或然也秦風之袍澤䙝服也無羊之蓑笠野服也都人士之緇撮則太古之冠而用為始加者也臣謹案陳氏考衣服之制極詳悉但周禮三弁係皮弁服冠弁服韋弁服見於經文爵弁為六冕之次士得用之不在三弁之列此以爵弁為三弁而戎事韋弁服反在九服之外與周禮不合褘衣䄖翟闕翟鞠衣展衣褖衣此王后之六服也其色經𫝊無文孫毓鄭𤣥各有同異要皆臆説難信其見於詩則葛覃之澣衣毛以為副褘盛服鄭以為自褘至褖皆是也采蘩之被音佩展褖二衣之首飾也邶之緑衣鄭以為褖衣也君子偕老之副笄褘衣䄖翟之首飾也象服鄭以為褕翟闕翟也其之翟亦此二翟也其之展展衣也惟鞠衣弗及焉裘有狐裘有羔裘有麑裘有貉有貍而羔裘之用最多大裘而冕黒羔裘也五冕之服爵弁服冠弁服皆黒羔裘天子諸侯燕居𤣥端服亦黒羔裘詩之羔裘皆冠弁服也君用純臣異其褎飾故有豹袪豹褎豹飾之稱焉狐裘有三其一狐白裘天子視朝皮弁服用之諸侯朝天子亦同皆裼以錦衣卿大夫在王朝亦衣狐白裘惟裼用素衣為異其二黄衣狐裘蜡祭後息民之祭及兵事韋弁服用之其三狐青裘大夫士𤣥衣之裘也玉藻𤣥綃衣以裼之是也𤣥衣即𤣥端服與天子諸侯服同而裘異矣見秦風終南者狐白裘也見檜羔裘及小雅都人士者黄衣狐裘也見邶旄丘者狐青裘也豳風取貍貉為裘貉裘以燕居論語狐貉之厚以居是也貍裘以從戎左傳定九年東郭書晳幘而衣貍製是也附佩玉古之君子必佩玉亦用以充耳然惟天子純用玉下此皆雜用玉石其見於詩者如鄘風玉之瑱也衞風充耳琇瑩小雅充耳琇實皆充耳也鄭風佩玉瓊琚王風貽我佩玖秦風瓊瑰玉佩大雅何以舟之維玉及瑶毛云舟帶也鄭云玉瑶容刀之飾皆佩也著詩之瓊華瓊英瓊瑩毛以為佩而鄭以為充耳也木瓜瓊琚瓊瑶瓊玖經雖不言所用然其見於他詩者皆以為佩則此三者亦佩也今考之毛傳惟瓊云玉之美者琚玖俱云玉名其餘皆云美石又云石次玉然則詩言瑱佩止瓊琚是全玉耳餘皆石也但諸名俱合瓊為文則玉石兼用可知盖古制如此黄公紹强為之解以英為玉之最貴華為玉之方成實為玉之既成與草木一例不免穿鑿毛詩類釋卷十三
