body:
  text: 毛詩類釋卷五國子監祭酒顧棟髙撰釋時令唐風蟋蟀篇蟋蟀在堂歲聿其莫毛傳曰蟋蟀九月在堂張氏以寧曰周以十一月為歲首故此言九月以後為歲莫周正也臣謹案日月其除除者除舊布新今人以臘月三十日為除夕是詩明言九月為歲將暮十月為歲除是以十一月為歲首之明證也豳風七月篇一之日觱發至四之日舉趾毛傳曰一之日周正月也二之日殷正月也三之日夏正月四之日夏二月周四月也據此則公劉當夏之時已自以子月起數以夏之十一月為正月以夏之正月為三月矣一之日二之日猶言一月之日二月之日不曰正而曰一者避時王之正朔也後武王伐商猶曰惟一月壬辰旁死魄蓋此時未革殷命猶從舊號實昉於此張氏以寧以豳風皆從夏時不引為周家建子之證蓋亦未悉此義十月蟋蟀入我牀下至曰為改歲入此室處孔疏曰為改歲者以仲冬十一月陽氣始萌可以為年之始故改正朔以建子為正歲亦莫止謂十月為歲莫是過十月則改歲乃大寒故言改歲之後觱發栗烈大寒之時方始入此室而居之也臣謹案豳風凡言月者皆夏正言日者皆周正此於十月之下即云穹窒熏鼠曰為改歲是明言公劉當夏時已自以十一月為歲首不待注疏而本文已是顯然九月築場圃十月納禾稼至其始播百穀孔疏曰上塞向墐戶是治都邑之屋此治野廬之屋朱傳云所以于茅索綯治屋之急如此者蓋以來春將復始播百穀不暇為此也臣謹案此書於十月之下則此時已是以十一月為來春矣可見三正原是通行夏時原不禁豳之用子正也二之日鑿冰冲冲至獻羔祭韭臣謹案二之日夏十二月也三之日夏正月四之日夏二月也以是為鑿冰藏冰啓冰之節月令仲春之月天子獻羔開冰先薦寢廟是豳風以夏之二月為四月矣周之改正不待有天下時為然也十月滌場至萬壽無疆朱傳云十月農功已畢歲晚務閒豳風相與盡其忠愛躋公堂稱兕觥而申來年萬壽之祝是亦十一月為歲首之一證也小雅采薇篇采薇采薇薇亦作止至曰歸曰歸歲亦陽止鄭箋曰十月為陽時純坤用事嫌于無陽故名此月為陽月張氏以寧曰首章曰莫止而三章曰陽止則周十二月夏之十月也周以夏之十月為歲莫以十一月為歲首也出車篇春日遲遲卉木萋萋倉庚喈喈采蘩祁祁張氏以寧曰諸詩皆屬周正無異詞獨此一篇有不合蓋周正雖改而夏正之迭用已久故民間之話言猶不能忘而稱道之吕氏云見三正之通於民俗此皆述民俗之話言非史官之紀事也枤杜篇日月陽止女心傷止征夫遑止鄭箋曰十月為陽遑暇也陽月而婦人思望其夫者以初時云歲亦莫止臣謹案此篇亦以十月為歲莫征夫可以歸而不歸故婦人思之也亦周正也六月篇六月棲棲戎車既飭惟此六月既成我服張氏以寧曰周六月夏四月也盛暑非玁狁入冦時也此係張氏新說非毛傳舊說也然極有理六月盛暑北藩弓矢俱脫故歷代書防秋則此云夏之四月者較是正月篇正月繁霜我心憂傷毛傳正月夏之四月鄭箋云建已純陽之月而霜多恆寒若之異傷害萬物故心為之憂傷此正月夏之四月周之六月也十月篇十月之交朔日辛卯日有食之亦孔之醜鄭箋曰周之十月夏之八月也八月朔日日月交㑹而日食為隂侵陽臣侵君之象張氏以寧曰下文燁燁震電蓋八月雷乃收聲之時而震電見焉亦為變異此詩亦周正也四月篇四月維夏六月徂暑秋日凄凄百卉具腓冬日烈烈飄風發發此篇毛鄭及孔疏皆主夏正說而張氏以寧必欲强從周月周時甚覺費力蓋周正只王者之發號施令與史官之編年紀事不得不用之至撫時道景則恆從夏正蓋此為切近便於人情而易曉如詩之咏春只云春日遲遲卉木萋萋不得以為周之春為夏十一月也此曰秋日凄凄百卉具腓若周之孟秋為夏之五月曰冬日烈烈飄風發發若周之孟冬為夏之八月豈有此景象乎張氏所云民俗之話言時有雜出者於出車篇既言之何於此篇而必欲强從周正致為此牽强費力之說也小明篇我征徂西至于艽野二月初吉載離寒暑二章昔我往矣日月方除曷云其還歲聿云莫三章昔我往矣日月方奧曷云其還政事愈蹙歲聿云莫采蕭穫菽張氏以寧曰周二月夏十二月也言自我之徂西至于艽野之地其時十二月朔旦今則已離歷冬寒夏暑尚未得歸此心之所以憂而且苦也曰至者據已至彼地而言曰往者據在家始發而言二章三章乃追叙其始發之時也日月方除除者除舊布新之謂日月方奧奧與厥民隩之義同周以十一月為歲首民寒而聚居於隩我之始往亦自謂其時即歸何至今歲將莫而尚未得歸至九月采蕭穫菽以為卒嵗之用也蓋小明大夫以夏十一月始發徂西以十二月至于艽野至明年之九月尚未得歸經歷踰年之久所以憂也此詩首尾相應次序甚明與周正合若以夏正二月而說則仲春非歲首不得以為除舊而布新自二月至九月則二月氣已暖至九月肅霜而肇寒亦不得以為離歷寒暑也臣謹案張氏此章發明周正之旨十分精當若毛傳以方奧為二月之初訓奧為暖則二月尚未可云暖鄭又據爾雅文四月為除尤無當上甫言二月此忽言四月且自四月至九月皆暖日無寒時又何言載離寒暑乎孔疏於蟋蟀篇引此采蕭穫菽為歲莫九月之事明以此為周正則此二月為周二月夏之十二月信矣周頌臣工篇嗟嗟保介維莫之春至命我衆人庤乃錢鎛奄觀銍艾鄭箋曰周之莫春於夏為孟春諸侯春朝孟夏故于周之晚春遣之勑其車右保介以時事當歸勸農趨時也孔疏曰知非夏之季春者以夏之季春非復朝王之月故知此為夏之正月也夏之孟春耕期已逼故勑其車右以時事歸即耕田是也張氏以寧曰蔡氏書傳引此以為牟麥將熟其為夏之莫春三月可知今考之全篇止曰將受厥明不曰來牟將熟將之云者未至而預期之辭見於經傳甚多况其曰如何新畬命我衆人庤乃錢鎛即七月之詩言于耜舉趾周官遂大夫正歲簡稼器修稼政之事嗟嗟保介即月令孟春祈穀天子載耒耜措之于保介之御間皆夏正孟春事也若待建辰之三月始治新畬始庤錢鎛不亦晚乎將受厥明乃期之之辭非即詩賦之比不可以文害辭也則此莫春為夏之正月信矣臣謹案張氏此條發明鄭孔周正之說亦極精朱子謂莫春是夏正建辰之三月恐未然毛詩類釋卷五
