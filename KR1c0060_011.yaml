body:
  text: 毛詩類釋卷十一國子監祭酒顧棟髙撰釋農器耜說文曰耜耒下耓也耒耜上句音鈎木也古者耒耜皆以木為之易斫木為耜揉木為耒濮氏曰周頌有略其耜畟畟良耜以起土者言之祭義天子諸侯躬秉耒以手所執柄言之臣謹案牛耕起於後世古者只用耜起土雖耕藉亦躬秉耒也又案大田云以我覃耜載芟云有略其耜覃略皆云利也又畟畟良耜孔疏云畟畟是刃利之狀則耜當以金為之周禮注古者耜一金兩人併發之其說近是若說用木太厚則不能入土鋭而利則虞缺折大易所云殆如結繩為書契之始耳事物紀原後漢末趙過為搜粟都尉始教民牛耕三犂共一牛一人將之實勝耒耜之利案後漢書王景傳明帝建初八年景遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起為陂稻田景乃驅率吏民修起蕪廢教用犁耕由是墾闢倍多遂銘石刻誓據此則牛耕之法不始於趙過矣又宋耒陽令曽之謹撰農器譜三卷周益公為之序曰譜凡耒耜耨鎛車戽蓑笠銍刈蓧蕢杵臼斗斛釡甑倉庾厥類惟十而牛犂蓋一編之館轄豫因演其說山海經曰后稷之孫叔均始作牛耕世以為起於三代豫謂不然牛若常在畎畝則武王平定天下胡不歸之三農而放之桃林之野乎蓋古者祭牛之外惟以享賓駕車犒師而已未及耕也其在詩曰載芟載柞其耕澤澤千耦其耘徂隰徂畛又曰有略其耜俶載南畝以明竭作於春皆人力也至於穫之積之然後殺時犉牡以為社稷之報若使之耕曽不如迎貓迎虎列於蠟祭乎厥後王弼傳易以為稼穡之資宋景文公祁闢之曰古者牛惟服車書肇牽車牛易服牛乘馬漢趙過始教民牛耕蓋本賈思協齊民要術豫謂輔嗣固失賈氏及景文亦未為得也案論語曰犁牛之子騂且角蓋犂田之牛純雜牝牡皆可用祭牛則非純非牡不可故曰騂且角也注疏乃以犂為雜色近世諸儒並從此義今考周禮牧人時祀牲必用牷牲純色外祭毁事用厖厖雜色是則純雜之辨雜色謂之厖不謂之犂也竊疑犂起於春秋之世故孔子有犂牛之言而弟子冉耕亦字伯牛禮記月令季冬出土牛示農耕早晚賈誼新書劉向新序俱載鄒穆公曰百姓飽牛而耕暴背而耘大率在秦漢之際何待趙過過特教人耦犂共二牛費省而功倍爾易傳出於魏晉苐見牛耕不復考其初而賈公彥考工正義遂謂起於後漢其失尤甚臣案益公之言甚辨以犂牛為耕田之犂冉耕字伯牛說極新異可喜然孔子之世沮溺耦耕又云耰而不輟皆用人力不聞其以牛也又賈思協宋景文俱云博雅但說牛耕起於趙過而不及王景豈未讀後漢書此傳耶景傳云先是百姓不知牛耕則自秦及西漢其不用牛耕審矣益公之言聊備異聞云爾又云耦犂共二牛詢之老農未嘗有此謹書之以俟知者朝氏曰元魏賈思協撰齊民要術十卷凡九十二篇錢臣工詩曰庤乃錢鎛奄觀銍艾說文云錢銚也古田器銚刈也是刈物之器也錢氏天錫曰錢以起土用於耕鎛釋名云鎛鋤類迫地去草六寸所以入苖間亦云耨鎛耨當是一器髙誘云耨藝苖也良耜云其鎛斯趙以薅荼蓼趙是刺地除去水陸穢草是鎛是藝治田疇之器銍釋名云銍穫禾鐵今之穫禾短鐮也管子云一農之事必有一銍一耨一銚然後成農是三者皆田器蓑笠無羊詩何蓑何笠毛傳曰何揭也蓑所以備雨笠所以禦暑又良耜詩其笠伊紏毛傳曰紏然笠之輕舉也毛詩類釋卷十一
