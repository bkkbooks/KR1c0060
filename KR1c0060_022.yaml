body:
  text: 詩經類釋續編序臣既輯毛詩類釋上自天文地理旁及草木鳥獸蟲魚之屬靡不臚列備載復尋其訓詁如王于出征于當訓曰廢為殘賊廢當訓大與他經解釋絶殊初亦甚駭其義既乃知其出自爾雅復有一字而兩解者如蒸當作君又作進周頌豐年蒸畀祖妣是也幠當訓大又作有魯頌閟宫遂幠大東是也今本作逐荒或出齊魯韓詩懼淺學之士不加詳考杜撰解釋致昧經㫖乃復即爾雅釋詁釋言釋訓三篇删其常語通行擇其中古奧難曉者先列爾雅音釋於前臚載國風雅頌經文於後俾知一字一訓有所受之其有後儒之說勝於前者則為之標眀其姓氏而後經㫖燦然大眀雖千百年之逺宛如晤對一堂語言可通謦咳可接孰謂訓詁無益於經學哉夫爾雅本為詩詁自儒者髙談心性視為不急類多髙閣置之自臣為此編約而易舉朗如列眉不費檢尋直遡來厯雖窮簷陋巷之士皆得家置一編藉以薰習風雅無復空踈鹵莽輕改古人浮剽不根之病其於聖天子崇重經學之意未必無小補云乾隆癸酉八月下浣八日臣顧棟髙謹序
