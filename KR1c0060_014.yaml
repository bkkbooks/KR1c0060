body:
  text: 毛詩類釋卷十四國子監祭酒顧棟髙撰釋草黍稷朱傳曰黍穀名苗似蘆髙丈餘穗黒色實圓重稷一名穄似黍而小許氏謙辨之曰黍稷稍相類但黍黄而稷黒黍小而稷大朱子解二物似差互今以𫝊文兩易之曰黍似稷而小穗黄色稷苗似蘆髙丈餘實圓重穗黒色如此恐得其實臣謹案江南人不食黍稷黍今之細米北地人用以煑粥極黏稷今北地下人食之皆旱地所生黍貴而稷賤禮子卯稷食言以忌日貶而食稷周頌其饟伊黍賤者猶食黍見豐年之象黍黄稷黒黍小稷大臣猶及見之不知朱傳何故違反豈書成時未及細檢耶鄭氏樵曰稷苖穗似蘆而米可食為五穀之長五穀不可徧祭故祀其長以配社蔡氏卞毛詩名物解曰黍丹穀也仲夏乃登故謂之黍而聲與暑同氣浮而味甘馨香而滑齊故宜為酒以降神神陽物也黍亦陽物也其馨香上達之氣足以降之故用為酒醴詩緝曰黍禾屬而黏者也以大暑而種故謂之黍李時珍曰稷與黍一類二種也黏者為黍不黏者為稷稷可作飯黍可釀酒猶稻之有粳與糯也稻一名稌朱傳稻即今南方所食稻米水生而色白者也黄氏曰水田夏種冬收葉細而長髙四五尺有赤白紫芒數種米粒霜白一名稌周頌豐年多黍多稌周禮職方氏雍冀髙燥其穀宜黍荆揚下濕其穀宜稻稻即稌黍稌皆熟則百穀無不熟是其證也爾雅稌稻説文云沛國謂稻為糯秔稻是也秔俗作粳粳糯甚相類黏不黏為異耳邢昺疏曰内則云牛宜稌豳風七月云十月穫稻稌稻一物也字林云糯黏稻也秔稻不黏者鄭樵曰稻有粳糯二種古人謂糯為稻五穀之類皆有粳糯粟之糯曰粱曰粢黍之糯曰秫曰衆爾雅云衆秫是也臣謹案爾雅衆音終郭璞註黏粟也邢昺疏衆一名秫説文云稷之黏者也與穀相似米黏北人用之釀酒粱本草註粱有青粱黄粱白粱皆粟類也種蒔多白粱青黄稀有青粱穗有毛粒青米亦微青而細於黄白粱黄粱穗大毛長殻米俱粗於白粱白粱穗大毛多而長殻粗扁長不似粟圓也糜音門芑詩維糜維芑糜爾雅作虋音同門郭璞注今之赤粱粟芑白苖今之白粱粟皆好穀也臣謹案糜芑即粱中之二種有赤白之異耳李時珍曰粱即粟也考之周禮九穀六穀之名有粱無粟可知矣自漢以後始以大而毛長者為粱細而毛短者為粟今則通呼為粟而粱之名反隱矣今世稱粟中之大穗長芒粗粒而有紅毛黄毛白毛之品者即粱也秬秠詩維秬維秠爾雅秬黒黍秠一稃二米者郭璞註秠亦黒黍但中米異耳漢和帝時任城生黒黍或三四實實二米得黍三斛八斗是鄭康成云秠即皮其稃亦皮也李巡曰古之定律者以上黨秬黍之中者累之以生律度量衡後人取此黍定之終不能協律或云秬乃黍之中者一稃二米之黍也此黍得天地中和之氣而生盖不常有有則一穗皆同二米粒並均匀無小大故可定律他黍則不然地有肥瘠嵗有凶穰故米有小大不能定律今上黨民間或值豐嵗往往得二米者但稀濶故不以充貢耳重周禮作穜穋周禮作稑稙穉疏重穋稙穉生熟早晚之異稱耳非穀種名傳云先種曰稙後種曰穉當謂先種先熟後種後熟但傳畧而不言其熟耳七月傳曰後熟曰重先熟曰穋天官内宰鄭司農注先種後熟謂之穜後種先熟謂之稑是傳亦畧而不言其種與此互相明耳臣謹案疏言先種先熟後種後熟即今之早稻晚稻其種各别但同名為稻耳疏語亦微有病鄭司農所言後種先熟謂之稑或如今之六十曰稻江隂縣有之蔡氏卞曰稙穉以言其穀之備穜稑以言其穀之美秬秠糜芑以言其穀之嘉也七月陳先公風化之所由得土之盛故曰穜稑稙穉之種因天時也穜穋之實得地氣也閟宫備言后稷稼穡之道故校四者而言之為稼穡而因天時得地氣此所以降之百福也美穀可以養人嘉穀不可以為食之常先王第用之於祭祀而已故生民言后稷之肇祀而曰誕降嘉種秬秠糜芑粟本草粟米小米也古者以粟為黍稷粱秫之總稱而今之粟在古但稱為粱後人乃專以粱之細者名粟大抵黏者為秫不黏者為粟故呼此為秈粟北人謂之小米也詩交交桑扈率場啄粟桑扈竊脂而循場啄粟為失其性稂莠爾雅稂童粱郭璞注稂莠類也詩曹風浸彼苞稂陸璣曰禾秀為穗而不成則嶷然謂之童粱大田云不稂不莠莠似苖之草疏粺音敗詩大雅彼疏斯粺胡不自替箋疏糲也粺則精矣彼小人如疏粗之糲米君子如精粺小人胡不自廢以避君子乎正字通曰粺米稍疏也疏與粺皆喻小人言小人當引分自廢非疏喻小人粺喻君子朱傳因毛云粺精也故誤以粺屬君子未詳詩本義耳臣謹案正字通之説非也毛傳云彼宜食疏今反食精粺鄭云米之率糲十粺九鑿八侍御七孔氏正義曰其術在九章粟米之法粟率五十糲米三十粺二十七鑿二十四侍御二十一言粟五升為糲米三升以下則米漸細故數漸少則粺為精米僅次於鑿確有明據厯考蘇吕嚴及許白雲諸家無不為此説者而晦菴亦從之且考詩本文一彼一斯較然分别今乃云疏與粺皆喻小人與語氣全不合苴豳風九月叔苴毛傳叔拾也苴麻子也孔疏曰下章納穀有麻為男功之正此説男功之助言叔苴者以麻九月初熟拾取以供羮菜其在田收穫者猶納倉以供常食也臣謹案儀禮斬衰䘮服傳云苴絰者麻之有蕡者也爾雅云蕡實孫氏注云麻子齊衰傳云牡麻者枲麻也爾雅枲麻疏云禹貢青州岱畎絲枲是也儀禮疏云牡者對蕡為名是雄麻無子者本草云雄者名牡麻雌者名苴麻然則蕡是子麻詩言九月叔苴毛云苴麻子是也枲是雄麻皮可績為布詩言東門之池可以漚麻是也麻此係禾麻之麻蔡氏卞曰麻八穀之貴者也其實謂之苴從且人可以為食而不可以為常豳風言九月叔苴是也五穀之養人以為浮虚為下以沉食為上胡麻食之沉實者凡穀之貴者又宜加碓以治之麻從林稷從畟皆勤治之意也麻為麻枲之麻者以其求治析治於覆屋之下故同字臣謹案卞為王安石壻故其解多從字説不免穿鑿傅㑹然其分别禾麻與麻枲自是的解毛詩禾麻菽麥所以為食者也王風丘中有麻及陳風不績其麻所以為衣者也荏菽箋荏菽大豆也爾雅戎菽謂之荏菽樊光李巡郭璞皆云今之胡豆邢昺疏曰春秋齊侯來獻戎捷穀粱傳云戎菽也管子亦云北伐山戎出冬蔥及戎菽布之天下今之胡豆是也案此戎菽皆為大豆註穀粱者亦以為大豆也郭氏等以戎胡俱是夷名故以戎菽為胡豆本草胡豆一名蠶豆豆莢狀如老蠶故名王禎農書謂其蠶時始熟故名或乃以此為豌豆誤矣此豆種亦自西土来雖與豌豆同名同時種而形性逈别太平御覧云張騫使外國得胡豆種歸即此臣謹案后稷藝荏菽以前民用即當通行中國不應厯夏商至周之春秋經千四百年始出自戎胡也如管子所言倘齊桓不伐山戎中國便無此種何以小宛言中原有菽庶民采之乎至云張騫得其種荒唐益甚其誤盖原於穀粱改經文戎捷為戎菽而爾雅即承其誤以戎菽為荏菽試思蠶豆非切於民用者何以生民首先咏此開實堅實好實穎實栗之始也竊意荏菽即今之作腐榨油造醬者本草亦云大豆為近得其實菽小宛疏菽大豆也采其葉以為藿以芼牛謂以鼎煑牛取其骨體置之於俎其汁則芼之以藿調以五味乃盛之於鉶謂之鉶羮詩緝曰箋于生民荏菽及采菽小宛中原有菽三處皆云大豆是鄭意以菽即荏菽也藿爾雅作靃詩小雅皎皎白駒食我場藿爾雅蔨巨員切鹿靃郭璞註今鹿豆也葉似大豆根黄而香蔓延生邢昺疏本草云味苦苖似豌豆有蔓而長大人取以為菜亦微有豆氣名為鹿豆李時珍曰鹿喜食之故名鹿豆一名野綠豆多生麥地田野中苖葉似綠豆而小引蔓生三月開淡紫花其子大如椒子生熟皆可食麥來牟來一作麳牟一作麰疏黄雅云麳小麥麰大麥也秋種冬長春秀夏實具四時中和之氣故為五穀之貴地暖處亦可春種至夏便收然四氣不足故有毒李時珍曰麥字從來從久天所來也詩云貽我來牟是矣以上五穀蘋傳蘋大蓱一本作萍音平也詩緝曰本草水萍有三種其大者曰蘋葉圓寸許季春始生可糝蒸以為茹其中者曰荇菜其小者曰水上浮萍江東謂之薸音瓢止可用以養魚毛氏以蘋為大蓱是也郭璞以蘋為水上浮萍即江東謂之薸是以小萍為大萍誤矣蘋可茹而薸不可茹豈可用以祭祀乎左傳曰蘋蘩藴藻之菜則可茹之物非薸也鄭樵曰藻生乎水中萍生乎水上萍之名類亦多爾雅云蘋蓱其大者蘋又云苹藾蕭足以惑人蓱者水中浮蓱也江東謂之薸是也蘋水菜葉似車前詩所謂于以采蘋是也苹蔞蒿也即藾蕭詩所謂呦呦鹿鳴食野之苹是也按苹亦曰水花蘩爾雅蘩皤音婆蒿孫炎曰白蒿也陸氏佃曰從初生至枯白於衆蒿今俗謂之蓬蒿可以為葅七月詩采蘩祁祁所以生蠶也今洗蠶種尚用白蒿朱傳曰蠶生未齊未可食桑故以此啖之也今人猶用之于以采蘩于沼于沚疏蘩非水菜言沼沚者謂于其旁采之就以潔之也鄭樵曰茵陳蒿南人所用者似香薷北人所用者似青蒿即白蒿也李時珍曰蒿有水陸二種詩呦呦鹿鳴食野之苹此陸生皤蒿也詩于以采蘩于沼于沚左傳蘋蘩藴藻之菜並指水生白蒿而言則白蒿之為蔞蒿無疑矣鄭樵謂苹為蔞蒿鹿乃山獸蔞乃水蒿豈相涉乎又或以白蒿為茵陳其苖葉亦相似然以入藥恐不可用藻召南于以采藻傳云藻聚藻箋曰藻之言澡也婦人之行取自潔清故取名以為戒左傳蘋蘩藴藻之菜藴訓聚也以此草好聚生故言藴藻陸璣曰藻生水底有二種一種葉似雞蘇莖大如筯長四五尺一種莖大如釵股葉似蓬蒿謂之聚藻此二藻皆可食熟煑挼去腥氣米麵糝蒸為茹嘉美揚州飢荒可以當穀食又禮教成之祭牲用魚芼之以蘋藻則蘋藻皆芼魚之物蔞周南翹翹錯新言刈其蔞爾雅購蔏音商蔞郭璞註蔏蔞蔞蒿也生下田初出可啖江東用羮魚陸璣疏云其葉似艾白色長數寸髙丈餘好生水邊及澤中正月根牙生旁莖正白生食之香而脆美其葉又可蒸為茹蔡氏卞曰蔞野草之賤者所以喻漢上游女孤直而異於衆木故雖生於中田原野之間與薪相錯而翹翹可辨蕭苹莪蒿蔚爾雅苹藾蕭郭璞曰今藾蒿也詩緝曰陸佃謂蒿之類甚多有曰蕭者今人所謂萩音秋蒿或謂之牛尾蒿似白蒿莖粗科生有香氣故祭祀以脂爇之為香以此言之蒿為總名蕭者蒿之香者也故取蕭祭脂疏以為香蒿也曹風浸彼苞蕭苞者科生之義曰蘩者白蒿也曰苹者藾蒿也小雅呦呦鹿鳴食野之苹即此曰菆音欠者青蒿也曰莪者蘿蒿也小雅菁菁者莪即此曰蔚者牡蒿也小雅蓼蓼者莪匪莪伊蔚即此蔚無子故曰牡蒿亦曰馬薪蒿蒿之尤粗大者莪始生美香可食至成蒿則粗惡不可食故菁莪以喻人材而蒿止為鹿食人子始生無不望其為莪到長大無非是蒿孝子所以自傷悼也鄭樵曰莪莪蒿也一名蘿故又謂之蘿蒿爾雅云莪蘿詩云菁菁者莪本草謂䕲蒿芹魯頌言采其芹爾雅芹楚葵郭璞註今水中芹菜陸佃曰芹潔白而有節其氣芬芳而味不如蓴之美故列子以為客有獻芹者嘗之蜇於口慘於腹是也堇荼疏爾雅云芨堇草郭璞註即烏頭也江東人呼為堇朱傳從之因云荼即荼毒今人用以藥溪魚者皆係不可食之物詩緝非之曰孔氏謂堇即烏頭且引驪姬置堇於肉以為證果如此則與鴆毒同類與荼菜可食之物非其類矣且詩人稱周原之美當言宜稼宜疏不應言其宜毒物也荼得霜而甜脆故可言如飴烏頭毒物不可食何由知其如飴乎地之美者能使物之苦者皆甘安能變毒物而為美物也毛氏以堇為菜不言毒物説文言堇蒸食之甘知為内則及公食禮堇萱之堇非爾雅芨堇之堇矣臣謹案公食大夫禮鉶芼牛藿羊苦豕薇皆有滑鄭註滑堇荁之屬苦即此荼堇即此堇也爾雅云齧苦堇郭璞註今堇葵也邢昺疏可食之菜野生非人所種俗謂之堇菜葉似蕺花紫色内則云堇荁枌榆是也臣謂此即堇荼如飴之堇邢疏芨堇郭註謂即烏頭引大雅此詩誤邢疏之誤當由孔疏之先誤也嚴緝辨之極分明朱傳因孔氏以堇為毒物而并以荼為荼毒之荼非矣又邢疏本草云味甘爾雅云苦堇者古人語多倒猶甘草謂之大苦也苦唐風采苦采苦首陽之下傳苦荼也邶風誰謂荼苦爾雅云荼苦菜邢昺疏本草一名荼生於寒秋經冬歴春乃成月令孟夏苦菜秀是也陸璣云生山田及澤中得霜脆而美案公食禮鉶芼羊苦即用此臣謹案苦即荼荼即後世之茶楊慎云茶即古荼字字詳見後釋木中詩緝曰經有三荼一曰苦菜二曰委葉三曰英荼邶風誰謂荼苦及唐風采苦采苦緜堇荼如飴之荼皆苦菜也良耜以薅荼蓼之荼委葉也鄭風出其闉闍有女如荼之荼英荼也又鴟鴞詩予所捋荼傳云菼苕疏云薍薍音亂菼也似葦而小之秀穗亦英荼之類薺爾雅蒫薺實邢疏本草云薺味甘人取其葉作葅及羮詩謂荼苦其甘如薺今之薺菜是也薇疏薇山菜也陸氏璣曰莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以供宗廟祭祀項氏曰薇今之野豌音剜豆苖也蜀人謂之巢菜東坡改名為元修菜案公食禮鉶芼豕嶶即用此蕨疏爾雅蕨虌陸璣云周秦曰蕨齊魯曰虌初生似蒜莖紫黒色可食如葵陸徳明曰俗云其初生似鼈脚故名荇菜一名茆爾雅荇接余郭璞註叢生水中葉圓在莖端長短隨水深淺陸璣曰莖白葉紫赤色正圓徑寸餘浮生水上根在水底上青下白鬻音煑其白莖以苦酒浸之脆美疏天官醢人陳四豆之實無荇醢或殷禮也鄭樵曰今謂之水荇蔓鋪水上故杜甫詩云水荇牽風翠帶長蔡卞曰荇菜一謂之茆順陽而長本係隂而固有清潔不可陷溺之徳故以况淑女以薦神明魯頌思樂泮水言采其茆盖僖公有教養之善而所教者其卒有髙明光大之徳也臣謹案詩緝曰芼之謂為羮也用菜雜肉為羮則荇菜為鉶羮又不止陸璣所説苦酒浸之脆美而已卷耳爾雅卷耳苓耳陸璣曰葉青白色似胡荽白華細莖蔓生可煑為茹四月中生子如婦人耳璫本草即今蒼耳今人麯中多用之疏后妃主酒漿之事豫采卷耳以為麯糵備勞使臣之用葵爾雅蔠音終葵一名蘩露郭璞註承露也大莖小葉華紫黄色可茹公儀休所㧞是也左傳曰鮑莊子之知不如葵葵猶能衞其足今葵心隨日光所轉輒低覆其根名曰向日葵豳風七月亨葵及菽即此𤓰瓞爾雅瓞瓝步角切其紹瓞孫炎曰瓞小𤓰也郭璞註紹者𤓰蔓緒亦着子但小如瓝邢昺曰𤓰有二種大曰𤓰小曰瓞此則其種别也而𤓰蔓近本之𤓰必小於先嵗之大𤓰亦謂之瓞孔疏曰此綿綿不絶者是𤓰紹之瓞繼先嵗之𤓰嵗嵗相繼恒小於本若將無復長大之時以喻后稷天子之胄封為諸侯後更遷於豳世世漸微若將無復興起至太王而始興此王業也壺傳壺瓠也疏㫁取而食之壺性蔓生斬之故曰斷長樂劉氏曰枯者可為壺嫩者可為茹瓠犀甘瓠傳瓠犀瓠瓣也疏爾雅作瓠棲棲與犀字異音同言莊姜齒白而整如瓠中之子甘瓠詩記曰瓠有甘有苦甘瓠可食者也韭爾雅疏韭説文云菜名一種而久者故謂之韭象形在一之上一地也詩疏曰四之日夏二月也以是時韭新出故用之果臝之實爾雅果臝栝樓也郭璞註今齊人呼之為天𤓰邢昺疏栝樓葉似𤓰葉兩兩相值蔓延青黒色六月花七月實如𤓰瓣曹氏曰果臝當蔓生野中今乃延入于宇室無人故也卉爾雅卉草郭璞註百草總名小雅百卉具腓是也葍音福爾雅葍䔰音富郭璞註大葉白華根如指正白可啖邢昺疏小雅言采其葍陸璣曰其根可着熱灰中温啖之荒嵗可蒸以禦飢蓫爾雅藬音規牛蘈音頽也郭璞註髙尺餘方莖葉長而税有穗穗間有華華紫縹色可淋以為飲邢昺云小雅言采其蓫鄭箋云蓫牛蘈即此縹青白色淋以水沃也鄭樵曰羊蹄曰牛蘈曰菲詩曰言采其蓫爾雅曰菲菜又曰藬牛蘈今人呼為秃菜蓫秃音訛耳臣謹案据鄭説則蓫與葑菲之菲同一物又案今人呼秃菜根亦曰羊蹄根用以治癬非可食者然詢之行賈云江以北徽寧池太等處人俱食之用以作葅其味甜但微酢盖地土之不同如此荍爾雅荍蚍衃音毗浮郭璞註今荆葵也似葵紫色多華少葉葉又翹起邢昺疏陳風規爾如荍毛傳云荍芘芣即此陸璣曰似蕪菁華紫緑色可食微苦筍爾雅筍竹萌孫炎曰竹初萌生謂之筍韓奕云共䔩維何維筍及蒲是也蒲箋蒲深蒲也疏醢人加豆之實有深蒲筍菹深蒲蒲始生水中取其中心入地蒻大如匕柄正白生噉之甘脆鬻而以苦酒浸之如食筍法瓠葉小雅幡幡瓠葉采之亨之箋亨熟也熟瓠葉以為飲酒之菹疏豳風七月云八月斷壺壺與瓠同小雅南有樛木甘瓠纍之亦言瓠葉纍蔓於木上也蔡氏卞曰瓠甘而可食附物而生者也以其可食而非養人之大者况在下之賢人無所附則實不成詩曰南有樛木甘瓠纍之樛木所以接下者非使然也故以况至誠之君子甘瓠之所以纍上者亦自然也故以况在下之賢人㫖苕傳邛丘也苕草也疏苕之華傳云苕陵苕此直云苕陵苕好生下濕此生于髙丘與彼異也陸璣曰幽州人謂之翹饒夏生莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿芑小雅薄言采芑傳芑菜也疏陸璣云芑似苦菜莖青白色摘其葉白汁出脆可生食亦可蒸為茹青州人謂之芑西河雁門芑尤美胡人戀之不出塞李氏樗曰毛以薄言采芑為菜豐水有芑為草維糜維芑為穀王氏皆以為穀葑爾雅須薞蕪郭璞註似羊蹄葉細味酢可食邢昺疏谷風云采葑采菲毛傳曰葑須也郭以葑須者謂此薞蕪也陸璣云葑蕪菁也陳宋之間謂之葑陳楚謂之蘴字雖異音實同葑也須也蕪菁也蔓菁也薞蕪也蕘也芥也七者異名而同一物也本草云北土四時俱有鄭樵曰葑一名蔓菁一名須一名薞蕪春食苖夏食心秋食莖冬食根多生邉塞可以備飢嵗諸葛孔明所止輒令軍士種蔓菁云才出則可生啖一也葉可煑食二也久居則隨以滋長三也棄不令惜四也回則易尋而採之五也冬有根可劚而食六也今三蜀江陵人猶呼此為諸葛菜菲爾雅菲蒠音息菜郭璞註菲草生下濕地似蕪菁華紫赤色可食陸璣曰莖粗葉厚而長三月中蒸鬻為茹滑美可作羮爾雅謂之蒠菜今河内人謂之蓿菜詩緝曰葑菲常食之菜不可以其近地黄腐之莖葉遂棄其上而不采猶夫婦之間亦不當以小過而棄其善也以上菜茹芣苢爾雅芣苢馬舄車前郭璞註大葉長穗好生道邉今藥中車前子是也可鬻作茹治婦人難産及令人有子鄭樵曰芣苢曰當道曰牛遺曰馬舄車前也唐爾雅唐蒙女蘿菟絲郭璞註四名一物也邢昺疏桑中爰采唐矣頍弁蔦與女蘿毛傳俱以菟絲解之陸璣曰菟絲蔓連草上生黄赤如金今合藥菟絲子是也淮南子曰菟絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴皆自然也苞杞傳杞枸檵音計也本草有枸杞一名仙人杖一名西王母杖天隨子言常食杞菊東坡有後杞菊賦即此杞也其根名地骨皮莖幹三五尺作叢春作羮茹微舌詩緝曰詩有三杞將仲子無折我樹杞栁屬也有臺南山有杞湛露在彼杞棘山木也此詩集于苞杞杕杜北山言采其杞四月隰有杞桋枸杞也芄蘭爾雅郭璞註芄蘭蔓生斷之有白汁可啖衞風芄蘭之支陸璣云一名蘿摩本草枸杞條陶隱居注云去家千里勿食蘿藦枸杞蘿藦盖藥名鄭樵曰蘿藦曰芄蘭幽州人曰雀瓢可作菜茹能補精益氣故諺云去家千里莫食蘿藦枸杞艾爾雅艾冰臺邢昺疏即今艾蒿王風彼采艾兮傳云艾所以療疾是也陸佃埤雅云博物志言削冰令圓舉以向日以艾承其影則得火艾名冰臺其以此乎醫家用灸百病謂之灸草荆公字説云艾可乂疾故字從乂蝱音萌爾雅作􅔾音同爾雅􅔾貝母郭璞註根如小貝圓而白華葉似韭邢昺疏載馳云陟彼阿丘言采其蝱陸璣曰今藥草貝母也葉如栝樓而細小子在根下如芋子正白四方連累相著本草云治心中氣不快多愁鬱者殊有功苓爾雅作蘦爾雅蘦大苦孫炎曰今甘草也本草云蔓延生葉似荷青黄其莖赤有節節有枝相當或云蘦似地黄鄭樵曰甘草或云大苦凡草屬惟甘草為國老大黄為將軍不言君臣佐使也臣謹案邶風簡兮山榛隰苓言榛苓生各得其所而碩人處非其位曽榛苓之不如此反興也唐風采苓采苓首陽之巔首陽山之上信有苓矣然今之采者未必於此山而人必信之喻事有似而非此正興也蔡氏卞曰苓大苦也所以和百藥之性使之相為用者也故苓從令簡兮曰山有榛隰有苓榛非宜山而不宜隰苓非宜隰而不宜山故榛有植于衞宫之内苓或采於首陽之巔榛也苓也不擇地而美者也猶之賢者無所進而不自得焉蓷爾雅萑蓷郭璞註方莖白華華生葉間即今益母草也鄭樵曰茺蔚曰益母萑曰蓷詩所謂中谷有蓷也詩緝曰舊説以蓷草宜生髙陸生谷中則傷於水非也據本草茺蔚正生海濱其性宜濕臣謹案芣苢車前治婦人難産及令人有子今益母草亦婦人所用而詩之苦樂懸殊如此詩人取興物類於婦人尤切近二物皆宜於生育而一則家室和平一則家室離别所感不同故也葽爾雅葽繞棘郭璞註今逺志也劉向説葽味苦謂之苦葽本草四月采根葉隂乾豳風四月秀葽箋物成自秀葽始四月陽氣極於上而微隂已受胎於下故葽感之而早秀鄭樵曰蕀曰葽繞曰小草逺志也藚音續爾雅藚牛脣郭璞註水蕮也如續㫁寸寸有節㧞之可復魏風彼汾沮茹言采其藚陸璣以為今澤瀉也其葉如車前子其味亦相似徐州廣陵人食之鄭樵曰蕍曰蕮曰藚澤瀉也詩云言采其藚爾雅云蕍蕮舜一作蕣鄭風顔如舜華陸璣云舜一名木槿一名櫬音襯一名椵音鍜爾雅云椵木槿櫬木槿邢昺疏其樹如李其華朝生暮落與草同氣故在草中五月始華故月令仲夏云木槿榮李時珍曰槿花小而艷或白或粉紅有單葉千葉者皮及花並滑如葵花故能潤燥如紫荆故能活血治赤白帶下疥癬洗目令明川中來者力尤厚今川槿皮是也又有朱槿號佛桑光艷照日疑若焰生一叢之上日開數百朶朝開暮落自五月初至仲冬乃歇蕳音閑毛詩音艱本草蕳香草也一名大澤蘭一名都梁香生溪澗水旁與今之蘭花逈别蘭花乃生水中非香草也鄭詩言士女秉蕳應劭風俗通言尚書奏事懐香握蘭漢書言蘭以香自燒若夫蘭花有葉無枝可玩而不可紉佩故朱子離騷辨證曰古之香草必花葉俱香而燥濕不變故可刈佩今之蘭蕙但花香而葉乃無氣且質弱易萎必非古之所指香草甚明遯齋閒覧言楚騷之蘭當以澤蘭為是今所謂蘭無枝無莖因黄山谷稱之世遂謬指為離騷之蘭冦宗奭朱震亨又從而為之辭豈不誤哉夫澤蘭之為用主利水道殺蠱毒辟除不祥而今之蘭果可利水殺蠱而除痰癖乎共種甚於閩朱子乃閩人豈不識其土産而反辨析如此世俗至今猶以非蘭為蘭何其惑之難解也鄭樵曰蘭即蕙蕙即薰薰即零陵香楚辭云滋蘭九畹植蕙百畝互言也案蘭舊名煎澤草婦人和油澤頭故以名焉南越志云零陵香一名薫草即香草生零陵山谷今湖嶺諸州皆有以其質香故可以為膏澤可以塗宫室臣謹案朱子所辨謂蘭蕙質弱易萎者但指今盆中之蘭蕙耳若如鄭氏所説則薫草亦有蘭蕙之名豈不可刈佩乎謹附録於此備考芍藥傳芍藥香草陸璣曰今藥草芍藥無香氣未審今何草東萊詩記曰即今之芍藥陸璣必指以他物盖泥毛公香草之言欲求香於柯葉置其花而不論耳本草芍藥注春生紅芽作叢莖上三枝五葉似牡丹而狹長髙一二尺夏開花有紅白紫數種古今注將離相别贈以芍藥芍藥一名可離故相贈可字疑何字之訛臣謹案上已祓除不祥故以秉蕳為香草芍藥止是將離贈别結恩情之厚不必假香草為説也其誤盖始於毛公而陸氏泥之遂不知芍藥為何物得東萊正之甚善但指蕳為今之蘭花則不可耳芍藥即今之赤芍白芍也鄭樵曰何離即芍藥也以有何離之名所以贈别用焉牡丹亦有木芍藥之名其花可愛如芍藥宿枝如木故名芍藥著於三代之際風雅之所流詠牡丹初無名唐時始著貴游趨競遂使芍藥為落譜衰宗李時珍曰昔人言洛陽牡丹廣陵芍藥名天下今藥中所用亦多取揚州者十月生芽至春乃長三月開花其品凡三十餘種赤者利小便下氣白者止痛散血赤者補氣白者補血蔦傳蔦寄生也本草云蔦一名寓木一名寄生凡桑槲樹櫸栁楊楓等樹上皆有之桑上者佳故藥名桑寄生圓經云烏鳥食物子落枝節間感氣而生如鳥立於上故名蔦葉似橘而厚軟莖似槐皮而肥脆三四月開花黄白色六七月結實黄色如小豆寇宗奭曰桑寄生隨處皆有然嵗嵗斫殘苦不能生古人惟取桑上者盖假其氣他木寄生服之往往至死朱震亨曰海外之境其地暖而不蠶桑無採捋之苦氣厚意濃自然生出李時珍曰主治腰痛充肌膚堅髪齒女蘿即唐傳女蘿菟絲松蘿也鄭樵曰寄生有二種大曰蔦小曰女蘿爾雅翼曰女蘿色青而細長無雜蔓故山鬼云被薜荔分帶女蘿謂青長如帶也菟絲黄赤不相類然二物亦有時相結故古樂府云南山羃羃兔絲花北陵青青女蘿樹由来花葉不同心今日枝條分兩處唐樂府云兔絲故無情隨風任顛倒誰使女蘿枝而来强縈抱兩草猶一心人心不如草鄭樵又曰兔絲曰唐蒙曰玉女曰赤網曰菟纍曰女蘿爾雅曰唐蒙女蘿女蘿菟絲又曰蒙玉女詩曰蔦與女蘿施于松上草經曰蔓延草木之上色黄而細曰赤網色淺而大曰菟纍淮南子注云菟絲生茯苓上故世言下有茯苓上有菟絲今殊不然茯苓生山谷菟絲生人間清濁異處何由同居臣謹案女蘿即菟絲本爾雅釋草文而本草又云女蘿一名松蘿是松上寄生詩蔦與女蘿施于松上可證曰菟絲者誤二説殊異然毛傳本兼莬絲松蘿二名疏云在草曰菟絲在水曰松蘿爾雅翼亦云二者有時相結取證於兩樂府則女蘿也菟絲也松蘿也三物同一名未可知姑存以俟考李時珍曰松蘿能平肝邪去寒熱蔡氏卞曰唐一名女蘿女蘿之生依乎松故又謂之蒙蒙蔽也蔽于松者也桑中之淫亂期乎幽逺而志在乎依所蔽故言唐頍弁刺幽王之無親反不如草木之相附著故言女蘿一物而别言之各有義白茅白華傳白華野菅也爾雅邢昺疏陸璣云菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索漚乃尤善異其名謂之曰菅因謂在野未漚者曰野菅李時珍曰茅葉如矛故謂之茅其根牽連故謂之茹易㧞茅連茹是也夏花者為茅秋花者為菅詩曰白華菅兮白茅束兮是也茅根可入藥主治勞傷虚羸補中益氣兼發小兒痘茅根生楚地山谷田野六月采根陶𢎞景曰此即今白茅菅詩露彼菅茅是也又有香茅一名菁茅生湖南及江淮間葉有三脊其氣香芬可以包藉及縮酒禹貢包匭菁茅易藉用白茅左傳楚貢包茅不入王祭不供無以縮酒是也臣謹案詩緝曰白華柔韌宜為索則漚以為菅白茅不可用則以纒束白華而已菅喻后茅喻妾貴賤各殊明係二物以上藥物麻此係紵麻之麻朱子丘中有麻傳曰麻穀名子可食皮可績為布者黄氏曰麻髙四五尺葉似荏而圓鋭花黄子房生色黒而莖方房八稜者名巨勝莖圓而方稜或四或六者名胡麻皮可為布花白色者則曰麻蕡曰大麻曰麻勃也臣謹案麻有二禾麻之麻是胡麻為八穀之一所以為食者也紵麻之麻是大麻皮可績為布所以為衣者也嘗詢之老農云胡麻與稻同九月中熟詩云九月叔苴十月納禾稼蚤取可以供羮菜晚收可以充常食者也紵麻之麻與麥同四月中熟詩云麻麥幪幪又云東門之池可以漚麻漚之使柔可以作布今之麻皮其稭俗稱麻骨是也其子取仁入藥主利大腸名麻仁非可食者朱傳既云皮可績為布即不宜云子可食黄氏既云房生名胡麻即不宜云皮可為布俱混二者為一宜辨之葛傳葛所以為絺綌女工之事煩辱者爾雅翼葛生山澤間蔓延牽其首至根可二十步藟疏藟亦葛類陸璣云藟一名巨苽似燕薁亦連蔓生葉似艾白色其子赤亦可食酢而不美鄭樵曰此草藤生大者盤礡故有千嵗藟之名唐姜撫言服常春藤能使白髪還鬒明皇使取以賜中朝老臣菅疏菅似茅而滑澤郭璞爾雅註菅茅屬人刈白華于野已漚之名之為菅未漚則但名為茅也范淳夫曰菅以為屨儀禮䘮服有菅屨濮氏曰左傳雖有絲麻無棄菅蒯蒯與菅皆謂苕也黄花者俗名黄芒即蒯也白華者俗名白芒即菅也疏漚是漸漬之名傳云漚柔者言東門之池水可以漚柔麻菅之草使可緝績也蔡氏卞曰茅自然之潔白故以之供祭祀菅漚畜而柔忍故以為索綯祭祀明徳之事大徳足以事鬼神者妻道也索綯賤用之物小慧足以尸鄙事者妾道也幽王黜申后而立褒姒下國化之以妾為妻以孽代宗而白華之詩作白華漚而為菅則菅者使然之致用而為綯則賤且勞矣故以譬孽妾茅自然之正體藉地以祭則靜且安矣故以譬宗嫡不以茅棄菅不以菅害茅者天道也詩曰英英白雲露彼菅茅露者天之所以成物菅之賤茅之貴皆有以成况易其位哉紵疏陸璣云紵亦麻也科生數十莖宿根在地中至春自生不嵗種也荆揚之間一嵗三收今官園種之嵗再刈刈便生其裏韌如筋者謂之徽紵今南越紵布皆用此麻莫音暮疏陸璣云莫莖大如筋赤節節一葉今人繅以取繭緒其味酢而滑河汾之間謂之莫蘞唐風蘞蔓于野疏陸璣曰蘞似栝樓葉盛而細其子正黒如燕不可食也幽州人謂之鳥服其莖葉煑以哺牛除熱𫝊葛生延而蒙楚蘞生蔓于野喻婦人外成于夫家苕爾雅苕陵苕郭註本草云黄華蔈音慄白華苃音沛邢昺疏小雅芸其黄矣鄭箋云陵苕之華紫赤而繁而此云黄白者盖就紫色之中有黄紫白紫耳及其將落則全變為黄故詩曰芸其黄矣毛傳云將落則黄是也陸璣疏云一名䑕尾生下濕水中七八月中華紫似今紫草可染皂煑以沐髪即黒鄭樵曰紫葳曰陵苕一名陵霄藤生依縁大木今人謂之凌霄花有黄白二種白華者少故詩云苕之華芸其黄矣緑小雅終朝采緑爾雅菉王芻郭璞註即菉蓐草也邢昺疏今呼鴟脚莎衞風瞻彼淇澳緑竹猗猗是也陸璣曰莖葉似竹青緑色髙數尺今淇澳旁生如草澀礪可以洗攪笏及盤枕利於刀錯俗呼為木賊草彼土人謂為緑竹鄭樵曰爾雅曰菉王芻又曰竹篇蓄詩云緑竹猗猗即此今人謂之篇竹葉似竹而細薄荆襄人煑以染黄極鮮麗故草經云可染黄作金臣謹案衞風之緑竹是竹色之緑朱子謂淇上多竹漢世猶然武帝下淇園之竹以為楗是也如何以為草名謂與小雅之緑同一物乎且次章言菁菁三章言如簀明是筍之長大所成與終朝采緑不盈一匊物之巨細殊不相類毛孔與陸璣及邢昺鄭樵俱誤藍箋藍染草也爾雅葴音針馬藍邢昺疏今為澱者是也藍可以染青故淮南子云青出於藍鄭樵曰藍有三種蓼藍如蓼染緑大藍如芥染碧槐藍如槐染藍三藍皆可作澱色成勝母故曰青出於藍而青於藍茹藘𫝊茹藘茅蒐音搜也李巡曰茅蒐一名茜音倩可以染綘陸璣曰一名地血今之蒨草是也鄭樵曰茜亦作蒨可以染緋故曰地血亦曰茹藘曰茅蒐詩所謂茹藘在阪爾雅所謂茹藘茅蒐莖葉麄澁而根紅故許慎謂人血所化案今河南多有用染紅氊及夏帽纓色微紫故不以染繒帛臣謹案苕以染皁緑以染黄藍以染青茹藘以染絳小雅韎韐有奭左傳韎韋之跗注皆用此茅蒐染之茅蒐即茹藘也荑𫝊荑茅之如生者碩人詩手如柔荑言其柔而白也葭蓬𫝊葭蘆也李巡曰葦初生蓬草名陸佃曰蒿屬草之不理者也其葉散生如蓬末大於本故遇風輒㧞而旋莊子云夫子猶有蓬之心也夫商子云飛蓬遇飄風而行千里乗風之勢也故古者觀浮木而知為舟覩轉蓬而知為車朱子曰其花如栁絮聚而飛如亂髪詩首如飛蓬即此蒹葭萑葦菼秦風蒹葭蒼蒼豳風八月萑葦王風毳衣如菼蒹也葭也萑也葦也菼也一物而異名也爾雅蒹薕郭註似萑而小髙數尺陸佃曰今以為簾箔因此得名葭一名蘆郭註葦也菼一名薍郭註似葦而小邢昺疏曰初生者為菼長大為薍成則名為萑初生為葭長大為蘆成則名為葦皆蘆荻之異名耳大車箋云毳衣之屬衣繢而裳繡其青者如菼菼蘆之初生也詩緝曰蒹也葭也萑也三物共十一名秦風蒹葭舉小與大者言之豳風萑葦舉中與大者言之也三物俱待霜凝戾而後可用八月萑葦既成豫蓄之以為明年養蠶之曲簿莞小雅斯干云下莞上簟箋莞小蒲也爾雅莞苻蘺郭璞註今西方人呼蒲為莞而有大小之異司几筵有莞筵蒲筵是蒲之精者為莞故鄭云小蒲也簟箋竹葦為簟疏以簟常鋪在上宜用堅物故知以竹為之詩毎云簟茀用為車蔽明是竹簟可知此雖是與羣臣燕樂之席其室内寢卧之席亦當然士䘮禮曰下莞上簟袵如初則平常寢卧自天子以下同用莞簟也萇楚檜風隰有萇楚爾雅長楚銚芅音揺曵郭璞註今羊桃也陸璣曰葉長而狹華紫赤色其枝莖弱過一尺則引蔓生鄭樵曰羊桃詩曰萇楚爾雅曰銚戈亦曰鬼桃曰羊腸葉花似桃子如棗核臺小雅南山有臺爾雅臺夫須邢昺疏夫須莎草也可以為禦雨笠都人士臺笠緇撮是也萊小雅北山有萊傳萊草也疏十月之交曰田卒汙萊又周禮云萊五十畝則萊為草之總名非有别草名之為萊也茒魯頌言采其茆𫝊茆鳬葵也一名露葵疏陸璣云茆與荇菜相似葉大如手赤圓而肥者著於手中滑不得停莖大如匕柄葉可生食又可鬻滑美江南人謂之蓴菜或謂之水葵諸陂澤中皆有本草云蓴葉似鳬葵浮在水上采莖堪噉花黄白色子紫色三月至八月莖細如釵股黄赤色短長隨水深淺名為絲蓴味甜體軟九月至十月漸粗硬十一月萌在泥中粗短名塊蓴味苦體澁人惟取汁作羮猶勝雜菜李時珍曰蓴生南方湖澤中惟吳越人善食之葉如荇菜而差圓形似馬蹄其莖紫色大如筋柔滑可羮夏月開黄花結實青紫色大如棠棃中有細子春夏嫩莖未葉者名稚蓴葉稍舒長名絲蓴言其莖如絲也至秋老則名葵蓴蓴音純顔氏家訓曰蔡朗父諱純改蓴曰露葵北人不知以緑葵為之詩云薄采其茒即蓴也臣謹案吳人張翰思鱸魚蓴菜即此曹氏曰醢人有茒菹麋臡以為朝事之豆芩小雅呦呦鹿鳴食野之芩疏莖如釵股葉如竹蔓生澤中下地鹹處牛馬亦喜食之行葦大雅敦彼行葦牛羊勿踐履方苞方體維葉泥泥𫝊行道也泥泥葉初生疏葦初生名葭此禁牛羊勿踐正是春夏時事而言葦者先王愛其為人用人之所用在於成葦故以成形名之張子曰苞叢生以喻兄弟體成形也許氏謙曰𫝊謂勾萌之時正此意臣謹案葦之初生正是牛羊所食况當行路又是蹂踐之地以喻宗族兄弟挾恩怙寵易生罪過開創之時禁網疏濶尤易招尤先王設為齒師教胄之法禁制之正所以保全之此所謂牛羊勿踐履也諼草疏諼訓為忘非草名詩緝曰毛氏云諼草令人忘憂是實有其物矣按本草有萱草云令人好歡樂無憂嵇叔夜養生論合歡蠲忿萱草忘憂諼本又作萱説文則藼或作蘐皆從草則為草名無疑陳卧子曰本草云萱草一名鹿蔥花名宜男蔡氏卞曰載馳之思在外故欲行以遣其思其詩曰陟彼阿丘言采其蝱有所向而趨明也伯兮之憂在内故欲止以忘其憂其詩曰焉得諼草言樹之背有所背而趨暗也二詩之取興所以不同也鷊音逆陳風卭有㫖鷊𫝊綬草也爾雅鷊綬郭璞註小草有雜色似綬陸璣疏云鷊五色作綬文故曰綬草劉氏瑾曰案埤雅鷊本鳥名亦名綬鳥咽下有囊如小綬具五色此傳所釋鷊草之名豈因其似鷊鳥而取義乎茨小雅楚楚者茨又鄘風牆有茨爾雅茨蒺藜郭璞註布地蔓生細葉子有三角刺人鄭樵曰蒺藜曰屈人曰止行曰茨爾雅謂茨蒺藜詩所謂牆有茨是也其實有芒刺行軍之家以鐵象之而布地焉荷花菡萏爾雅邢昺疏陳風彼澤之陂有蒲與荷又曰有蒲菡萏花未發為菡萏已發為芙蓉荷其總名也埤雅曰華葉等名具衆義故以不知為問謂之荷也又曰秀曰菡萏暢茂曰華古今注曰芙蓉一名荷華楚辭所謂騫芙蓉兮木末盖言此也游龍𫝊龍紅草也爾雅云紅蘢古郭璞註俗呼紅草為蘢陸璣云一名馬蓼莖大而赤生水澤中髙丈餘埤雅曰游縱也以縱故謂之龍詩山有喬松隰有游龍木喬聳於上草游縱於下山澤之所養以自美今忽不見子充乃見狡童則是草木之不如也蓍曹風浸彼苞蓍𫝊蓍筮草也陸璣曰似藾蕭青色科生埤雅曰蓍蒿屬也字從耆草之壽者也博物志曰以老故知吉凶生千嵗三百莖同本其上常有黄雲覆之鄭樵曰蓍如蒿華如菊一叢之幹二三十或四五十髙五六尺楮先生云蓍滿百莖者其下有神龜守之上有青雲覆之𫝊曰天下和平王道得蓍莖長丈叢滿百苹箋苹藾蕭也郭璞曰今藾蒿陸璣疏云葉青白色莖似箸而輕肥始生香可生食又可蒸食是也毛傳以苹為蓱本爾雅云苹蓱其大者為蘋是水中之草召南于以采蘋南澗之濱者也非鹿所食故不從之臣謹案埤雅云苹一名蓱無根而浮常與水平故曰苹也江東謂之薸言無定性飄流隨風而已淮南子曰萍根於水木根於土言以水為地也此本爾雅説亦引詩鹿鳴為証試思鹿乃山獸豈能入水而食此草乎詩明云食野之苹不云食水之苹也李時珍曰苹係陸生皤蒿詩于以采蘩于沼于沚此係水生白蒿明係二種此為得之毛傳及爾雅埤雅俱誤荼周頌以薅荼蓼爾雅蒤委葉王肅云荼陸穢草謂原田蕪穢之草非苦菜也鄭風有女如荼疏荼茅草秀出者鄭於地官掌荼及既夕注與此箋皆云荼茅秀是茅草秀出之穗非苦菜及委葉二種荼草也茅之秀者其穗色白吳語説吳王萬人為方陳皆白常白旗素甲白羽之矰望之如荼韋昭註亦以為白色也蓼周頌以薅荼蓼傳蓼水草也爾雅薔一名虞蓼郭璞注虞蓼澤蓼也即蓼之生水澤者也疏蓼是穢草荼亦穢草王肅云荼陸穢蓼水穢田有原有隰故並舉水陸穢草臣謹案小毖云予又集于蓼疏云蓼是辛苦之菜與此又别毛詩類釋卷十四
