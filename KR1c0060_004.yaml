  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0060_WYG_004-1a, image: WYG0088/WYG0088-0035a.png}
body:
  text: 毛詩類釋卷四國子監祭酒顧棟髙撰釋水漆水沮水綿詩民之初生自土沮漆此豳地之漆沮也水經漆水出扶風杜陽縣程大昌曰杜楊今岐山普潤縣之地其水入渭在灃水之上與禹貢序渭水節次不合許氏謙曰山海經羭次之山漆水出焉北流注于渭郭氏注漆水出岐山詩云自土沮漆是也寰宇記漆水源出鳳翔府普潤縣東南東及周原之北岐山之南是為太王之邑故詩曰居岐之陽在渭之將其地山固名岐而山南有水亦名岐也岐漆渭三水同流則岐水之陽即漆水之陽也故頌曰猗與漆沮潛有多魚毛氏釋之曰漆沮岐周之二水其説是也臣謹案據許氏説則綿詩潛頌之漆沮皆指岐周而言非禹貢之漆沮明矣孔疏潛詩曰漆沮自豳歷岐以至豐鎬以其薦獻所取不宜逺於京邑故不言豳言岐周者鎬京去岐不逺故繫而言之豳今同州府邠州岐今鳳翔府岐山縣周今西安府鄠縣東西凡五六百里吉日詩漆沮之從天子之所此禹貢之漆沮也漆水自耀州同官縣東北界來經華原縣合沮水沮水出坊州升平縣北子午嶺至耀州華源縣合漆水至同州朝邑縣東南入渭漆沮一名洛水與綿詩自土沮漆有别地理考異引段氏云漆沮有二皆出雍州皆入于渭特有上流下流之别詩自土沮漆在岐周之間是渭之上流也書東過漆沮敘於澧涇之下是渭之下流也許氏謙曰案寰宇記鳳翔府東至長安三百一十九里長安東至同州二百八十里則二水入渭之地相去六七百里非一漆沮明矣雖岐下入渭之沮不可考其源委然決非至華原合漆之水也洛水瞻彼洛矣之洛即吉日之漆沮漆沮一名洛水此即夏官職方氏雍州其浸渭洛與伊洛之洛有别伊洛之洛在東都此在鎬京故毛氏以洛為宗周之浸水伊洛之洛禹貢所謂導洛自熊耳源出商州上洛經王城至虎牢入河此至同州朝邑入渭也胡氏渭曰禹貢豫有洛而雍無洛洛水之名昉於殷周之際周禮雍州之浸曰渭洛詩瞻彼洛矣維水泱泱周語幽王時三川震韋昭注曰涇渭洛也史記周本紀西伯獻洛西之地於紂晉世家文公攘戎狄居於河西圁洛之間魏世家築長城自鄭濵洛以東有上郡皆雍州之洛非豫州伊洛之洛也程大昌雍録洛水出北地郡歸德縣北蠻夷中今慶陽府治安化縣東北百七十里即洛水之源自入塞後經鄜坊同三州至同州白水縣白水即沮水與漆沮合混為一流以入于渭故孔安國班固以後皆指懷德今朝邑縣入渭之水為洛是三水本分三名而曰洛即漆沮者言其本同也涇水涇水出陜西平涼府平涼縣筓頭山平涼本漢之涇陽縣地玁狁所侵即此非今之涇陽縣也東徑華亭縣東北又東徑涇州北又東徑長武縣北汭水入焉又東南徑邠州淳化永壽醴泉涇陽髙陵縣西南入于渭汭水汭詩作芮芮水出今平涼府華亭縣有二源北源出湫頭山之朝那湫南源出齊山至縣東與北河合又東至涇州西北入涇水周職方雍州其川涇汭詩曰芮鞠之即皆此也若禹貢涇屬渭汭之汭孔傳則以水北曰汭言治涇水入于渭也下文漆沮既從即從于渭灃水攸同即同于渭皆主渭言之故與詩之大雅及周職方有别渭水渭水出陜西蘭州府渭源縣西鳥鼠山東徑鞏昌府鳳翔府岐山縣南為周西岐又東南徑扶風縣郿縣武功盩厔興平鄠縣北為周豐邑又東徑咸陽縣豐鎬二水自南入焉又東徑西安府治北又東徑髙陵縣南涇水自北來入焉又東徑臨潼縣北漆沮二水自北入焉又東徑渭南縣華州華隂縣北洛水入焉洛水即詩瞻彼洛矣之洛尚書孔傳漢書顔注並以洛水為漆沮之水按秦漢時關中有鄭白二渠沮水始循鄭渠入渭古時沮水洛水自各入渭未可指洛為漆沮也詳見錐指又東入于河胡氏渭曰小雅瞻彼洛矣傳以為宗周溉浸之水亦不言洛即漆沮謂漆沮亦曰洛水者實自安國書傳始而闞駰酈道元因之孔穎達復援以釋詩於是洛與漆沮合而為一水矣其濁水上承雲陽大黑泉名漆沮水者乃土俗之稱而洛水之為漆沮則先儒皆以為然故顔師古注漢書亦用其説然直路今延安府宜君縣之沮自櫟陽今西安府臨潼縣縣界合濁水分為二水一循鄭渠而東注洛其間二百餘里實鄭國之所開漢志云沮入洛亦據既有鄭渠後言之耳自鄭渠一廢而濁水絶於三原沮水不抵富平可見此水在古時元合濁水至櫟陽入渭而不與洛通也臣謹案漆出西安府同官縣沮出延安府宜君縣至耀州華原合流至同州府朝邑入渭者禹貢之漆沮也出鳳翔府扶風縣至西安府臨潼入渭者豳地之漆沮也兩漆沮入渭之處相去約二百五十里許氏謙以為五六百里係考之未的扶風之漆沮入渭蔡傳云在澧水之上澧在咸陽縣東南三里入渭又在臨潼之東綿詩潛頌之漆沮出扶風縣吉日之漆沮出同官縣一名洛水洛水自有源至白水縣與漆沮合流遂總名之曰洛詩瞻彼洛矣之洛是也灃水灃水出西安府鄠縣東南自今長安縣界西北流徑咸陽縣東南三里注于渭詩曰灃水東注是也汾水汾水出山西太原府欣州靜樂縣北管涔山東南流徑太原縣東詩曰彼汾一曲是也歷汾州府平陽府至蒲州府之滎河縣折而入于大河淇水淇水出河南衛輝府輝縣之共山經淇縣境紂朝歌地為衛都流入濬縣宿胥口入河百泉今衛輝府輝縣西北七里有蘇門山山有百門泉泉通百道衛風所謂淇水在右泉源在左者也汶水汶水桑欽以為出泰山萊蕪縣西南入濟載驅詩汶水湯湯魯道有蕩論語則吾必在汶上嚴氏粲曰汶在齊境自魯適齊必渡汶水泲水泲同濟出河南濟源縣王屋山毛詩鄭箋云衛自河以東夾於濟水孔疏曰濟自河北而南入于河又出而東楚丘在其間故曰夾于濟水也詩出宿于泲王應麟曰地理志禹貢導沇水東流為泲東郡臨邑有泲廟洽水詩在洽之陽洽水出陜西同州府郃陽縣今流已絶故去水而加邑渭水亦徑此入河也汝水詩遵彼汝墳汝水出河南汝州魯山縣東北經汝州南陽府之裕州許州府之襄城郾城南至汝寧府又東南流至江南潁州府南而入淮江水江水出今四川成都府灌縣岷山東流至湖廣漢陽府大别山與漢水合東北至江南通州入海漢水漢水出今陜西漢中府嶓冡山南流至湖廣漢陽府江夏縣大别山入江今為漢口鎮淮水淮水出桐柏山在河南南陽府桐柏縣東一里至江南淮安府安東縣入海溱水溱水出今開封府新鄭縣西北南入于洧水洧水洧水出今許州府密縣馬嶺山南過新鄭縣南與溱水合甫草即圃田澤在今開封府中牟縣西北七里亦曰萑苻之澤周禮豫州藪曰圃田爾雅十藪鄭有圃田澤多産麻黃詩所謂東有甫草是也鄭武公定虢檜取其地為原圃僖三十三年皇武子辭秦客曰鄭之有原圃猶秦之有具囿即此陳氏曰九州川浸澤藪名在職方不屬諸侯之版詩不以圃田繫鄭春秋不以沙麓屬晉略可覩矣周季諸侯始擅不盼之利齊斡山海而桃林之塞郇瑕之地晉實私之甚者至周歲貢百二十金於魏以易溫囿而先王之制掃地盡矣補傳曰圃田易野也易野以車為主故用以選車詩田車既好是也敖險野也險野以人為主故用以選徒詩選徒囂囂是也臣謹案甫草毛訓甫為大謂有廣大之草可以田獵即下章敖地是也鄭破甫作圃謂即鄭之圃田與敖成兩地而嚴緝非之謂下章言獵于敖地不得又言圃田吕氏祖謙及李氏樗許氏謙並同其説詳訂詁中朱傳從鄭説而補傳之言亦似有理姑並存之大河河自積石入中國至華隂經流蒲州府同州府中間為秦晉分界又東折經河南府洛陽縣北境所謂洛汭正當周王城之東北又過直隸大名府開州北為衛境又北播為九河九河約在今山東德州以上直隸河間府數百里之地為齊衛分界詩曰河水洋洋北流活活蓋自衛適齊必渡河泮水泮水一名雩水源出曲阜縣治西南西流至兖州府城東入泗水詩所謂思樂泮水也水側有雩檀亦名舞雩雩門因此而名雩門魯南城之西門也在漢則靈光殿之東南即魯泮宫故址詳見水經注臣謹案近世楊用修輩俱主此説然毛鄭孔三家皆云泮水泮宫之水也天子曰辟雍諸侯曰泮宫諸儒遵用之似不必更立異肥泉衛風我思肥泉兹之永歎傳曰所出同所歸異為肥泉爾雅疏曰小水支分歸入大海則異當其泉源初出則同流者名肥寒泉浚通典寒泉在濮州濮陽縣東南浚城輿地廣記開封縣有浚溝詩所謂浚郊浚都也祥符縣北有浚水故邑名浚儀有寒泉阪詩爰有寒泉在浚之下是也寰宇記寒泉在縣西十里自兩漢迄五代並置浚儀開封二縣宋建都於此真宗時改浚儀為祥符縣與開封縣並為開封府治前明以開封省入祥符而寒泉故迹不可復問矣下泉曹風冽彼下泉浸彼苞稂傳曰下泉泉下流也爾雅一名沃泉沃泉縣出縣出下出也郭注從上流下氿泉小雅大東云有冽氿泉傳曰側出曰氿泉爾雅氿泉穴出穴出側出也郭注從旁出也檻泉大雅瞻卬云觱沸檻泉傳曰檻泉正出正出湧出也觱沸出貌爾雅一名濫泉李巡曰水泉從下上出曰湧泉春秋昭五年叔弓帥師敗莒師于濆泉公羊傳云濆泉直泉也檻濫音義同水異名水自江出為沱汝出為濆詩江有沱遵彼汝濆是也皆大水溢出别為小水之名此係爾雅説毛詩作汝墳傳曰墳大防也謂崖岸狀如墳墓臣謹案水中無可伐條枚之理毛説較長水決復入曰汜出去復還水草之交曰湄中有草木交會小水入大水曰潨潨水會山絶水曰亹亹謂山當水路令水勢斷絶潛行曰泳水砥行也正絶流曰亂直橫流也水中可居者曰洲小洲曰渚小渚曰沚小沚曰坁毛詩類釋卷四
