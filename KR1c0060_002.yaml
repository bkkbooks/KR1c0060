body:
  text: 毛詩類釋卷二國子監祭酒顧棟髙撰釋地理周南召南周在今陜西鳯翔府岐山縣太王避狄難自豳始遷於此因改國號曰周商王帝乙初命其子王季為西伯至紂又命文王典治南國之諸侯文王作邑于豐因以岐邦之地為周公旦召公奭之采邑南言化自北而南也豐在今西安府鄠縣西去岐山縣三百餘里王應麟曰召亭在岐山縣西南臣謹案周公封魯召公封燕此二公所封之國也春秋時周召則平王東遷以後别賜周召之采地也周召分陜則武王克商後以周召分主天下之諸侯也均與周南召南無涉此在紂之世文王遷豐令周召攝治此時岐周只百里耳周召只如今藩臬同城理事不可劃定某處為周某處為召孔疏曰周召之地共方百里而皆名曰周其召則周內之别名也蘇氏轍曰文王治周所以為其國者屬之周公所以交於諸侯者屬之召公其説是矣若説分陜而治則文王時尚未有陜安得周召分之許氏謙曰文王四十九年甲子遷豐是時年已九十六歲逾一年而薨然則二南之詩正作於都岐之日而分周召之治亦在都岐之時以岐為周召采邑則在遷豐之後歟傅氏曰二南之國始於文王之分岐成於武王之分陜而其詩定於周公之作樂朱子曰公羊分陜之説可疑蓋陜東地廣陜西只是關中雍州之地恐不應分得如此不均又曰分岐之説無據而召公所分之地愈狹蓋僅得隴西天水數郡之地耳恐無此理臣謹案尚書康王之誥太保率西方諸侯入應門左畢公率東方諸侯入應門右王肅云畢公代周公為東伯故率東方諸侯此時猶循周召分陜舊規矩其為今日某某地界則先儒從來無明文竊以東方西方俱主王畿之東西而言鎬京本偏在西則分陜或當如公羊説蓋三代時萬國諸侯各自行政不關白於方伯只是掌其黜陟耳事簡故得如此若後世則斷無此事矣李氏曰江漢汝墳即陜之東也江沱即陜之西也曹氏曰繫之周公則由岐山以至梁益西南之域也蓋武王伐紂有庸蜀羌髳微盧彭濮八國為助其服周之化久矣召伯能以先王之教推明於其國是以見美邶鄘衛衛本紂都今衛輝府淇縣東北有朝歌城張洽傳以為在淇縣北關西社是也邶城在府治汲縣東北鄘城在新鄉縣西南三十二里臣謹案邶鄘衛三地名非三國也詩分為三者顧炎武謂此漢儒以此詩之簡獨多故分三名以各冠之非夫子之舊季札觀樂為之歌邶鄘衛曰吾聞衛康叔武公之德如是是其衛風乎北宫文子引衛詩曰威儀棣棣不可選也俱不曰邶而曰衛是知纍言之則曰邶鄘衛專言之則曰衛猶之言殷商言荆楚云爾案晉滅魏而存魏風鄭滅檜而存檜風者聖人不與晉鄭之滅國而檜君好潔衣服魏俗儉嗇狹隘亦可以為鑒戒故並存之若邶鄘所咏皆衛事自非與此一例炎武又云其地相距不過百餘里何得於百里之內立此三監班謂邶鄘俱有封國至周公盡以其地封康叔則立國不滿十年聖人何為存之漕楚丘漕今衛輝府滑縣治楚丘在縣東六十里臣謹案衛都淇縣在河北至東徙渡河野處漕邑則在河南矣漕杜注云衛下邑疏云當在河東不注里數詩云升漕虛以望楚丘可以一望而得疑未必有六十里之逺春秋時有兩楚丘隱七年戎伐凡伯於楚丘在山東曹縣東南四十里本戎州已氏之邑凡伯過其地因劫略之杜注所謂濟隂成武縣西南者是也成武與漕縣連境其一為僖四年衛遷於楚丘在滑縣東六十里漢為白馬縣水經注曰白馬濟有白馬城衛文公東徙渡河都之隋開皇十六年同時置兩楚丘縣一在漢已氏縣以戎伐凡伯之楚丘為名為南楚丘一在漢白馬縣即桓公封衛者為北楚丘後以曹縣有楚丘因改名衛南縣杜佑通典曰白馬春秋衛漕邑衛南衛文公所徙之楚丘也元和郡縣志及舊唐書所載並同朱子詩集傳亦云漕楚丘皆在滑州尤顯然較著乃班固地理志於成武下則曰齊桓公所城遷衛文公於此既混滑縣之楚丘於成武而文定説春秋於凡伯傳則云罪衛不救王臣之難又混成武之楚丘於滑縣蓋兩失之孔穎達疏定之方中胸無定見兩岐其説曰漢之郡境已不同故鄭疑在東郡杜云濟隂也不知杜云濟隂成武縣者乃是凡伯傳之楚丘與衛無涉鄭疑在東郡東郡今之東昌府亦與滑縣絶逺傅寅又曰堂當是今博州堂邑博濮二州連境案東昌府之堂邑縣與兖州府之成武縣相去四百五十里如何云望楚與堂乎堂只是楚丘之旁邑但今不可考耳總因兩楚丘相混致班固一誤孔穎達再誤傅寅三誤而近日皇輿表於兖州府成武縣亦注云衛楚丘邑沿訛襲謬千載同病兹因考詩地理而附識於此沫桑中頓丘浚沫即書所云沫邦是紂都朝歌之地今為衛輝府淇縣春秋時在大河之北邶風曰亦流于淇鄘風曰送我淇上衛風曰瞻彼淇奧故今日猶以淇名縣曰古朝歌自文公遷河南楚丘而河內殷墟更屬於晉桑中在淇縣境頓丘漢東郡有頓丘縣案東郡今山東東昌府疑此女未必如此之逺送只當在淇水之北浚亦衛邑自漢以下並為浚儀縣至宋真宗改浚儀為祥符縣為開封府治今因之淇園戴凱之曰淇園衛地殷紂竹箭園也閻氏若璩曰朱子於淇奧篇集傳謂淇上多竹漢世猶然此自據漢武帝下淇園之竹以塞決河冦恂伐淇園之竹為矢以給軍耳酈道元云今通望淇川無復此物又可證朱子止及漢之故晉戴凱之言淇園衛地殷紂竹箭園也見班彪志毛詩所詠瞻彼淇奧緑竹猗猗是北土寒冰至冬地凍竹根類淺故不能植惟䈛音夬竹根深故能晚生故曰根深耐寒茂被淇苑然則毛詩之所謂菉竹者乃䈛竹非常竹也亦可以備異聞臣猶記少時湯隂縣令楊銘敦謂臣曰今世淇上無竹詩所咏菉竹正以其難得而言耳臣初亦未之信謂下淇園之竹以為揵是淇竹明證及閲酈道元之言則知晉世已無有竹不自今時矣因思毛傳解緑竹曰緑王芻竹篇竹明係二物不是今時之竹正義曰詩有終朝采緑則緑與竹别草故傳依爾雅以為王芻與篇竹異也郭璞注緑為緑縟草今呼鴟腳莎篇竹似小藜赤莖節好生道旁可食又殺蟲草木疏云有草似竹髙五六尺淇水側人謂之緑竹其説支離又物不經見且以為二物則與下青青如簀俱不合閲閻氏此條知是竹之别一種且唯淇園有竹非淇上槩有竹也意殷紂之竹箭園至二漢之初猶存故漢武冦恂得而用之非淇川上遍植此物且以為竹則與下二章義俱不礙較注疏似更得情黎通典潞州上黨縣古黎侯國西伯戡黎即此漢為壺關縣蘇氏曰是時衛猶在河北黎衛壤地相接故狄之為患黎衛共被之臣謹案黎國在上黨壺關縣是在衛之西詩文匪車不東政自明白易曉而毛鄭解特謬言衛之諸臣形貌蒙戎然但為昏亂之行何不來東迎我君而復之乎鄭又曲為之説曰黎在衛西今所寓在衛東是屬鑿空添出且與下二句意一直無餘味其解蒙戎語尤拙此只言裘之敝是久客之况總之此與下第四章上二句是説黎下二句是責衛言客久而裘敝矣非我之車不來東告於汝但衛之臣子莫與同憂耳且流離瑣尾若此其可憐而竟塞耳不聞何哉語曲折而意極自然此為定解東萊解亦費力朱傳及嚴緝得之矣泲禰干言須泲禰毛第云地名不詳何地鄭於干言第云猶泲禰未聞逺近同異而王應麟云泲同濟禹貢導沇水東流為泲東郡臨邑有泲廟寰宇記大禰溝在曹州冤句縣北七十里隋志邢州內邱縣有干言山李公緒曰柏人縣有干山言山柏人邢州堯山縣陸奎勳因謂此衛女嫁邢者所作臣謂邢衛同姓衛女無嫁邢之理若下嫁邢之大夫則衛大邢小邢安敢以大夫而伉諸侯詳見訂詁中竊意毛鄭已不詳處所不必強為之説也須孔疏云須與漕相連明亦在滑縣界王今河南府洛陽縣城內西偏即周王城故址洛誥所謂澗水東瀍水西周公所營洛邑為朝會之地成周在今洛陽縣城東二十里周公處殷頑民之地在瀍水之東亦曰下都與王城相去十八里平王東遷居王城至景王凡十一世敬王畏子朝餘黨徙都成周以其狹小請諸侯城之而王城廢至赧王復居之顧氏炎武曰周初太師陳詩以觀民風其采於商之故都者則繫之邶鄘衛其采於東都者則繫之王王亦周初太師之本名劉元城曰邶鄘衛本商之畿內故序王之上其采於列國者則各繫之其國至驪山之禍先王之詩率已闕軼而孔子所録者皆平王以後之詩此變風之所由名也然詩雖變而太師之本名則不敢變此十二國之所以猶存其舊也乃范寧以王之名不當儕於列國而為之説曰列黍離於國風齊王德於邦君誤矣又曰自幽王以上太師所陳之詩亡矣春秋時君卿大夫之賦詩無及之者此孔子之所不得見也是故詩無正風臣謹案炎武謂今十二國之風見存者悉東遷以後之詩其盛世之詩則燬於驪山之禍孔子之所不得見足為千古未發但猶以正變立説不免錮於習見東遷以後何嘗無正風如唐之蟋蟀齊之雞鳴秦之無衣小戎鄭之緇衣衛之淇奧自難以變名之蓋當時賢侯如晉文侯秦襄公鄭衛二武俱能宣力王室與西周之詩何異乃拘於正變者則謂蟋蟀為刺晉僖公儉不中禮雞鳴為刺齊哀公荒淫怠慢無衣為刺其君好攻戰至淄衣淇奧難以言刺只得云美既曰美又如何云變乎至豳風七月亦以為變而王氏通有君臣相疑之言嗚呼詩之本旨於是乎亡矣鄭鄭今為河南許州府之新鄭縣初宣王封弟友於鄭居咸林為今陜西同州府之華州幽王時桓公寄帑於虢檜子武公與平王東遷卒定其地號曰新鄭以别於初封之鄭也故城在今縣治西北齊齊今為山東青州府之臨淄縣班固曰臨淄名營邱師尚父所封以地臨淄水而名齊世世都此故城在今縣治北魏魏今山西解州芮城縣東北七里有古魏城不知其始封姬姓春秋閔元年滅於晉賜大夫畢萬為邑因姓魏氏唐成王封叔虞於唐在河汾之東今為山西太原府之太原縣子燮父改國號曰晉地名晉陽以在晉水之北也四世至成侯南徙曲沃又五世至穆侯遷於絳亦曰翼今為平陽府之翼城縣沃鵠昭侯封桓叔於曲沃子莊伯浸強至孫武公遂滅翼自曲沃徙都之歷三世凡六十七年晉分入魏魏亡入秦秦謂之左邑水經注左邑故曲沃詩所謂從子于鵠者也漢武帝分置聞喜縣左邑故城在今聞喜縣治東涑水自城西注水流急濬故詩人以為激揚之水秦孝王封非子於秦今陜西秦州清水縣莊公徙西故犬邱秦州西南百二十里西縣故城是寧公遷平陽在今鳳翔府郿縣西四十六里德公遷雍今為鳳翔府治自車鄰美秦仲駟驖小戎蒹葭終南皆襄公時詩此時居秦州穆公為德公子以下則居鳳翔矣臣謹案史記秦文公收地至岐岐以東獻之周岐為今陜西鳳翔府岐山縣則豐鎬故京在岐之東秦未嘗有也可見平桓之世晉未滅虢東西周猶通封畿號令猶行於西土虢鄭遺地之在畿內者尚無恙黍離詩人過故宗廟宫室盡為禾黍破瓦頽垣依然故物使秦有其地當更營建無復此景象矣所以莊二十一年莊王與虢酒泉猶在同州府澄城縣而虢公敗犬戎於渭汭猶在西周之封內也自晉滅虢斷桃林之隘而秦穆亦東竟至河築壘為王城以塞其路而故京遂判若異域僖十五年獲晉侯舍諸靈臺靈臺在西安府鄠縣豐鎬之側自是周之遺地盡入於秦西歸之好音絶矣自晉獻秦繆始也乃知鄭詩譜謂秦襄公逐戎橫有西都八百里之地者其説誠踈謬當以史記為正陳武王封舜後媯滿於陳是為胡公今為河南陳州府治淮寧縣宛丘東門之池毛傳曰四方髙中央下曰宛丘又城內東北隅有池即詩所謂東門之池也檜祝融後妘姓今河南許州府密縣東北五十里有古檜城平王東遷為鄭武公所滅僖三十三年文夫人葬公子瑕於檜城之下檜與鄶通曹武王封弟叔振鐸於曹今為山東曹州府定陶縣春秋哀八年為宋所滅豳許氏謙曰豳即邠州唐開元時改豳字為邠今為陜西西安府邠州三水縣郡縣志古豳城在縣西二十里公劉所遷前后稷封邰在今西安府武功縣西南二十二里詩所謂即有邰家室是也又百泉溥原流泉俱在今三水縣界顧氏炎武曰周世之國無豳此非太師所采周公追王業之始作為七月之詩兼雅頌之聲而用之祈報之事鴟梟以下或周公之作或為周公而作則皆附於豳焉雖不以合樂然與二南同為有周盛時之詩非東周以後列國之風也謂自周南至豳統謂之國風者此先儒之誤程泰之辨之詳矣鎬京玉海曰今京兆長安縣昆明池北鎬陂郡縣志周武王宫即鎬京也在長安縣西北十八里自漢武帝穿昆明池於此鎬京遺址淪陷焉鎬與滈同括地志滈水源出長安縣西北滈池水經注滈水承滈池北流入渭秦始皇本紀有人持璧遮使者曰為我遺滈池君服虔曰水神也江神以璧遺滈池之神告始皇之將終也亦曰鎬池古史考武王遷鎬長安豐亭滈池也是鎬京因鎬池而得名自漢武穿池於此以習舟師侈大其制水盡入昆明池而鎬京遺迹不可復問矣摯毛氏曰摯國名任姓仲虺之後唐世系表仲虺居薛臣扈祖已皆其胄裔祖已七世孫曰成徙國於摯太任母家也傅氏曰詩云自彼殷商來嫁于周則摯為殷畿內國莘世本莘國名姒姓禹後唐世系表啓封支子於莘水經注郃陽城故有莘邑太姒母家也水經注郃陽城南有瀵音糞水東流注於河水南猶有文母廟前有碑去城十五里水即郃水也縣取名焉閻氏若璩云太姒所産之莘國在今西安府郃陽縣南二十里若伊尹耕莘之莘則在今汴州陳留縣東北三十五里距湯都商邱不過四百里殷時原有兩莘國牧野通典衛州汲縣牧野之地皇甫謐曰在朝歌南七十里朝歌今為衛輝府淇縣牧野今為衛輝府治汲縣地水經注自朝歌以南暨清水土地乎衍據皋跨澤悉牧野之地故詩稱牧野洋洋今新鄉縣亦有牧村即古牧野蓋其地極廣虞芮郡縣志故虞城在陜州平陸縣東北五十里虞山之上古虞國芮城在陜州芮城縣西二十里古芮國晉太康地紀虞西百四十里有芮城間原在平陸縣西六十五里即虞芮爭田讓為間田之所臣謹案春秋時有虞國公爵仲雍之後虞仲所封在今山西解州平陸縣東北四十里僖五年滅於晉顧命有芮伯亦姬姓國在陜西同州府城南僖二十年滅於秦其殷時之虞芮已絶不復封虞即前時之虞地芮則在河以西同州府與秦接界今山西芮城縣乃殷時芮國非春秋之芮也阮共鮮原張氏曰阮國名共阮國之地皆在今涇州今有共池即共也孔氏曰鮮原亦在岐山之南去太王舊都不逺文王徙宅於程即此朱子曰今在京兆府咸陽縣豐在今鄠縣東三十五里文王又自程遷豐豐在岐山東南三百餘里周地西迫戎狄自岐遷程自程遷豐自豐遷鎬西逺戎而東即華也靈臺靈囿靈沼辟雍三輔黃圖靈臺在長安西北四十里髙二十丈周四百二十步文王之辟雍在焉囿在縣西四十二里沼在縣西三十里又鎬京辟雍武王之學戴氏曰武王都鎬為四方來朝者衆豐不足以容之先作辟雍以養人才閻氏若璩曰三輔黃圖云靈囿在長安縣西四十二里王應麟以文王之囿方七十里注於下余謂在今鄠縣東三十里正漢地理志所謂文王作酆有鄠杜竹林南山檀柘號稱九州膏腴者文王當日弛以豫民恣其芻獵以往但有物以蕃界之遂名之曰囿此實作邑于豐時事非初岐山事也論者徒執岐山國僅百里囿安得有如許大不知文王由方百里起耳豈終於是者哉又案括地志辟雍靈沼今悉無復處惟靈臺孤立至唐太宗時猶存焦穫鎬方爾雅十藪周有焦穫郭璞注今扶風池陽縣瓠中朱傳曰今在耀州三原縣案耀州三原今屬陜西西安府鎬顔師古以為非豐鎬之鎬但不能名其所在方即南仲所城之朔方朱傳以為今靈夏等州之地今為陜西寧夏衛蓋此時玁狁自西北來也涇陽太原顧氏炎武曰薄伐玁狁至于太原毛鄭俱不詳其地朱子謂今太原陽曲縣殆未然豈有冦從西來兵乃東出者宣王料民太原亦以其地近邊為禦戎之備必不料之於晉國也愚意此詩必求涇陽所在而後太原可得而明漢書地理志安定郡有涇陽縣禹貢涇水所出後漢書靈帝紀段熲破先零羌於涇陽注涇陽縣屬安定在原州元和郡縣志原州平涼縣本漢涇陽縣地今縣西四十里涇陽故城是也然則太原當即今之平涼而後魏立為原州亦是取古太原之名耳據炎武説則太原與涇陽本是一地在漢為涇陽縣在後魏曰原州今圖志亦曰平涼府平涼縣涇水出縣西南三十里至髙陵縣入渭水以北為陽玁狁從朔方今寧夏衛入侵正當平涼涇水之北而吉甫薄伐即於其地也胡渭朏明曰漢安定郡治髙平縣後廢元魏改置曰平髙唐為原州治廣德元年沒吐蕃節度使馬璘表置行原州於靈臺縣之百里城貞元十九年徙治平涼縣西去故州一百六十里故州即今固原州小爾雅云髙平謂之太原則太原當在州界非平涼縣縣乃古涇陽在固原之東玁狁侵及涇陽而薄伐之以至于太原蓋自平涼逐之出塞至固原而止不窮追也案此説更勝至于二字才有著落得不窮追之意若説涇陽即太原玁狁侵於此地而伐即於此地至于之義終不出臣謹案涇陽非今日之涇陽縣太原非今日之太原府蓋玁狁從西北來而二地皆在東也朱子以朔方為今寧夏衛此説得之但以焦穫為今耀州三原縣亦未合耀州在今平涼之東五百里三原與今之涇陽縣接壤且去周之京師亦太近既已整居耀州必不迂道而西侵平涼也餘詳訂詁中申謝申在今南陽府南陽縣曹氏曰地理志南陽宛縣有申伯國棘陽縣東北百里有謝城其地蓋相近案棘陽縣今為新野縣郿在今鳳翔府郿縣朱傳曰郿在鎬京之西岐周之東而申在鎬京之東南時王在岐周故餞于郿也江漢常武朱傳以江漢為宣王命召虎平淮南之夷常武是宣王自將伐淮北之夷舊説以淮南今淮安府之山陽鹽城等縣淮北今安東清河等縣毛西河非之曰常武明言徐方既來徐方既同與淮夷何涉徐戎在徐地但欲伐徐戎則必循淮浦故詩曰率彼淮浦省此徐土是宣王特經歷淮北夷非伐淮北夷也臣案徐戎係今徐州春秋時彭城屬宋而戰國䇿樂毅曰淮北宋地楚魏之所欲也是徐州亦有淮北之名矣向孔氏曰左傳桓王與鄭十二邑向在其中杜預云河內軹縣西有地名向上則向在東都之畿內也軹縣唐省入孟州濟源縣左傳襄十一年諸侯伐鄭師于向詩皇甫孔聖作都于向即此蘇公孔氏曰左傳昔周克商使諸侯撫封蘇忿生以溫為司冦則蘇國在溫杜預曰今河內溫縣是東都畿內春秋時蘇稱子此稱公者蓋子爵而為三公鄭語蘇己姓昆吾之後寰宇記故溫城在孟州溫縣西三十里詩序暴公為卿士而譖蘇公世本暴辛公作塤蘇成公作箎周幽王時人暴公鄭氏曰暴畿內國春秋文八年公子遂會雒戎盟于暴杜注暴鄭地郇伯左傳畢原酆郇文之昭也郇本侯爵以文王之子為州伯故曰郇伯嚴氏粲曰毛以為東西二大伯鄭以為牧下二伯孔以大伯惟有周召無郇侯當從鄭春秋僖二十四年狐偃及秦晉之大夫盟于郇杜注解縣西北有郇城所謂郇瑕氏之墟也故城在猗氏縣西南四里郇與荀通桓九年荀侯賈伯伐曲沃後為晉所滅以賜大夫原氏黯是為荀叔郡縣志栒邑故城在邠州三水縣二十五里古郇國案邠州在秦境內與晉郇瑕氏絶逺且狐偃從公子入國濟河而後盟于郇明是河以東地面謂為邠州三水縣非也坰野郡縣志坰澤俗名連泉澤在兖州曲阜縣東九里魯僖公牧馬之地常許孔氏曰常為魯南鄙常或作嘗在薛之傍春秋莊三十一年築臺于薛六國時齊孟嘗君食采於此亦號薛公是嘗與薛一地也許為魯西鄙即許田桓元年鄭伯以璧假者後屬於鄭在許州許昌縣南四十里有周公廟朱子曰常許皆魯之故地見侵於諸侯而未復者故魯人以是願僖公所謂居常與許是也毛詩類釋卷二
