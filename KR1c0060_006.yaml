body:
  text: 毛詩類釋卷六國子監祭酒顧棟髙撰釋祭祀宗廟禴祀蒸嘗大雅旱麓篇瑟彼玉瓚黃流在中毛傳玉瓚圭瓚也諸侯九命然後錫以秬鬯圭瓚何氏楷曰黃流有二義毛謂黃金以飾流鬯瓚者盛鬯之器用黃金為勺而有鼻口鬯酒從中流出器是黃金照酒亦黃故謂之黃流鄭但以黃流為秬鬯釀秬為酒以鬱金之草和之草名鬱金則黃如金色酒在器流動故謂為黃流鄭所以傳易者以言黃流在中當謂在瓚之中不謂流出之時且瓚既以朱為中央則其中亦未而不黃矣據此則鄭説為長大雅棫朴篇濟濟辟王左右奉璋毛傳半圭曰璋鄭箋璋璋瓚也祭祀之禮王祼以圭瓚諸臣助之亞祼以璋瓚孔疏祭之用瓚惟祼為然天官小宰注云惟人道宗廟有祼天地大神至尊不祼何氏楷曰周禮內宰職云后祼獻則瓚先儒説王行初祼后行亞祼其或后有不與則大宗伯攝之疏義云圭首鋭一圭中分為二璋奉于王前則其中分處向王類人之鞠躬內向而歸心也吳氏鼎曰小宗伯鄭注云天子圭瓚諸侯璋瓚王制孔疏又云若未賜圭瓚則用璋瓚此云左右奉璋當是文王為諸侯時之禮非指后祼亦非大宗伯攝行亞祼注疏家泛引亞祼立説殊欠分曉大雅文王篇殷士膚敏祼將于京孔疏宗廟之祭以灌為主周人尚臭舉祼將以表祭事見殷士來助祭耳不必專助行祼也何氏楷曰祭必先灌乃後薦腥薦熱賈公彥云宗廟之祭迎尸入户坐於主北王以圭瓚酌鬱鬯以獻尸尸得之瀝地祭訖啐之奠之不飲尸為神象灌地所以求神也以上二灌與祼同為祭禮第一節王一獻后亞獻以後為朝事延尸于户西南面布主席東面楊氏復曰司尊彛疏王以圭瓚酌雞彛鬱鬯始獻尸尸以灌地降神祭之啐之奠之此為灌神之一獻后以璋瓚酌鬱鬯亞祼內宰贊注云王既出迎牲后乃從後灌也此為灌神之二獻小雅楚茨篇潔爾牛羊以往蒸嘗臣謹案郊特牲既灌然後迎牲明堂位君肉袒迎牲於門卿大夫贊君祭統及迎牲君執靷卿大夫從士執芻祭義祭之日君牽牲卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳祭器君親牽牲大夫贊幣而從按此係迎牲牽牲之事禮器納牲詔于廷地官充人碩牲則贊封人歌舞牲春秋左氏傳奉牲告肥腯按此係告充之事以上儀節楚茨詩以潔爾牛羊四字該之以上迎牲牽牲告充為朝事之始祭禮第二節信南山篇執其鸞刀以啓其毛取其血膋鄭箋毛以告純血以告殺膋以升臭取腸間脂合之黍稷實之于蕭乃以火燒之合馨香生民詩取蕭祭脂是也孔疏先祼以降神乃以騂牡之牲迎而入于廟門以獻于祖考所謂納亨也鄭注納牲將告殺謂向祭之晨既殺以授亨人楚茨篇或剝或亨或肆或將孔疏亨謂煮之使熟也肆謂陳于懸肉架周禮地官牛人所謂牛牲牙也將謂就牙上而齊之也二事俱在或亨之前以事相類故進或亨於上以配或剝耳以上殺牲為朝事之事祭禮第三節大雅生民篇取蕭祭脂毛傳取蕭合黍稷臭陽達牆屋孔疏取蕭草與祭牲之脂爇之於行神之位合馨香何氏楷曰蕭者蒿之香者也或云牛尾蒿白葉莖粗科生多者至數十莖可作燭有香氣甸師所供祭祀以脂爇之為香脂牛腸脂信南山所謂膋也疏云一祭之中再度炳蕭有朝踐之炳蕭有饋肉之炳蕭朝踐即朝事謂薦血腥時也饋肉一則薦黍稷時也二者俱見郊特牲及祭義古所謂香者如此祭祀用香今古之禮並無其文以上燔燎為朝事之禮祭禮第四節楚茨篇祝祭于祊祀事孔明毛傳祊門內也鄭箋孔甚明潔也孝子不知神之所在故使祝博求之門內待賔客之處祀禮於是甚明孔疏祊有二種繹祭之祊在廟門外之西正祭之祊當在門內秦氏蕙田曰祊祭當在朝踐之節斯時事尸於堂薦血薦腥薦爓無有飲食之事恐神之尚未憑依也故曰于彼乎于此乎至饋食則事尸於室以人道飲食之曰神嗜飲食曰神具醉止則尸實神所憑依而無恍惚求索之語矣何氏楷曰朝踐以前意在求神薦熟以後意在饗尸楚茨潔爾牛羊節是朝踐事執㸑以下是饋食事而祝祭于祊在殺牲之下執㸑之前此其證也以上祊祭為朝踐之事祭禮第五節王三獻后四獻臣謹案周禮司尊彛其朝踐用兩獻尊鄭注獻讀為犧明堂位尊用犧象孔疏此犧尊周禮春夏之祭朝踐堂上薦血腥時用以盛醴齊君及夫人所酌以獻尸者也楚茨篇執㸑踖踖為爼孔碩毛傳㸑饔㸑廩㸑也孔疏饔㸑以煮肉廩㸑以炊米何氏楷曰此章專就薦熟言之以尸人也必薦熟而後尸可享朝踐以前皆交於神明之道其意在於求神薦熟以後始兼用人道其事在於饗尸信南山啓毛取血此紀朝踐以前事二詩實相為首尾爼有肵俎有折俎有尸俎有阼俎有主婦俎有祝俎有佐食俎有賔俎此言孔碩則尸俎也以上薦熟為饋食之事祭禮第六節楚茨篇苾芬孝祀説文云苾馨香也芬草初生其香分布吳氏鼎曰此當指黍稷言書曰黍稷非馨明德惟馨信南山篇是蒸是享苾苾芬芬何氏楷曰此時始薦黍稷饋食之薦不止于黍稷而獨言苾芬者祭以黍稷為主也周頌載芟篇有飶其香有椒其馨吳氏鼎曰祭以酒食為主而此詩又為農事既成而作故云然以上薦黍稷為饋食之事祭禮第七節楚茨篇或燔或炙鄭箋燔燔肉也炙炙肝也皆從獻之俎特牲主人獻尸賔長以肝從主婦獻尸賔長以燔從秦氏蕙田曰或燔或炙毛傳異義毛以為燔取膟膋鄭以為從獻之俎據取膟膋在殺牲時則當言之或肆或將之下而不應言之執㸑踖踖之下此執㸑踖踖已是薦熟時非朝踐時矣故朱子從鄭不從毛楊氏復曰儀禮大夫士之祭禮不祼不薦血腥唯于室中設尸主行饋食禮天子諸侯饋食以前堂上設南面位行祼鬯薦腥之禮而後延尸入室東面位行饋食后薦饋獻之豆籩王以玉爵酌盎齊以獻尸此五獻后又以玉爵酌盎齊以獻尸此六獻也以上從獻為饋食之禮祭禮第八節王五獻后六獻楚茨篇工祝致告徂賚孝孫毛傳善其事曰工何氏楷曰苾芬孝祀以下皆祀所傳嘏辭天保篇君曰卜爾萬壽無疆鄭箋君曰卜爾者尸嘏主人傳神祠也大雅既醉篇公尸嘉告朱子詩傳公尸君尸也周稱王而尸但曰公尸蓋因其舊如秦已稱皇帝而其男女猶稱公子公主也嘉告以善言告之為嘏辭也以上尸嘏為酳尸之事祭禮第九節王七獻后八獻諸臣九獻小雅賔之初筵其耽曰樂各奏爾能鄭箋各奏爾能者謂子孫于既耽之後各酌獻尸尸酢而卒爵也士祭禮上嗣舉奠因而酌尸天子則有子孫獻尸之禮孔疏以天子祭禮亡約士之祭禮有嗣子舉奠因酌尸因知天子則有子孫獻尸之禮賔筵篇賔載手仇室人入又鄭箋仇讀曰㪺室人謂佐食又復也賓手挹酒室人復酌為加爵仇挹于罍酌注于爵也楊氏復曰九獻之後謂之加爵特牲禮長兄弟衆賓長及佐食有三加爵則天子諸侯亦當然也按子孫獻尸之後賓長佐食復酌為加爵以上九獻之後加爵祭禮第十節楚茨篇為賓為客獻酬交錯鄭箋主人酌賓為獻賓酢主人主人復自飲而復飲賓曰酬至旅酬交錯以遍賓筵篇酌彼康爵以奏爾時鄭箋康虛也時謂心所尊者孔疏加爵之時賓與兄弟交錯以酬爵未虛也至卒爵實觶于篚此後爵乃虛矣賓弟子兄弟之子各舉觶于其長是奏所尊之事也此即中庸旅酬下為上一節以上旅酬祭禮第十一節楚茨篇孝孫徂位工祝致告鄭箋祭禮畢孝孫往堂下西面之位祝於是致孝孫之意告尸以利成秦氏蕙田曰告利成鄭以為告尸朱子以為告主人當以朱子為是孔疏大夫士告主人天子告尸恐未必然楚茨篇神具醉止皇尸載起鼓鐘送尸神保聿歸鄭箋具皆也皇君也尸出入奏肆夏何氏楷曰鼓鐘之鼓從攴與鐘鼓之鼓從支不同彼二器並作此專以擊鐘為主所謂金奏也以上告利成送尸祭禮第十二節楚茨篇諸宰君婦廢徹不遲鄭箋諸宰徹去諸饌君婦籩豆而已孔疏周禮九嬪凡祭祀贊后薦徹豆籩膳夫徹王之阼俎注云阼俎最尊其餘則其屬徹之以上徹祭禮第十三節楚茨篇諸父兄弟備言燕私鄭箋祭祀畢歸賓客豆俎同姓則留與之燕以盡私恩所以尊賓客親骨肉也楚茨篇樂具入奏以綏後祿至末孔疏祭時在廟燕當在寢故言祭時之樂皆復入于寢奏之以安其後日之福祿也神嗜飲食以下皆小大之慶詞案此即中庸燕毛一節以上燕同姓為祭禮第十四節臣謹案祭禮繁重特牲少牢須盡日始能成禮天子九獻更當何如祫祭酒可若犆祭將使人攝歟或另擇日歟吳氏鼎曰祭必同日經但言祫祭之禮耳特祭曰禴程子謂禴是禮之薄者易曰東鄰殺牛不如西鄰之禴祭儀文當從簡省不盡如詩禮所云也然此説不見于經文學者但當從程子之説長樂陳氏曰時祭有小禮有大禮小禮春也大禮夏秋冬也禮記曰大嘗周禮曰大蒸則知春祀之為小禮矣鄭云春以物無成不殷祭殷盛也是犆祭當從略延平周氏謂礿以飲為主祫以食為主既以飲為主則宜有獻酬交錯之禮矣祭一廟已盡醉如何更祭别廟乎張子曰天子必親行祭事時祭則逐廟行禮勢必十數日而後能遍仍不得各為齋戒或以是容有司行事乃可以同日而事畢又曰天子七廟一日而行則力不給故禮有一犆一祫之説如春祭髙祖夏祫羣廟秋祭曽冬又祫來春祭祖夏又祫秋祭禰冬又祫程子曰為廟禮繁故每年於四祭之中三祭合食于祖廟惟春則各祭諸廟孔疏礿薄也春物未成其祭品鮮薄楊氏復曰如張子所云雖於一犆一祫之説若可通但言犆只祭一廟而遺其餘廟恐於人情亦有所不安不若程子之言簡而備也臣謹案所疑者程張二子亦疑之張子有二説意有司行事之説為妥尚書洛誥王賓殺禋咸格孔安國傳曰王以命周公重大其事故文武皆至其廟親告之可見平日之祭不皆至也此當使重臣攝祭故周公祭泰山召公為尸為尸猶可况攝祭乎若必親臨其事勢必不能逐廟齊戒以精力倦怠之餘竭蹶勉強不敬滋甚若如張子髙曽祖禰更迭犆祭之説則天子七廟又有文武二世室親廟當至五年而一周不嫌于太疏曠乎又謹案楚茨一詩天子宗廟祭禮首尾節次具備但未及二灌之禮耳故前列旱麓棫朴二詩以補之旱麓之玉瓚即圭瓚王以初灌棫朴之奉璋即璋瓚后用以亞灌后不與則大宗伯攝之應在楚茨或剝或亨之前信南山之啓毛取血即或剝或亨時事也燕同姓以後為明日之繹祭則絲衣與鳬鷖二詩盡之矣爾雅商曰肜周曰繹郭璞注祭之明日尋繹復祭孔疏天子諸侯謂之繹在祭之明日於廟門外西室及堂而行禮也上大夫曰儐尸與祭同日于廟堂之上行禮也儀禮有司徹正是上大夫儐尸之禮但于堂上獻尸獻侑全無室中之事是與天子禮異絲衣篇絲衣其紑載辨俅俅自堂徂基自羊徂牛孔疏辨爵辨也士爵辨而助祭于王繹禮輕使士升堂視壺濯降往于基告濯具又視牲從羊之牛反告充已乃舉鼎冪告潔禮之次也臣謹案繹禮事神禮略饗尸禮重故首二句絲衣爵辨但舉士之祭服絶不言事神之事下文告濯具告充告備則專為饗尸而設蓋大夫士儐尸與正祭同日牲酒不煩另具天子之繹在祭之明日故須有此等事至設兕觥罰爵先儒謂大夫士祭禮猶不用此蓋正祭日嚴肅雖獻酬無算爵而助祭之人心存誠敬無容更設紏繩至繹祭以享生人為主懼有失儀故須設兕觥鳬繹詩所謂公尸燕飲即歌其事也鳬鷖篇公尸來燕來寧至末朱子語録古者祭必有尸既祭之明日則暖其飲食以燕為尸之人故有此詩臣謹案絲衣詩云自堂徂基自羊徂牛是祭之明日另殺牲以享尸非暖其飲食之謂也周禮牛人職云祭祀共其享牛求牛鄭注享牛用以祭求牛用以繹繹者孝子求神非一處故以繹牛為求牛也此則繹禮别殺牲之明證徐常吉曰按楚茨鼓鐘送尸神保聿歸則祭畢之燕尸不與也尸何以不與以其象神故不敢留而轉為次日之燕也燕于次日所以尊尸也尊尸所以尊神也何氏楷曰是日先行繹祭之禮而後享尸此云公尸來燕則是祭後燕尸非祭時也陳氏禮書曰正祭重而主于禮神繹祭輕而主于禮尸故繹于明日則異牲若賓尸于祭日則用正祭之牲而已以上繹賓尸祭禮第十五節臣謹案天子宗廟祭禮于詩首尾節次備具可與儀禮特牲少牢相發然此皆謂祫祭耳祭禮以祫為重蒸嘗皆祫也故楚茨曰以往蒸嘗商頌曰顧豫蒸嘗春秋但記蒸嘗而無禴祀神具醉止具皆也非止一神后稷東面先儒謂神尊為發爵之主不與子孫為酬酢其獻酢交錯皆主六尸而言若特祭禮自當從省簡但文不傳耳禘祫周頌雍序曰禘太祖也鄭箋太祖謂文王孔疏禘祫皆殷祭武王以周十二月崩其明年周公攝政稱元年十二月小祥二年十二月大祥三年二月禫四年春禘蓋在此時臣謹案此詩文不特朱子據趙氏匡説之為非即孔疏謂武王崩而禘祭亦誤竊謂此文王崩三年喪畢之吉禘也春秋家説三年喪畢致新死者之主于廟諦審昭穆亦謂之禘此詩當在此時何則從來祭禮無及于女者此詩曰既右烈考亦右文母兼及太姒案士虞禮記云男男尸女女尸又云是月也吉祭猶未配蓋既配則合女于男故太廟中七廟惟及男不及女儀禮特牲少牢無有女尸與主人主婦酬酢者此其證也吉禮猶未配蓋此時專祭文王與太姒既諦審昭穆而祔於太廟則文母不復祭矣不然七廟中男女皆有尸雜沓一室內豈復成禮乎曰武王此時未克殷何得云相維辟公天子穆穆曰此周公致太平作禮樂時追稱之也凡雅頌皆是周公所作武王未遑制禮樂安得有頌商頌長發序曰大禘也臣謹案趙氏匡説謂禘唯祭始祖與始祖所自出不兼羣廟之主如此則商之禘宜但祭嚳與契耳而此時無一字及嚳遍稱相土成湯併及阿衡足明此説之非矣朱子因謂宜為祫祭之詩蓋朱子酷信趙説故為此語耳陳氏禮書曰陸淳謂禘祭不兼羣廟為其疏逺不敢褻祭此殆未嘗考之于經也看此詩言玄王相土則不兼羣廟之説不足信矣何氏楷曰漢儒皆以大禘為合祭程子及胡致堂皆從之而趙楊謂趙氏匡及宋楊氏復也泥于大傳中之一語謂禘惟祭始祖與所自出二人今據大傳本文曰禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省于其君于祫及其髙祖馬端臨謂玩其文意亦似禘祫共只説一祭蓋共是合祭祖宗天子則謂之禘諸侯及大夫士則謂之祫以君臣之故所及有逺近也張純謂禘是諦審昭穆則七廟之主咸在亦以明矣商頌玄鳥序曰祀髙宗也鄭箋祀當為祫祫合也孔疏經逺本玄鳥生契帝命武湯言髙宗能興其功業因祫祭而美其事故序言祫以總之康熙庚午監察御史李時謙疏請舉行禘禮事下九卿詹事科道會議禮部尚書張玉書等議曰臣等綜考禮制言禘者不一有謂虞夏禘黃帝殷周禘帝嚳皆配祭昊天於圜丘者有謂祖之所自出為感生帝而祭之於南郊者有謂圜丘方澤宗廟為三禘者先儒皆辨其非而言宗廟之禘又不一説有謂禘祭止及毁廟不及親廟者有長發之詩為商之禘而親廟與毁廟皆兼祭者惟唐趙匡陸淳皆以為禘異于祫不兼羣廟王者既立始祖之廟直推始祖所自出之帝而以始祖配之故名為禘至于三年一祫五年一禘經無明文其説始于漢儒而後之議禮者咸宗之漢唐宋所行禘禮亦莫考始祖之所自出止于五歲之中行一祫一禘兩大祭于其宗廟而已大抵夏商以前有禘之祭而其制未詳漢唐之後有禘之名而與祫無别惟周以后稷為始祖以帝嚳為所自出之帝而太廟之中原無帝嚳之位故祫祭不及帝嚳至禘祭時乃特設帝嚳之位以稷配焉行于後代不能盡合故宋神宗諭廷臣議罷禘禮明洪武初御史答祿與權請舉禘祭衆議亦以為不必行詔從其議至嘉靖中乃立虛位祀皇初祖帝而以太祖配享事屬不經禮亦旋罷洪惟我國家受天顯命世德相承定鼎之初追上四祖尊稱以肇祖原皇帝始基王迹故首立廟祀夫太廟之中以受命之君為太祖允宜特尊者也我太祖髙皇帝功德隆盛與天無極自當為太廟萬世之祖上而推其所自出則締造之業太祖為最著今太廟祭祀四孟分祭於前殿後殿以各伸其尊歲暮祫享于前殿以同將其敬一歲之中自肇祖以下屢伸祼獻仁孝誠敬已無不極五年一禘之祭不必舉行王士禎居易録以上宗廟郊祭禮周頌昊天有成命序曰郊祀天地也朱氏鶴齡曰宋元祐間蘇氏軾據此為合祀天地之明證而其實不然此詩乃成王即政郊見上帝之樂歌言天而并及地猶言父而并及母禮記兆于南郊就陽位也器用陶匏象天地之性也亦兼地言之周人本無合祀之禮安得有合祀之詩乎思文序曰思文后稷配天也朱子語録問郊祀后稷以配天宗祀文王於明堂以配上帝天帝只一却分祭何也為壇而祭故謂之天祭于屋下而以神示祭之故謂之帝程子曰以冬至物生之始故祭于圜丘而配以祖陶匏藁鞂掃地而祭以季秋物成之時故祭于明堂而配以父以宗廟之禮享之附北郊論宋自元祐諸臣爭南北郊合祀分祀後紹聖中蔡京用事詆誣宣仁謂踵王莽諂事元后故事詔罷合祭然北郊親祠終帝世未有能舉行者臣向主明儒王樵説謂古者郊社對舉祭天曰郊祭地曰社安得南郊之外復有北郊郊以祭天言天而地已舉此隂統于陽卑統于尊之義地只祭社而已又安得天地合祀于南郊案樵之説即宋儒胡氏宏之説朱子據之以釋中庸郊社之禮者也可見朱子後來亦不信北郊語詳訂詁中今再考元明兩代元世祖時中書禮部移太常擬定北郊禮儀博士等請法坤數用六之義去都城北六里為方壇三成六陛仍自外壝之外四面稍令低下以應古者澤中之制其時卒不果行至仁宗延祐元年太常請立北郊帝謙遜未遑北郊之議遂寢明祖初即位建方丘壇于鍾山之隂以夏至祭皇地袛亦未云北郊也十年感隂雨始行合祀成祖遷都亦因舊制至世宗九年從夏言議始兆方丘于北郊隆慶三年張居正請仍行合祀是北郊自厯代以來行之徒成具文不行亦非闕典紛紛聚訟非俗士之拘牽即姦臣之迎合必求其説則如胡宏之與王樵言古者只有郊社更無北郊稽之經典確有明據為斷不可易也朱子曰本朝初分南北郊後復合而為一周禮亦只説祀昊天上帝不説祀后土故先儒言無北郊祭社即是祭地此胡氏宏之説古者天地未必合祭日月山川百神亦無一時合祭共享之禮古之時禮數簡而儀從省必是天子躬親行事豈有祭天却將上下百神重沓纍積併作一祭耶且郊壇陛級兩邉上下皆是神位中間恐不可行宋史郊祀志馬氏端臨曰北郊之名本出緯書孝經緯祭地祗于北郊禮經所不載鄭氏因祭法有泰折之語而以為泰折即北郊非方澤支離甚矣文獻通考臣謹案鄭氏分圜丘方澤與南北郊為二致有宋夏日至祭皇地祗以太祖配孟冬别為壇于北郊祭神州地祗以太宗配夫地祗豈有二哉至夏言增立東郊西郊以朝日夕月不經彌甚明堂祭禮周頌我將序曰祀文王于明堂也詩緝陳氏曰古者祭天于圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人以為未足以報本故於季秋之月有大饗之禮焉然則郊者古禮而明堂周制也周公以義起之也陳氏禮書曰明堂禮北郊為文比廟為質郊祭掃地藳秸而已明堂則有堂有筵郊祭則特牲而已明堂則維羊維牛郊祭有燔燎而明堂則有升禋由漢及唐或祀太乙五帝光武或特祀五帝光武明帝或除五帝之座同稱昊天上帝晉武帝或合祭天地唐武后中宗或配以祖或配以羣祖又明堂之制變易不常與考工之説不同皆一時之制然也楊氏復曰月令有大享之文我將有維羊維牛之語則明堂之禮比郊尤備程子曰其禮必以宗廟之禮享之朱子亦曰祭于屋下而以神示祭之蓋謂此也或問朱子曰我將之詩乃祀文王于明堂之樂章詩傳以為物成形于帝人成形于父故季秋祀帝于明堂而以父配之取其成物之時也此乃周公以義起之非古制不知周公以後將以文王配耶抑以時王之父配耶曰諸儒正持此論至今不決看來只得以文王配且周公所制之禮不知在武王時在成王時若在成王之時則文王乃其祖也亦可見配天不專于嚴父矣又問繼周者如何曰只得以有功之祖配之後來妄將嚴父之説亂了宋英宗治平元年大饗明堂議以仁宗配侑司馬光等奏曰孝子之心誰不欲尊其父者聖人制禮以為之極不敢踰也考尋前世前漢以髙祖配天後漢以光武配明堂以是觀古之帝王自非建邦啓土及造有區夏者皆無配天之文孔子以周公有聖人之德制禮作樂而文王適其父故孝經曰嚴父莫大于配天以答曽子之問非謂凡有天下者皆當如此然後孝也近世祀明堂者皆以其父配五帝此乃誤識夫孝經之意不可以為法今議者欲以仁宗配明堂恐於祭法不合不獨乖違典禮恐亦非仁宗意議上詔竟從孫抃等議以仁宗配享明堂案光所奏與錢公輔等合公輔奏曰孝經所稱嚴父配天則周公其人也以周公言之則嚴父以成王言之則嚴祖也後世失禮不足考據請一以周事言之太宗則周之文王真宗則周之武王真宗雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移于武王也仁宗則周之成王亦未聞康王以嚴父之故廢文王配天之祭而移于成王也下至兩漢去古甚逺而明堂配祭東漢為得孝明始建明堂以光武配其時適符嚴父之説及時異事殊而章安二帝亦弗之變此最為近古而合于禮者有唐不明斯義在孝和時則以髙宗配在明皇時則以睿宗配在永泰時則以肅宗配禮官杜鴻漸王涯輩不能推明經訓務合古初反雷同其論以惑世主延及于今牢不可破當仁宗之初倘有建是論者則配天之祭當在乎太宗矣當時無一言者故使宗周之典禮不明于聖代伏望陛下深詔有司博謀羣議使配天之祭不膠于嚴父而嚴父之道不專于配天循周家之典禮替有唐之曲學幸甚上又詔兩制官再詳定尋以孫抃等奏議而寢嗣後英宗神宗晏駕俱用抃議配侑馴至南渡紹興七年議升徽宗配享是時梓宫未還尤為可笑先是紹興初禮部尚書胡直孺奏曰仁宗皇祐時大享明堂合祭天地並侑祖宗遍祀百神聖訓有禮緣人情之語由此觀之皇祐祀典本非為萬世不易之經也國朝配祀初無定制自英宗始專配以近考司馬光吕誨爭之不能得神宗皇帝意欲釐正而王安石又誤引孝經嚴父之文不能將順上意謹案太祖則周之后稷宜配祭于郊者也太宗則周之文王宜配祭于明堂者也皇祐崇祀固宜以太祖太宗配當時蓋泥于嚴父故配帝併及于真宗今主上紹膺大統則真宗至神宗均為祖廟獨躋則患在于無名並配則幾同于祫享又從祀百神本非典禮或升或黜慢瀆為多乞自今明堂専奉太祖太宗配禮專而事簡庶不失周公制禮初意議上不果行逮徽宗升遐議配侑禮官請俟恢復後再議至三十一年竟配享明堂嗣是嚴父之説終南宋世莫之改臣謹案我將為宗祀明堂之樂歌卒章云畏天之威于時保之徽宗以失國之君而配享于義何取乎祀典之濫于斯極矣附明堂論臣謹案明堂禮自孝經有嚴父配天之一語致後來儒者紛紛聚訟厯代典禮亦不畫一或每代易配或三聖並配觀司馬公及錢公輔之奏朱子之論可以曉然大白矣至其制度經無明文大戴禮則云九室考工記又云五室漢武時公玉帶所上黃帝明堂圖一殿無壁茅蓋通水雖不經見猶不失古者簡朴之意降及北魏周齊議營規制諸儒爭論迄無一就終隋之世大饗之禮率寓雩壇唐則寓于圜丘而已惟武后毁東都乾元殿為之崇極奢麗肆其侈心後亦旋毁至宋仁宗皇祐二年始詔以大慶殿為明堂三聖並侑有宋一代明堂自皇祐始理宗舉行皇祐故事以太祖太宗寧考並配實祐五年復詔增髙宗蓋至是而配天者凡四矣明世宗用諂臣豐坊之請尊皇考睿宗配祀以藩臣而干大典僭莫甚焉原其故皆由嚴父之一言啓之也本朝稽古右文深明典禮破拘牽之陳説昭一代之彛憲會典所載郊祀止用圜丘方澤而斥去北郊及神州百神諸祠太廟止用四孟時享及嵗除祫祭而明堂與禘禮槩不舉行非聰明聖知其孰能與于此哉又案孟子謂明堂王者之堂此又王者巡狩之地有明堂以朝諸侯行政與在國之明堂有别周頌噫嘻序曰春夏祈穀于上帝也孔疏周公成王之時春郊夏雩以祈穀實詩人述其事以作歌李氏樗曰月令孟春元日祈穀于上帝仲夏之月大雩帝用盛樂祈穀實春則因民播種以啓蟄之時而郊夏則恐旱暵為災于龍見之時而雩皆所以祈穀于上帝也又曰是詩初無祈穀之意但以為人事于此盡矣故播厥百穀十千維耦此皆人之所能為也若夫雨暘時若使百穀順成此非人之所能為則天也故于此而祈穀焉詩緝曰祈穀之後即躬耕帝籍故言率時農夫以張本也言駿發爾私不及公田為民祈也何氏楷曰魯無冬至大郊之禮降殺于天子春秋所書卜郊皆孟春祈穀之郊也然穀梁所稱與明堂位左傳異穀梁曰我以十二月下辛卜正月上辛如不從則卜二月上辛如不從則卜三月上辛如不從則不郊矣明堂位曰孟春乘大路祀帝于郊左傳亦曰啓蟄而郊知魯郊只在夏正建寅之一月則啖助之説為得之啖助曰以周二月卜三月上辛不吉則卜中辛又不吉則卜下辛三辛推移總不出建寅一月之內若三卜不從則孟獻子所云既耕之後亦可無用郊為矣建寅之郊用卜而冬至之郊不用卜家語云周之始郊其月以日至其日用上辛定用上辛之一日此不用卜也月令曰孟春之月天子乃以元日祈穀于上帝乃擇元辰辰必須擇此以知祈穀之郊用卜也然仍以辛日為主鄭康成謂取人君齊戒自新之意章首有成王昭格之語知此詩作于康王之世乃主作龜禰宫而言不然周以農事開國即欲勸農官何不于始祖后稷之廟而顧于成王何取乎案何氏之説最明確臣謹案毛謂成王為成是王業之王王既已政教光明如此猶能敬重農事云云蘇氏轍亦謂歎天之所以成我王業者既昭至矣皆以成王為非諡法而别創一解其誤皆以頌為周公所作無康王以後之詩故于昊天有成命曰二后受之成王不敢康為文武成此王業不能康寧于執競曰不顯成康上帝是皇為武王持其自強不息之心所以能成大功而安之朱子初亦從毛解後定集傳始從歐陽説而闢毛鄭則歐陽與集傳其為當從無疑也朱子曰昊天有成命明是康王時詩執競明是昭王以後之詩而今硬要解做成王業成此大功而安之費盡氣力不知怎生地其言可謂深切著明矣而李氏樗郝氏敬猶欲闢集傳而從毛鄭舍簡直而就支離臣不知其何心也彚纂曰古序所傳是頌中一大禮所在朱子初亦信之後改為亦戒農官之詩未審何據且以為國中鄉遂之地用貢法無公田故皆謂之私夫天子戒勑當及天下乃止及國中之鄉遂猶未及乎畿甸似不如毛説為長雩祭大雅雲漢篇靡神不舉靡愛斯牲臣謹案孟夏大雩雖無水旱亦行之禮之常也若國大旱則無論夏秋皆得雩此詩所陳是也然曰不殄禋祀自郊徂宫上下奠瘞靡神不宗又不止雩上帝而已周禮荒政曰索鬼神謂搜索鬼神而祭之此其事也補傳曰二章于羣祀之中訴於神之尊者如后稷如上帝四章又于羣祀之中舉其神之親者而告之如雩祀之羣公先正宗廟之百辟卿士是也案是詩靡神不宗而言上帝凡四無言五帝乃知五帝出于秦漢妄也而周禮言祀五帝故世儒多疑其偽孔疏神異經曰南方有人長二三尺袒身而目在頂上走行如風名曰魃所見之國大旱一名旱母蓋是鬼魅之物晉穆帝永和時博士議曰雲漢之詩宣王承厲王撥亂遇災而懼故作是歌今晉中興奕葉重光豈比周人耗斁之辭乎漢魏俱别造新書晉室太平不必因故司徒蔡謨議曰雲漢之詩興于宣王今歌之者取其修德禳災以和隂陽之義故因而用之無庸更作梁武帝天監十年朱異議曰雲漢詩中毛傳有瘞埋之文不見燎柴之説帝亦以用火祈水于理為乖于是停用柴燎從坎瘞典十二年大雩國南除地為墠舞僮六十四人皆衣元衣為八列皆執羽翳每列歌雲漢詩一章而舞靈星祭周頌絲衣序髙子曰靈星之尸也漢書郊祀志髙祖五年或言周興而邑立后稷之祠至今血食天下于是制詔御史其令天下立靈星祠祀后稷謂之靈星者者以后稷配食是也張晏曰龍星左角曰天田則農祥也晨見而祭之孝武遊登五嶽尊祀靈星世祖建武二年立靈星祠有司掌之晉令縣祀靈星唐以立秋後辰日祀靈星開元祀于國城東南天寶四載升中祠宋皇祐中立靈星壇東西丈二尺南北亦如之厯代靈星之見于祀典者如此祠之設專為祈田每𨽻郡邑惟周之肇祀反其所自始與后稷比隆臣謹案后稷已祭于周太廟此復郡邑立祠此漢世原廟所由起也周禮戴記俱不經見惟晉語有后稷是相之一語想漢初人因此而生為妄説耳郡縣已有社稷壇更何煩靈星以祀后稷乎何氏楷曰絲衣詩有二説一曰繹賔尸一曰靈星究以髙子之説為是陳祥道亦主其説按靈星為農祥東方蒼龍七宿房心通有農祥之稱周語農祥晨正土乃脈發韋昭以為房心也于立春之日農事之候祭之故曰農祥晉語董因曰大火閼伯之所在也是為大辰后稷是相韋昭謂心星所在大辰辰次為天駟駟馬也辰為農祥合前二説則房心俱有此號亦以二星相近故也而賈陸應劭張晏蔚蔚宗則俱謂龍星左角曰天田為農祥考之星經則天田二星在角北故服虔直以靈星為角星唐志又以靈星為嵗星其祭之日或云立春或云仲秋或云嵗再祭紛紛不一今以此詩證之則正孟冬蠟祭時事其謂祭于仲秋與春秋再祭者皆誤也蠟祭之禮皮辨素服與他祭不同據此詩曰絲衣曰載辨與禮文正合則靈星為蠟祭無疑社祭大雅綿篇乃立冡土毛傳冡土大社也起大事動大衆必先有事乎社而後出謂之宜詩美太王之社遂為大社輔氏曰社自天子至庶人皆得祭之然非尊者所立則亦不可何氏楷曰大社之名惟施于天子諸侯僅可言冡土詩言乃立冡土正是太王當日為諸侯之法泰誓言宜于冡土則猶仍太王舊稱以未為天子故也小雅甫田篇以社以方大雅雲漢篇方社不莫説見方祭祈祭周頌載芟序曰春藉田而祈社稷也孔疏成王周公太平之時王者于春時親耕藉田以勸農又祈求社稷使民獲其年豐嵗稔詩人述其事而作此歌報祭良耜序曰秋報社稷也孔疏周公成王太平之時年穀豐稔以為由社稷之所致故於秋物既成王者乃祭社稷之神以報豐年序曰秋冬報也朱子詩傳此報賽田事之樂歌蓋祀田祖先農及方社之屬按陳氏禮書謂秋報者季秋之于明堂冬報者冬至之于郊非是田祖祭小雅甫田篇琴瑟擊鼓以御田祖以祈甘雨毛傳田祖先嗇也孔疏郊特牲及春官籥章注俱謂先嗇為神農始教造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農名殊而實同也何氏楷曰孔疏以田祖即神農朱子亦從之今按以神農為田祖經傳無明文王安石謂生為田正死為田祖猶樂官之死而為樂祖也以樂祖例田祖于理近之臣謹案神農為五帝天子所祭民間安得琴瑟擊鼓鼓以御田祖乎安石之説為是髙禖祭大雅生民篇克禋克祀以弗無子商頌玄鳥篇天命玄鳥降而生商秦氏蕙田曰二詩推本稷契之生由于祈祀髙禖而得其日以玄鳥至之日故云天命玄鳥降而生商説者以為稷母履大人迹而有身契母吞鳦卵而有身非也臣謹案歐陽修主是説但祈髙禖而有身是平常事極可慶幸何故以為不祥而置諸隘巷與寒冰乎朱子及吕氏祖謙俱從康成説與此異行祭國風泉水篇飲餞于禰毛傳祖而舍軷飲酒于其側曰餞禰地名臣謹案聘禮出祖釋軷祭酒脯乃飲酒于其側祖始也是為行道之祭孔疏周禮大馭掌馭玉輅及犯軷遂驅之注云封土為山象以菩芻棘柏為神主既祭之以車轢其上而去喻無險難也以此行道之祭故知在國門之外大雅生民篇取羝以軷載燔載烈毛傳羝羊牡羊也軷道祭也傅火曰燔貫之加之火曰烈孔疏又取羝羊以為祀軷之祭其祭軷也又取所祭之肉或傅火而燔之或加火而烈之以為尸之羞以七祀皆有尸知此軷祭亦有尸后稷是時為諸侯若聘禮卿大夫軷祭用酒脯則無尸矣山川告祭周頌時邁序曰巡狩告祭柴望也詩云懷柔百神及河喬嶽孔疏武王既定天下巡行其守土諸侯至于方嶽之下作告至之祭柴祭昊天望祭山川安祀百神般序曰巡守而祀四嶽河瀆也詩云陟其髙山墮山喬嶽允猶翕河毛傳髙山四嶽也墮山之狹小者翕合也四方報祭小雅甫田篇以我齊明與我犧羊以社以方鄭箋曰以我潔齊豐盛與我純色之羊秋祭社與四方為五穀成熟報其功也孔疏大司馬仲秋獮田羅弊致禽以祀祊祊即方聲之誤也獮田主祭四方報成萬物即引此詩云以社以方是報祭四方在仲秋也大雅雲漢篇祈年孔夙方社不莫孔疏祭社與四方即以社以方是也小雅大田之篇來方禋祀以其騂黑與其黍稷以享以祀鄭箋成王之來則又禋祀四方之神祈報焉孔疏云祈報並言者言其報秋成而祈後年也方宜五色獨舉騂黑者略舉二方以韻句耳附録陳氏稽古編曰鄭康成王肅論郊祀各不同鄭謂天有六天嵗有九祭王謂天惟一天嵗止二祭六天者天皇上帝及五帝精也九祭者冬至圜丘祭天皇上帝配以帝嚳為一祭大司樂地上之圜丘大宗伯禋祀昊天上帝祭法帝嚳是也夏正月祈穀于南郊祭感生帝配以后稷又為一祭郊特牲迎長日之至春秋書郊左傳啓蟄而郊祭法郊稷是也夏祈穀于南郊遍祀五精帝配以五人帝又為一祭春秋經及月令大雩左傳龍見而雩是也四時及季夏迎氣祭五精帝亦配以五人帝又共為五祭小宗伯兆五帝于四郊月令迎氣于四方是也季秋大饗明堂祭五精帝配以五人帝及文武又為一祭文配曰祖武配曰宗月令大饗帝孝經宗祀文王于明堂以配上帝祭法祖文王而宗武王是也合之凡九矣王則謂圜丘即交日至與孟春止祭一天其迎氣與明堂皆祭人帝非天也後儒各宗其師説故歷代郊祀之制互有變易宋儒主王惟明堂之祭仍以為上帝云以鄭學言之其樂章則圜丘歌昊天有成命明堂歌我將春祈穀夏大雩皆歌噫嘻而商頌長發大禘亦圜丘所歌也至迎氣之樂章則周頌無文焉又玄鳥至之日郊禖祈祭亦祭感生帝而配以先禖生民克禋克祀是也此在九祭之外臣謹案陳氏列鄭王之説極精細但以日至之郊與祈穀為一似誤迎長日之至即冬至圜丘祈穀在孟春夏正月為時二春秋所書但指祈穀之郊魯無日至之郊殺于天子此混而一之未是社稷嵗凡三祭其二祭見詩載芟祈社稷此春祭也月令仲春命民社指此甫田之以社以方良耜秋報社稷此秋祭也又一祭在孟冬月令大割祀于公社是也詩未及焉案王鄭論社稷亦多異議謂社祭句龍稷祭后稷是人鬼非地神者此王肅祖孔安國賈逵馬融之説也謂社是五土總神而句龍配之稷為隰原之神而后稷配之此鄭康成之説而其徒馬昭等述之者也肅與昭等往復辨難不啻聚訟後儒莫能定其是非焉七廟之説王鄭亦不同鄭謂周止祭四代及太祖合文武二世室為七廟王謂七廟為天子常禮二世室在七廟之外二説之是非止據商書七世之廟一語可以斷之矣鄭信韋元成議而不見古文尚書故有此謬然王氏之説實祖禮器王制荀卿穀梁及劉歆馬融之言其來已久鄭何弗之信乎先儒言禘祫其説有三鄭康成謂祫大而禘小王肅張融孔朝之徒以為禘大而祫小賈逵劉歆杜預之徒以為禘祫一禮而二名以源鄙見論之賈劉杜之説為長也孔疏釋詩專據鄭箋為説而鄭之言禘則有四焉圜丘祭天而配以嚳一禘也南郊祭感生帝而配以稷二帝也大宗伯以饋食享先王即五年再殷祭三禘也致新主于廟逺主當祧因大祭以審昭穆四帝也此喪畢吉祭之禘晉范宣子曰以寡君之未禘祀亦名禘四者二祭天二祭廟皆得禘名矣周頌雍篇五年之禘也商頌長發南郊之禘也宋儒則從王義臣謹案鄭王異同處多似王優於鄭而禘即祫祫即禘則臣於春秋大事表主其説蓋以三年一祫五年一禘遂至禘祫併在一年致有逺近之説紛紛陳氏所見與臣合矣毛詩類釋卷六
