body:
  text: 毛詩類釋巻三國子監祭酒顧棟髙撰釋山岐山郡縣志岐山亦名天柱山在今陜西鳳翔府岐山縣北十里雍錄邠在岐西北二百五十里自邠而南一百三十里為奉天縣有梁山渭水在梁山之南踰梁山循水可以達岐所謂率西水滸至于岐下也太王都岐在今鳳翔府西五十里是為岐周岐水之南有周原名勝志周原在岐山縣東四十里東西橫亘肥美寛平即詩所謂周原膴膴者也地在岐山之陽故左傳曰成有岐陽之蒐終南一名太白山在今陜西西安府長安縣南五十里亘鳳翔岐山郿縣武功盩厔鄠縣長安咸寧藍田九縣之境秦風終南何有有條有梅時襄公僅以兵一至岐而卒子文公立十六年始將兵伐戎戎敗走取周餘民而有之地至岐岐以西獻之周是襄公終身未嘗一至終南特以天子之命設言以勸其必取耳臣謹案終南一名中南以其據天之中在都之南也昔文王都豐武王都鎬皆面終南山以土田則上腴形勢則奥區故文王詩曰殷其靁在南山之陽成王詩曰信彼南山宣王詩曰幽幽南山幽王詩曰節彼南山皆據朝夕所見而言自終南入秦而西歸之好音斷矣鄒肇敏謂秦能以一國取之周獨不能以天下取之乎平王此時已甘棄祖宗百年之基業此匪風之詩人所為嘆息痛恨也閻氏若璩曰詩咏南山其可指實者凡二一為曹南山郡縣志在曹州濟隂縣東二十里曹風南山朝隮是也今為山東曹州府曹縣一為終南山郡縣志在京兆府萬年縣南五十里今為陜西西安府長安咸寜藍田盩厔四縣北山胡氏渭曰終南之名惟見於秦風而小雅則稱南山不一而足又有北山蓋南山謂都南諸山終南太一在焉北山謂都北諸山九嵏甘泉嶻嶭等也臣謹案召南陟彼南山言采其蕨小雅陟彼北山言采其杞不舉山名單稱南北者主豐鎬帝都而言東山豳風我徂東山嚴氏粲曰三監在州之東周公自西徂東以征之軍屯必依山為固故以東山言之梁山在今陜西同州府韓城縣西北九十里大雅奕奕梁山維禹甸之本為韓國鎮山晉滅韓其地屬晉臣謹案此與太王踰梁山之梁山有别太王所踰之梁山在岐山之西百二十里韓國之梁山在岐山之東北七百里是秦晉接界處近大河公羊傳梁山崩壅河三日不流是也周之立國以岐山為根本終南為屏蔽梁山為門户韓侯作鎮實為國之屏翰詩謂幹不庭方以佐戎辟其倚毗可知乃平王東遷晉文侯即滅韓而有之周失其門户之險而晉且代周而興霸矣閻氏若璩曰雍州有二梁山一在今韓城郃陽兩縣境書治梁及岐詩奕奕梁山春秋梁山崩爾雅梁山晉望也皆與孟子之梁山無涉孟子梁山則在今乾州西北五里其山橫而長自邠抵岐二百五十餘里山適界乎一百三十里之間太王當日必踰此山然後可以逺狄患而營都邑改國曰周古諸侯國名雖云受之天子傳之祖宗而隨在易名初不以為嫌如唐叔虞一傳而子燮改國曰晉魏侯罃遷於大梁改國曰梁皆是也後秦始皇幸梁山宫從山上見丞相車騎甚衆弗善亦此乾州之梁山敖山在今河南開封府鄭州河隂縣西二十里車攻詩所謂搏獸于敖者也秦於其地置倉名曰敖倉北臨汴水先王名山大澤不以封敖山不屬列國蓋留以為講武之地宣王時猶行此典自鄭滅虢檜而敖遂為鄭之山險東都朝㑹田獵之禮不行矣泰山在今山東泰安府城北五十里史記貨殖傳其陽則魯其隂則齊詩曰泰山巖巖魯邦所詹此魯之泰山也嶽臣謹案嶽吳嶽也崧乃髙大之稱爾雅山大而髙曰崧釋名云崧竦也所以毛傳只說髙貌中庸言載華嶽而不重華則華山嶽即此山也即禹貢之岍山一名吳岳地理志扶風岍縣西有岍山汧水所出在今陜西鳳翔府隴州南八十里與中嶽嵩髙無涉閻若璩四書釋地云華嶽舉二山與下河海對周禮豫州山鎮曰華雍州山鎮曰嶽爾雅釋山河南曰華河西曰嶽確有明據武進楊椿謂臣曰申侯係雍州産非豫州産也可謂一語破的况經文明謂維嶽降神生甫及申不云崧髙降神又何來太室之名乎又案吳嶽亦有五嶽之號鄭注大司樂云五嶽岱在兖州衡在荆州華在豫州嶽在雍州恒在并州是也爾雅及經典羣書言五岳者皆數嵩髙不數嶽而鄭云然者賈公彦周禮疏云周處鎬京在五嶽外西都無嶽故權立吳嶽為西岳爾雅嵩髙為中嶽華山為西嶽者據東都地中而言此據西都以嵩與華山俱屬豫州雍更無嶽名故以吳嶽為西嶽也毛鄭皆以嶽為四嶽意以申甫皆姜姓堯時四嶽之後嶽神福佑其子孫故生申伯與甫侯嚴緝已非之謂詩主褒揚申伯而逺引周道始衰之甫侯為配非褒揚之意此甫當為仲山甫宣王時為相與申伯均有蕃宣之任况鄭氏注禮既以甫為仲山甫何乃箋詩忽異嚴說是也竊以詩單舉嶽字自當指雍州之嶽山無疑舉近地之尊神為言從來神靈降生只是一神之靈氣所注無四嶽之神皆來降生之理指為中嶽者固屬譌謬以為四嶽者尤為鹵莽也唐六典闗内道名山曰吳山亦謂之西鎮山肅宗在鳳翔改吳山為西嶽以祈靈助適與周禮大司樂之注相合胡氏渭曰古之中嶽蓋霍太山在山西平陽府霍州東三十里禹貢之所謂太岳也隋開皇十四年詔以霍山為冀州鎮歴代因之號為中鎮降嶽為鎮為嵩髙所壓耳閻若璩云詩崧髙維嶽謂崧然而髙者維是嶽山非以太室山為嶽名曰嵩髙也爾雅撰於三百篇後緣此遂實指嵩髙為中嶽太史公又出爾雅後并補注堯典曰中岳嵩髙也至漢武登禮太室易曰崈髙中岳名益顯皆由為爾雅所誤耳首陽在今山西蒲州府城東南一名雷首山禹貢壺口雷首至于太岳亦曰首山春秋傳趙宣子田於首山皆此也詩曰采苓采苓首陽之巔時當晉獻公已屬晉案蒲坂本舜都首山在河東蒲坂縣南山南曰陽夷齊采薇於此墓在縣南三十五里蒲坂今為蒲州府永濟縣龜山在今泰安府新泰縣西南四十里春秋定十年齊人來歸鄆讙龜隂田謂此山之北田也詩曰奄有龜蒙蓋此時尚未奪於齊蒙山在今沂州府蒙隂縣西南孔疏曰論語說顓臾云昔者先王以為東蒙主何楷曰蒙山一名東山孟子謂登東山而小魯是也鳬山王應麟曰郡縣志鳬山在兖州府鄒縣東南三十八里繹山繹亦名嶧李氏樗曰禹貢徐州嶧陽孤桐此繹即嶧陽也一名鄒山文十三年邾文公卜遷于繹哀八年邾衆退保于繹杜注魯國鄒縣北有繹山在今兖州府鄒縣東南二十二里郭璞曰繹山純石積構連屬如繹絲然故名詩保有鳬繹明係魯地而易世之後即為邾都終春秋世没於邾境豈詩係頌禱之詞固不必有實耶徂來水經注鄒山記曰徂來山在兖州梁父奉髙博城三縣界詩曰徂來之松新甫之栢今其地猶有美松新甫後魏地形志魯郡汶陽縣有新甫山汶陽故城在今兖州府泗水縣東南景山商頌陟彼景山松栢丸丸朱子曰景山商所都之山名在今河南府偃師縣所謂北亳也旱麓地理志漢中郡南鄭縣旱山池水所出東北入漢詩緝曰毛氏以旱為山名不知山之所在或取漢地理志漢中郡南鄭縣之旱山以實之詩人托山川以起興皆取其在境内者漢中逺於豐鎬豐鎬之間髙山多矣何獨逺取漢中之旱山乎既非耳目所及何言瞻也旱山不知所指闕其所不知可也岡爾雅山脊曰岡郭注謂長山脊邢疏髙山之長脊名岡詩云陟彼髙岡是也冡崒爾雅山頂曰冡郭注山巔崒者厜㕒音垂怡郭注謂峰頭巉巖也邢疏此二句釋小雅十月云山冡崒崩之文也毛傳云山頂曰冡鄭箋云崒者崔嵬雖音字小異義實同也嶞爾雅巒山曰嶞郭注謂山形長狹者荆州謂之巒邢疏凡物狹而長謂之嶞山形亦如之周頌般篇云嶞山喬嶽是也鮮原爾雅小山别大山曰鮮郭注别者不相連邢疏謂小山與大山不相連屬者名鮮大雅皇矣度其鮮原毛傳引此文解之下文居岐之陽則是岐為大山鮮原為小山與岐不相連屬闞駰以為此即周之程邑也孔疏曰太王初遷已在岐山此亦在岐山之陽是去舊都不逺也文王中間徙宅於程後更徏都於豐知此非豐者以此居岐之陽豐則更在岐之東南三百里耳夕陽爾雅山西曰夕陽郭注暮乃見日邢疏夕始得陽故名夕陽大雅公劉云度其夕陽豳居允荒是也朝陽爾雅山東曰朝陽郭注旦即見日邢疏山頂之東皆早朝見日大雅卷阿云梧桐生矣于彼朝陽是也崔嵬砠爾雅石戴土謂之崔嵬郭注石山上有土者土戴石為砠郭注土山上有石者邢疏周南卷耳云陟彼崔嵬又云陟彼砠矣毛傳崔嵬土山之戴石者石山戴土曰砠與此相反或是傳寫之誤也岵屺爾雅作峐爾雅多草木岵無草木峐邢疏峐當作屺魏風云陟彼岵兮瞻望父兮又曰陟彼屺兮瞻望母兮毛傳山無草木曰岵有草木曰屺與此相反者當是傳寫誤也王肅解依爾雅巘爾雅重甗隒音嚴郭注山形如累兩甗甗甑也山形似之因以名云邢疏孫炎云山基有重岸也甗是無底甑大雅篤公劉曰陟則在巘巘與甗同毛云小山别於大山與此異孔疏爾雅説重甗謂山形如累兩甑上大下小西京賦曰陵重甗是也與皇矣小山曰鮮義别彼謂大山之傍别有小山也崧爾雅山大而髙曰崧郭注今中嶽嵩髙山蓋依此名李廵曰山之髙大者自名崧本不指中嶽今之中嶽名嵩髙或取此文以立名乎胡氏渭曰蓋疑詞亦不以詩之崧髙為中嶽也自劉熈釋名云嵩或為崧世遂以降神生甫專歸之中嶽錯解貽誤至於如此左傳昭四年司馬侯曰四嶽三塗陽城太室太室即嵩髙於四嶽外别言之亦可見當時不為嶽也爾雅嵩髙為中嶽蓋後人所附益耳附釋丘旄丘爾雅前髙曰旄丘郭注詩云旄丘之葛兮毛傳前髙後下曰旄丘李廵云前髙者後必卑下阿丘爾雅偏髙曰阿丘郭注詩云陟彼阿丘邢疏謂丘形四隅有一髙而不正在左右前後者名阿丘宛丘爾雅宛中曰宛丘郭注宛謂中央隆髙邢疏案詩陳風宛丘之上兮毛傳云四方髙中央下曰宛丘李廵孫炎亦皆云然而郭以為中央髙者以四方髙中央下即是上文水潦所止之泥丘又下云丘上有丘曰宛丘非中央隆髙而何臣謹案中央隆髙與宛字義不合經文明言宛中是其中央宛宛然况地形髙峻非可游蕩之處不如從毛說為長也畝丘爾雅如畝曰畝丘郭注丘有隴界如田畝邢疏田畝之壟丘形有界埒似之因名詩小雅巷伯云楊園之道猗于畝丘是也京爾雅絶髙謂之京郭注人力所作邢疏言卓絶髙大如丘而人力所作者名京非人為之而地自然生者則名丘京與丘相對則是人為之京大雅篤公劉詩乃覯于京鄭箋引此文孔疏曰此京是大丘非人為矣李廵曰丘之髙大者曰京是京有二等若戰勝取尸築為京觀者則人為之此言京者則是丘之髙大非人為也毛詩類釋巻三
